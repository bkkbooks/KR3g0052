body:
  text: 五行大義卷第一上儀同三司城陽郡開國公蕭吉撰第一釋名就此分為二段一者釋五行名二者論支干名第一釋五行名夫萬物自有體質聖人象類而制其名故曰名以定體無名乃天地之始有名則萬物之由以其因功涉用故立稱謂禮云子生三月咳而名之及其未生本無名字五行為萬物之先形用資於造化豈不先立其名然後明其體用春秋元命苞曰木者觸也觸地而生許愼云木者冒也言冒地而出字從於屮下象其根也其時春禮記曰春之為言蠢也産萬物者也位有在東方尸子云東者動也震氣故動白虎通云火之為言化也陽氣用事萬物變化也許愼曰火者炎上也其字炎而上象形者也其時夏尚書大傳云何以謂之夏夏假也假者方呼萬物而養之釋名曰夏假者寬假萬物使生長也其位南方尚書大傳云南任也物之方任也元命苞云土之為言吐也含吐氣精以生於物許愼云土者吐生者也王肅云土者地之別號以為五行也許愼云其字二以象地之下與地之中以一直畫象物初出地也其時季夏季老也萬物於此成就方老王於四時之季故曰老也其位處內內通也禮斗威儀云得皇極之正氣含黃中之德能苞萬物許愼云金者禁也陰氣始起萬物禁止也土生於金字從土左右注象金在土中之形也其時秋也禮記云秋之為言愁也以時察守義者也尸子云秋肅也萬物莫不肅敬恭莊禮之主也説文曰地反物為秋其位西方尚書大傳云西鮮也鮮訊也訊者始入之貌也釋名廣雅白虎通皆曰水準也平準萬物元命苞曰水之為言演也陰化淖濡流施潛行也故立字兩人交一以中出者為水一者數之始兩人譬男女陰陽交以起一也水者五行始焉元氣之湊液也管子云水者地之血氣筋脈之通流者故曰水許愼云其字象泉並流中有微陽之氣其時冬尸子云冬終也萬物至此終藏也禮記云冬之為言中也中者藏也其位北方尸子云北伏也萬物至冬皆伏貴賤若一也五行之時及方位故分而釋之第二論支干名支干者因五行而立之昔軒轅之時大撓之所制也蔡雍月令章句云大撓採五行之情占斗機所建也始作甲乙以名日謂之幹作子丑以名月謂之支有事於天則用日有事於地則用辰陰陽之別故有支干名也而各有總別先論總名次言別號總名支幹者幹字乃有三種不同一作幹二作簳三作干字今解簳字者此支簳既相配成用如樹木之有枝條莖簳共為樹體所以云簳又作幹者幹濟為義作支者支任為義以此日辰任濟萬事故云支幹又作干字者亦是簳義如物之在竿上能竪立顯然故亦云竿也世書從易故多干也次別號者詩緯推度災云甲者押也春則開也冬則闔也鄭玄注禮記月令云甲者押也乙者軋也春時萬物皆解孚甲自抽軋而出也丙者柄也物之生長各執其柄鄭玄云丙者炳也夏時萬物強大炳然著見也丁者亭也亭猶止也物之生長將應止也戊者貿也生長既極極則應成貿易前體也己者紀也物既始成有條紀也鄭玄云戊之言茂也己之言起也謂萬物皆枝葉茂盛其含秀者抑屈而起也庚者更也辛者新也謂萬物成代改更復新也鄭玄云謂萬物皆肅然改更秀實新成也壬者任也癸者揆也陰任於陽揆然萌牙於物也鄭玄云時維閉藏萬物懷任於下揆然萌牙也子者孳也陽氣既動萬物孳萌三禮義宗云陽氣至孳養生丑者紐也紐者繫也續萌而繫長也故曰孳萌於子紐牙於丑三禮義宗云言居終始之際故以紐結為名寅者移也亦云引也物牙稍吐引而申之移出於地也淮南子云寅蚓動生也三禮義宗云寅者引也肆建之義也卯者冒也物生長大覆冒於地也淮南子云卯茂也茂然也三禮義宗云卯茂也陽氣至此物生滋茂辰者震也震動奮迅去其故體也三禮義宗云此月之時物盡震動而長巳者已也故體洗去於是已竟也三禮義宗云巳起也物至此時皆畢盡而起午者仵也亦云萼也仲夏之月萬物盛大枝柯萼布於午淮南子云午者忤也三禮義宗云仵長也大也明物皆長大也未者昧也陰氣已長萬物稍衰體薆昧也故曰薆昧於未淮南子云未味也三禮義宗云時物向成皆有氣味申者伸伸猶引也長也衰老引長淮南子云申呻也三禮義宗云申者身也物皆身體成就也酉者老也亦云熟也萬物老極而成熟也淮南子云酉飽也三禮義宗云酉猶也猶倫之義也此時物皆縮小而成也戌者滅也殺也九月殺極物皆滅也三禮義宗云此時物衰滅也亥者核也閡也十月閉藏萬物皆入核閡三禮義宗云亥劾也言陰氣劾殺萬物也爾雅歲次云大歲在寅名攝提格淮南子注云格起也萬物承陽而起卯名單閼單盡閼止也言陽氣推萬物而起陰氣盡止也辰名執徐執蟄也徐舒也言伏蟄之物皆散舒而出也巳名大荒落荒大也言萬物熾盛而大落落而布散也午名敦牂淮南子云欃槍敦盛牂壯也言萬物盛壯也未名協洽淮南子云協和也洽合也言陰欲化萬物和合也申名涒灘淮南子云涒灘大修也言萬物皆修其精氣也酉名作鄂淮南子云名作鄂作鄂零落也言萬物皆陊落也戌名閹茂掩蔽也茂冒也言萬物皆蔽冒也亥名大淵獻淵藏獻迎也言萬物終亥大小深藏窟伏以迎陽也子名困敦困混也敦沌也言陽氣混沌萬物牙蘖也丑名赤奮若奮起也若從也言陽氣奮迅萬物而起無不順其性赤陽色也春秋緯云大陰所在之名與淮南子爾雅不同此並支干別名大意終從氣解故以具釋之第二辨體性體者以形質為名性者以功用為義以五行體性資益萬物故合而辨之木居少陽之位春氣和煦溫柔弱火伏其中故木以溫柔為體曲直為性火居大陽之位炎熾赫烈故火以明熱為體炎上為性土在四時之中處季夏之末陽衰陰長居位之中總於四行積塵成實積則有間有間故含容成實故能持故土以含散持實為體稼穡為性金居少陰之位西方成物之所物成則凝強少陰則清冷故金以強冷為體從革為性水以寒虛為體潤下為性洪範云木曰曲直火曰炎上土曰稼稷金曰從革水曰潤下是其性也淮南子云天地之襲精為陰陽陰陽之專精為四時四時之散精為萬物積陰之寒氣反者為水積陽之熱氣反者為火水雖陰物陽在其內故水體內明火雖陽物陰在其內故火體內暗木為少陽其體亦含陰氣故內空虛外有花葉敷榮可觀金為少陰其體剛利殺性在外內亦光明可照土苞四德故其體能兼虛實洪範傳曰木曰曲直者東方易云地上之木為觀言春時出地之木無不曲直花葉可觀如人威儀容貌也許愼云地上之可觀者莫過於木故相字目傍木也古之王者登輿有鸞和之節降車有佩玉之度田狩有三驅之制飮餞有獻酢之禮無事不巡幸無奪民時以春農之始也無貪欲姦謀所以順木氣木氣順則如其性茂盛敷實以為民用直者中繩曲者中鉤若人君失威儀鴆酒淫縱重徭厚稅田獵無度則木失其性春不滋長不為民用橋梁不從其繩墨故曰木不曲直也火曰炎上炎上者南方揚光輝在盛夏氣極上故曰炎上王者向明而治蓋取其象古者明王南面聽政攬海內雄俊積之於朝以助明也退邪佞之人臣投之於野以通壅塞任得其人則天下大治垂拱無為易以離為火為明重離重明則君臣俱明也明則順火氣火氣順則如其性如其性則能成熟順人士之用用之則起捨之則止若人君不明遠賢良進讒佞棄法律疏骨肉殺忠諫赦罪人廢嫡立庶以妾為妻則火失其性不用則起隨風斜行焚宗廟宮室燎于民居故曰火不炎上土爰稼穡稼穡者種曰稼斂曰穡土為地道萬物貫穿而生故曰稼穡土居中以主四季成四時中央為內事宮室夫婦親屬之象古者天子至於士人宮室寢處皆有高卑節度與其過也寧儉禹卑宮室孔子善之后夫人左右妾媵有差九族有序骨肉有恩為百姓之所軌則則如此順中和之氣則土得其性得其性則百穀實而稼穡成如人君縱意廣宮室臺榭鏤雕五色罷盡人力親疏無別妻妾過度則土失其性土失其性則氣亂稼穡不成故五穀不登風霧為害故曰土不稼穡金曰從革從革者革更也從範而更形革成器也西方物既成殺氣之盛故秋氣起而鷹隼擊春氣動而鷹隼化此殺生之二端是以白露為霜霜者殺伐之表王者教兵集戎事以誅不義禁暴亂以安百姓古之人君安不忘危以戒不虞故曰天下雖安忘戰者危國邑雖強好戰必亡殺伐必應義應義則金氣順金氣順則如其性如其性者工冶鑄作革形成器如人君樂侵凌好攻戰貪色賂輕百姓之命人民騷動則金失其性冶鑄不化凝滯渠堅不成者衆秋時萬物皆熟百穀已熟若逆金氣則萬物不成故曰金不從革水曰潤下潤下者水流濕就汙下也北方至陰宗廟祭祀之象冬陽之所始陰之所終終始者綱紀時也死者魂氣上天為神魄氣下降為鬼精氣散在於外而不反故為之宗廟以收散也易曰渙亨王假有廟此之謂也夫聖人之德又何以加於孝乎故天子親耕以供粢盛王后親蠶以供祭服敬之至也敬之至則鬼神報之以介福此順水氣水氣順則如其性如其性則源泉通流以利民用若人君廢祭祀漫鬼神逆天時則水失其性水暴出漂溢沒溺壞城邑為人之害故曰水不潤下也第三論數就此分為五段一者起大衍論易動靜數二者論五行及生成數三者論支干數四者論納音數五者論九宮數第一起大衍論易動靜數凡萬物之始莫不始於無而復有是故易有大極是生兩儀兩儀生四序四序生之所生也有萬物滋繁然後萬物生成也皆由陰陽二氣鼓儛陶鑄互相交感故孤陽不能獨生單陰不能獨成必須配合以爐冶爾乃萬物化通是則天有其象精氣下流地道含化以資形始陰陽消長生殺用成明其道難明非數不可究故因數以辨之數之顯理猶筌蹄之取魚兔陽順唱始陰佐其終窮奇偶之數備相成之道極變化之源者詳於蓍策之數也七八為靜九六為動陽動而進變七之九象氣息也明陽道之舒以象君德唱始不休無所屈後去極一等而猶進之故九動也陰動而退變八之六象氣消也以明臣法有所屈後唱和而已事理近君則靖息以聽命必須退讓以明其義故八靜也易曰分二以象兩挂一以象三楪之以四以象四時者餘手有四七故名七也有四八故名八也有此則靜爻之數夏殷尚質以用靜爻占之餘有四九故名九也有四六故名六也此則動爻之數周備質文故兼用動爻凡大衍極天地之數五十有五也京房以十日十二辰二十八宿合應五十其一不用者天之生氣將欲以虛求實故用四十九焉馬融以易之大極謂北辰也生兩儀兩儀生日月日月生四時四時生五行五行生十二月十二月生二十四氣北辰居位不動其餘四十九轉運而用也鄭玄曰貞悔六爻本有五十定所用者四十有九天地之數本五十五天五與地十通天一與地六通數之者氣則有并并則宜減焉大衍減五故有五十其用減一故四十有九不并者不可減也今總其數五十者天一至地十凡五十五也此合生成之數若止言生數唯有十五從一至五也易之所象爻盡之有邃故自天地以下日月等數皆為蓍卦所攝循環變轉萬世無窮而五十有五五本并數并數者天之與地共各有一體體各有一正應敵對今盈於五則是氣之并數并不再用是其配義配則為虛不當於實不當於實故事無所主所以楪蓍不用又虛其一者挂一象無無無可象故有之用極則無之功見故曰尋太業而得吉凶尋吉凶而得八卦尋八卦以得四時尋四時以至兩儀尋兩儀以至太極太極者大殺而極窮無之致也遺有以極邃減多以就少此之謂也故曰太極無所復象明其空寂非言象所詮也第二論五行及生成數行言五者明萬物雖多數不過五故在天為五星其神為五帝孔子曰昔丘聞諸老聃云天有五行木金水火土其神謂之五帝在地為五方其鎮為五嶽物理論云鎮之以五嶽在人為五藏其候五官黃帝素問云五藏候在五官眼耳口鼻舌也五行遞相負載休王相生生成萬物運用不休故云行也春秋繁露云天地之氣列為五行夫五行者行也易上繫曰天數五王曰謂一三五七九也韓曰五奇也地數五王曰謂二四六八十也韓曰五偶也五位相得王曰五位金木水火土也而各有合王曰謂水在天為一在地為六六一合於北火在天為七在地為二二七合於南金在天為九在地為四四九合於西木在天為三在地為八三八合於東土在天為五在地為十五十合於中故曰五位相得而各有合謝曰陰陽相應奇偶相配各有合也韓曰天地之數各有五五數相配以合成金木水火土也尚書洪範篇曰五行一曰水二曰火三曰木四曰金五曰土皆其生數禮記月令篇云木數八火數七金數九水數六土數五皆其成數唯土言生數天以一生水於北方君子之位陽氣微動於黃泉之下始動無二天數與陽合而為一水雖陰物陽在於內從陽之始故水數一也極陽生陰陰始於午始亦無二陰陽二氣各有其始正應言一而云二者以陽尊故尊既括始陰卑贊和配故能生而陽數偶陰在火中火雖陽物義從陰配合陰始故從始立義故火數二也老子云天得一以清地得一以寧是知皆有一義唱和同始是以云木配陽動而左長於東方長則滋繁滋繁則數增故木數三也陰佐陽消陰道右轉而居於西在陽之後理無等義故金數四也陰陽之數始乎一周然後陽達於中總括四行苞則彌多故土數五也此並生數皆云據始未明成數數既未成亦未能為用穎容春秋釋例云五行生數未能變化各成其事水凝而未能流行火有形而未生炎光木精破而體剛金強而斫土鹵而片於是天以五臨民君化之傳曰配以五成所以用五者天之中數也於是水得於五其數六用能潤下火得於五其數七用能炎上木得於五其數八用能曲直金得於五其數九用能從革土得於五其數十用能稼穡鄭玄云數若止五則陽無匹偶陰無配義故合之而成數也奇者陽唱於始為制為度偶者陰之本得陽乃成故天以一始生水於北方地以其六而成之使其流潤也地以二生火於南方天以七而成之使其光曜也天以三生木於東方地以其八而成之使其舒長盛大也地以四生金於西方天以九而成之使其剛利有文章也天以五合氣於中央生土地以十而成之以備天地之間所有之物也合之則地之六為天一匹也天七為地二偶也地八為天三匹也天九為地四偶也地十為天五匹也陰陽各有合然後氣性相得施化行也故四時之運成於五行土總四行居時之季以成之也五行傳及白虎通皆云木非土不生根核茂榮火非土不榮得土著形金非土不成入範成名水非土不停堤防禁盈土扶微助衰應成其道故五行更互須土土王四季而居中央不以名成時故知同時俱起但託義相生傳曰五行並起各以名別常從數義云北方亥子水也生數一丑土也生數五一與五相得為六故水成數六也東方寅卯木也生數三辰土也生數五三與五相得為八故木成數八也南方巳午火也生數二未土也生數五二與五相得為七故火成數七也西方申酉金也生數四戌土也生數五四與五相得為九故金成數九也中央戊己土也生數五又土之位在中其數本五兩五相得為十故土成數十也此陰陽兩氣各一周也共一周則為生數各一周則為成數陽以輕清上為天陰以重濁下為地而陽至第五而入中者其體躁疾故共一周而入中陰至第十方入中者其體遲殿故各一周而始入耳然五行皆得中氣而後成土居中而王四季并須土以成之也洪範是上古創制之書故言生數禮記月令是時候之書所貴成就事業故言成數唯土言生數者土以能生為貴且以成四行足簡之矣是其能生能成之義也鄭玄曰以天地相配取陰陽之理常從以支干數和合取日辰為用兩説雖別大意還同終會易經天一至地十之義孝經援神契言以一立以二謀以三出以四孳以五合以六嬉以七變以八舒以九烈以十鈞五行以一立水一為生數以五配一水之成數故言一立而六嬉嬉是興義二是火之生數七是火之成數故言二謀火以變化為能故言七變謀者以其為變之始也三木之生數八木之成數五行始於東方故云三出八而成長故曰八舒四金之生數九金之成數西方成就故言四滋品類不同故稱九烈五是土之生數十是土之成數以天之五合地之十數義斯畢所以五言其合十言其均均是成備之義春秋元命苞云胎錯儛連以均一動合於二故陰陽受成於三故日月星序張於四故時起立於五故行動布於六故律踊分於七故宿改萌於八故風布極於九故州吐畢於十故功成數止此并經緯共明五行生成之數不過十也第三論支干數支干數者凡有二種一通數二別數今先辨通數後論別數通數者十干十二支也干有十者應天地之大數也易繫辭言天數五地數五天地之數不過於十故以干極於十十主日十日為一旬也支十二者禮稽命徴言布政十二尊卑有序援神契言三三參行四四相扶天有四時之氣以三月成一時故言三三參行四四相扶天地人謂之三才是為三者物生之常數因而各生三本三而末九所以十二元命苞言數成於三故合於三三月陽極於九故一時九十日也支象於月十二月為一歲也此辨通數別數者支數則子數九丑八寅七卯六辰五巳四午九未八申七酉六戌五亥四太玄經云子午九者陽起於子訖於午陰起於午訖於子故子午對衝而陰陽二氣之所起也寅為陽始申為陰始從所起而左數至所始而定數故自子數至申數九自午數至寅亦九所以子午九也丑未為對衝自丑數至申數八自未數至寅亦八所以丑未八也寅申為對衝自寅數至申數七自申數至寅亦七所以寅申七也卯酉為對衝自卯數至申數六自酉數至寅亦六所以卯酉六也辰戌為對衝自辰數至申數五自戌數至寅亦五所以辰戌五也巳亥為對衝自巳數至申數四自亥數至寅亦四所以巳亥四也又云陽數極於九子午為天地之經故取陽之極數自丑未巳下數各減一從八至四理自可知干數者甲九乙八丙七丁六戊五己九庚八辛七壬六癸五太玄經云甲己九者甲起甲子從子故九己為甲配故與甲俱九乙起乙丑從丑故八乙配於庚與庚俱八丙起丙寅從寅故七辛配於丙與丙俱七丁起丁卯從卯故六丁配於壬與壬俱六戊起戊辰從辰故五癸配於戊與戊俱五支有十二以對衝同數故自九至四干唯有十以配合同數故自九至五又云支從地故數畢於陰以四偶也干從天故數畢於陽以五奇也五則止於五氣四則極於四時上不過九者陽之極數也五行及支干之數相則倍之王則十而倍之休則如本囚死半之以此四而孳數乃無極此并從氣增減氣盛則多氣衰則少也第四論納音數納音數者謂人本命所屬之音也音即宮商角徴羽也納者取此音以調姓所屬也樂緯云孔子曰丘吹律定姓一言得土曰宮三言得火曰徴五言得水曰羽七言得金曰商九言得木曰角此并是陽數凡五行有生數壯數老數三種木生數三壯數八老數九火生數二壯數七老數三土生數五壯數十老數一金生數四壯數九老數七水生數一壯數六老數五管輅云土老數一者土為萬物之主一切歸之所以一也三才交而人理具火之為德取三才之義故老數三水上應五星下同五藏故水老數五金配七曜故金老數七木在天為九星在地為九州在人為九竅故木老數九先生數次壯數後老數納音論其本命故以終數言之此釋猶為未盡夫萬物皆稟五常之氣化合而生物生之後必至成壯成壯之後必有衰老故有三種義為人之道自壯及老莫不本乎禮義而以立身然存禮義者靡不有初鮮克有終今即論納音人之所屬非人莫能行其禮義故以終老之數禮義明之一言得土者土以含弘德厚位高為君君為民主主則無二唱始之言故數一也三言得火者火即主禮孝敬為先不敢棄所生之德故其數三從木數也水居陰位人臣之道土能制水如君制臣縱之則行壅之則止水不自專故從土數五也金即主義義是夫妻之道妻無自專有從夫之義火為金夫故用火數七也木主仁孝金能尅木宗廟之象式經云金為骸骨木為棺槨此明金木為鬼神之事以敬事故木從金數故數九也一示君德二順父母三表臣節四敬從夫五事鬼神此則禮義備而人事畢矣故納音用之數納音者子午屬庚震卦所直日辰也丑未屬辛巽卦所直日辰也寅申屬戊坎卦所直日辰也卯酉屬己離卦所直日辰也辰戌屬丙艮卦所直日辰也巳亥屬丁兌卦所直日辰也一言得土者本命庚子子屬於庚數之一言便以得之是也三言得火者本命丙寅寅屬於戊從丙數至戊凡三是也五言得水者本命壬戌戌屬於丙從壬數至丙凡五是也七言得金者本命壬申申屬於戊從壬數至戊凡七是也九言得木者本命己巳巳屬於丁從己數至丁凡九是也六十甲子例皆如是支屬八卦為納音者皆以次而取對衝如子午屬庚子午相對衝也餘例悉然夫陽施陰化故受氣定形皆資於陰陽以養成之是以人之所屬皆以陽數言也所以子午屬庚之例者乾為父坤為母共有六子故云乾將三男震坎艮坤將三女巽離兌陰陽相生故就乾索女就坤索男所以乾一索而得巽曰長女再索而得離曰中女三索而得兌曰少女坤一索而得震曰長男再索而得坎曰中男三索而得艮曰少男甲是陽干之始乾下三爻取之壬是陽干之末乾上三爻取之乙是陰干之始坤下三爻取之癸是陰干之末坤上三爻取之餘有六干陽付其男陰付其女甲乙之後次於丙丁故以丙付少男艮以丁付少女兌丙丁之後次於戊己故以戊付中男坎以己付中女離戊己之後次於庚辛故以庚付長男震以辛付長女巽所以從少而付老自小及大從微至著故也付干既訖次付其支震為長子故其卦初九得乾之子九四得乾之午震干庚故子午屬庚巽為長女子後次丑故其卦初六得坤之丑午後次未六四得坤之未巽干辛故丑未屬辛坎為中男丑後次寅其卦初六得乾之寅未後次申六四得乾之申坎干戊故寅申屬戊離為中女寅後次卯故其卦初九得坤之卯申後次酉九四得坤之酉離干己故卯酉屬己艮為少男卯後次辰故其卦初六得乾之辰酉後坎戌六四得乾之戌艮干丙故辰戌屬丙兌為少女辰後次巳故其卦初九得坤之巳戌後次亥九四得坤之亥兌干丁故巳亥屬丁六子取干則乾坤之餘取支並從乾坤而得陽取於乾陰取於坤皆受於父母故六子並主十二辰人之納音皆所繼焉甲乙壬癸不為納音者以屬乾坤故也或問曰六子用干則取父母之不用者用支則並同於父母者何答曰干是陽也陽體奇故正得一往分用支是陰也陰體偶故以再往用之又復龜則用日是以正求於干故發兆分為十分筮則用辰正求於支是以飛伏六爻並論十二支雖復體不兼要須相配以明義干為尊故不得不先設而後求支筮雖不正用干亦須干助以顯其趣猶如龜判十二支兆體雖無支象必約而論之筮雖闕三甲三壬三乙三癸亦約虛以求實且設干往先從父母而為始後及六子以甲付乾以乙付坤以丙付艮以丁付兌以戊付坎以己付離以庚付震以辛付巽歷八卦訖壬還到乾次癸還到坤十干所在六爻乾坤位尊取其始末理然體各得二干支既當爻正用故卦別皆備陽卦取其陽支陰卦取其陰支四卦同陽四卦同陰非正同於父母當伏羲畫八卦為三爻備天地人所以分干卦別取三乾坤居始故取甲乙後神農重之以為八純子有重來之理所以卦六干並同父母無二之義故後卦取乎壬癸其甲乙壬癸各少三者皆排在虛用之中不全無者陰有從陽之義第五論九宮數九宮者上分於天下別於地各以九位天則二十八宿北斗九星地則四方四維及中央分配九有謂之宮者皆神所遊處故以名宮也鄭司農云太一行八卦之宮每四乃入中央中央者地神之所居故謂之九宮易緯乾鑿度云易一陰一陽之謂道也故太一取其數以行九宮易曰天一地二天三地四天五地六天七地八天九地十天地之數合五十有五九宮用者天除一地除二人除三餘四十九以當蓍策之數又四時除四餘四十五五者五行四十者五行之成數合之則一節之數分置五方方各九者一時九十日之數四方成四時也三宮相對止十五者為一氣之數成二十四氣也尚書供範云初一曰五行位在北方陽氣之始萬物將萌次二曰敬用五事位在西南方謙虛就德朝謁嘉慶次三曰農用八政位在東方耕種百穀麻枲蠶桑次四曰叶用五紀位在東南方日月星晨雲雨並興次五曰建用皇極位在中宮百官立表政化公卿次六曰乂用三德位在西北抑伏強暴斷制獄訟次七曰明用稽疑位在西方決定吉凶分別所疑次八曰念用庶徴位在東北肅敬德方狂僭亂行次九曰嚮用五福威用六極位在南方萬物盈實陰氣宣布時成歲德陰陽和調五行不忒故黃帝九宮經云戴九履一左三右七二四為角六八為足五居中宮總御得失其數則坎一坤二震三巽四中宮五乾六兌七艮八離九太一行九宮從一始以少之多順其數也配算曰中央及四仲各分九算命云木落歸本分六至亥故取震六算以置於乾水流向末分八至丑故取坎八算以置於艮金義而堅分二還未故取兌二算以置於坤火本炎盛自處其鄉故離算不動土王四季本生於巳故分中宮四算以置於巽故成戴九履一之位也又初成八卦之法命方之算先取北方九算命曰水生木縱一算置寅上一算置卯上一算置辰上又橫一算置甲上一算置乙上次取東方九算命曰木生火於南方布五位又取南方之算命曰火生土於中央一算於西北為戊一算於西南為己又取中央之算命曰土生金於西方布五位又取西方之算命曰金生水於北方布五位五方布十干十二支位訖然後加陰干各一命曰陰數偶也次加陽支各一命曰支體本加其始餘算十二月之數也一算置西北命曰乾之始也二算置西南命曰坤之始也又餘算九置于中央為易象也命曰乾主甲壬即取甲壬上算以成乾卦又命曰坤主乙癸次取乙癸上算以成坤卦父母之卦爻象既定次及六子先起長男命曰震主庚子午即取庚及子午上算以成震卦又次長女命曰巽主辛丑未次取辛及丑未上算以成巽卦又次中男命曰坎主戊寅申次取戊及寅申上算以成坎卦又次中女命曰離主己卯酉次取己及卯酉上算以成離卦又次少男命曰艮主丙辰戌次取丙及辰戌上算以成艮卦又次少女命曰兌主丁巳亥次取丁及巳亥上算以成兌卦八卦既成問曰八卦從何而始曰因五行生又問五行因何生曰因天地生天地因何生曰因太一生太一因何生曰因易生故云易有太極是生兩儀故變易字為太一變太一字為天天一生地二生也變天字為水天生水也變水字為木水生木也變木字成火木生火也變火字成土火生土也變土字成金土生金也變金字成八卦字八卦因五行生也變八卦字為十二月字八卦所主月也變十二月字成地出萬物以終歸乎地也此九宮八卦創制之法備矣九宮數一起自北方始者坎一正北應天之始始無二故一北方五行之始所以五行在北方故云陽氣之始萬物將萌五事數二在西南者五事貌言視聽思也別在後篇解因五行而有五事次之故二又云坤二在西南應地之數西南林鐘之管氣之次二也五事人事之先也故曰謙虛就德朝謁嘉慶並五事所主也八政之數三在東方者八政食貨祀司空司徒司寇賓師也既有五事次修八政故三又云震三正東應人之數三才義畢東方春農之始也食者耕種炊烹也貨者畜積儲博錢布金兵也祀者祭祀供神也司空者土地畝也司徒者民戶口大小數也司寇者禁備盜賊糾察非常也賓者注籍往來受容嘉慶也師者教制農夫耒耜設法故云耕種百穀麻枲蠶桑也五紀數四在東南者五紀歲日月奉化日辰曆數也八政既修非歲時日月無以敷播植次之故四又云巽四東南風行四時以應四時之數東南巳純乾用事乾主天巽主號令故居東南歲者以四時有序盛衰始終也日月者照明萬物氣候遠近也奉化者即仰王化須建功貢寶也日辰者次序陰陽斷制産物也曆數者記綴度數農夫候望賦斂隨時也故曰王者惟歲稅數握成以化下也卿士惟月奉化行道以立寶師允惟日陳列衆職制作於萬品歲月日時無易修務敬時以順紀也故云日月星辰雲雨並興也皇極數五在中央者皇王建萬國處中分別四方百官以治萬事畢理歲時成就職貢均等租稅五穀以供王事故在其中央中央之數本五也又云土居中央應五行之數若王者動不得中則不能建萬事故曰皇之不極是謂不建也故曰百官立表政化公卿也三德數六在西北者三德正直剛尅柔尅乾為天位人君之象過五故數六又云乾在西北陰陽氣分於西北故應六律之數也西北乾之所處故人君居之正直者人德也君子方正以義無所曲私故云平康正直不疑其德剛尅者天德也法度不失輕重罪服故曰沈潛剛尅柔尅者地德也有德秩祿安定衆職賞賜萬國故曰高明柔尅故云抑伏強暴斷制獄訟也稽疑數七在西方者稽疑者建立卜筮問疑擇善占天地之象以定吉凶蓍圓卦方龜筮共知可否三人占從二人之言昔者聖人愼謀重始動事作業樹本開基決嫌定疑必謀以賢知以耆艾參以蓍龜故舉無過事慮無失計蠻夷雖無君臣之序亦有決疑之卜或以金石或以木草故知稽疑之事聖人所尚以其次乾之後故數七也又云兌正西卯酉為天地之門卯主始酉主終故斗指卯則萬物皆出指酉則萬物皆入兌應七星之數兌為金主悅言故在西方故云決定吉凶分別所疑也庶徴數八在東北者庶徴者衆徴也王者以及衆庶莫不內省咎過外察徴祥順徴知機則無禍患不審其過不念庶徴則禍至不悟敗亡無日矣有機徴見者必恭事上帝用不為過則降以福應詩云昭事上帝允懷多福如不共御善不畏上帝羣神乃怒必有譴罰數八者次七後也又云艮八在東北艮是止義艮為徑路萬物大出於震小出於艮震為衆男之長艮為衆男之少故應八卦之數艮既為止令止惡就善也故在東北故云肅敬德方狂僭亂行五福六極數九在南方五福壽富康寧攸好德考終命壽者孝悌道德備然後修神丹延壽命富者德化所及豐穰無闕康寧者國化安寧長樂無事攸好德者論理比類進善抑惡者考終命者順時成務可以壽命統著善德六極者凶短折疾憂惡貧弱凶短折者斬梟誅裂大罪也疾者榜笞毆擊疾臥養視也憂論作望兢朝日也惡髠𨱫赭剝戮辱固棄也貧償贓賦沒財産也弱離邑里徙邊地以戒後也此罪罰之理居後故數九又云離既在午以為子衝極則還反故離最其末以為九宮之數離為明人君南面以聽政象離之明刑罰須明故在南方故云萬物率盈實也宮唯有九不十者八方與中央數終於九上配九天九星二十八宿下配五嶽四瀆九州也九宮經言一主恆山二主三江三主太山四主淮五主嵩高六主河七主華山八主濟九主霍山又一為冀州二為荆州三為靑州四為徐州五為豫州六為雍州七為梁州八為兗州九為揚州九州之名互有改變禹貢九州即此配唐時名同者以堯命禹治洪水分九州因而不易故周虞有十二州加幽并營舜以靑州越海分齊為營州冀州南北太遠分衛為并州燕以北分置幽州殷時九州有幽營無靑梁周官九州有幽并無徐梁漢立十二州增交益焉冀州者釋名云冀州取地為名有險易帝王所都太康地記曰冀近其氣相近也其地自太行東至碣石王屋砥柱禹貢云冀既載呂氏春秋云兩河之間為冀州正北方荆州者釋名云荆警也南蠻數為寇逆州道先強當警備之也其地北據荆山南及衡山之陽禹貢云荆及衡陽惟荆州爾雅云漢南曰荆州呂氏曰荆楚也靑州者釋名云靑在東生也太康地記曰少陽色靑歲始事首即以為名其地東北據海西距岱禹貢云海岱惟靑州呂氏云東方海隅靑州齊也徐州者釋名曰徐舒也土氣舒緩也其地東至海北至岱南及淮禹貢云海岱及淮惟徐州呂氏云泗上為徐州魯也爾雅云濟東曰徐州豫州者釋名曰豫在九州之中安豫也太康地記云稟中和之氣性理安舒其地南據荆北距河禹貢云荆河惟豫州呂氏云河漢之間為豫州爾雅云河南曰豫州雍州者太康地記云雍居西北之位陽所不至陰氣壅閼取以為名其地西據黑水東距西河禹貢云黑水西河惟雍州呂氏云雍州秦也爾雅云河西曰雍州梁州者太康地記云梁者剛也取西方金剛之氣剛強以為名也其地東據華山西距黑水禹貢曰華陽黑水惟梁州兗州者釋名云取兗水為名太康地記曰辨其履信稟貞正之意也其地東南據濟西北距河禹貢曰濟河惟兗州揚州者釋名云揚州多水水波揚也其地北據淮東距海禹貢云淮海惟楊州呂氏曰楊州越也爾雅曰江南曰楊州今依九宮之位冀州正北在坎宮荆州西南在坤宮靑州正東在震宮徐州東南在巽宮豫州中央在中宮雍州西北在乾宮梁州正西在兌宮兗州東北在艮宮揚州正南在離宮其位與此解相似太一以兗州在正北坎位靑州在東北艮位徐州在正東震位揚州在東南巽位荆州在正南離位梁州在西南坤位雍州在正西兌位冀州在西北乾位此並從五行本始之氣西北亥地故坎水居之東北寅地故震木居之東南巳地故離火居之西南申地故兌金居之乾為金故從本金位巽為木故從本木位坤艮俱土故取地之經居正南正北此並依周禮職方之始位雖宮位微移五行氣一此九州上對九天分二十八宿屬焉淮南子云中央鈞天數五其星角亢氐韓鄭分鈞極也布極四方亦曰極天為四行主對中宮豫州東方蒼天數三其星房心尾房心宋分尾燕分東方色靑也對震宮靑州東北變天數八其星箕斗牛箕燕分斗吳分牛岱分水之季陰氣盡陽始作萬物將變對艮宮兗州北方玄天數一其星女虛危室女越分虛危齊分室衛分水色黑故云玄天對坎宮冀州西北幽天數六其星壁奎婁壁衛分奎婁魯分金之季即太陰幽暗也對乾宮雍州西方昊天數七其星胃昴畢胃魯分畢昴趙分金色白故曰昊天對兌宮梁州西南朱天數二其星觜參井觜參晉分井秦分居火之季陽色朱也對坤宮荆州南方炎天數九其星鬼柳星鬼秦分也柳星周分也火性炎上故曰炎天也對離宮揚州東南陽天數四其星張翼軫張周分翼軫楚分木之季將即太陽故曰陽天也對巽宮徐州此九天亦屬北斗九星之數故下對九州炎天數九屬斗第一樞星應離宮對揚州變天數八屬斗第二璇星應艮宮對兗州昊天數七屬斗第三璣星應兌宮對梁州幽天數六屬斗第四權星應乾宮對雍州鈞天數五屬斗第五衡星應中宮對豫州陽天數四屬斗第六開陽星應巽宮對徐州蒼天數三屬斗第七瑤光星應震宮對靑州朱天數二屬斗第八星應坤宮對荆州玄天數一屬斗第九星應坎宮對冀州屬斗第八第九二星陰而不見以其對陰宮也又郭璞易占云乾一坤二震三巽四坎五離六艮七兌八占人及物數皆準此蓋以父母男女為次也此九宮八卦之數故以備釋五行大義卷第一終

body:
  text: 五行大義卷第四上儀同三司城陽郡開國公蕭吉撰第十五論律呂第十六論七政第十七論八卦八風第十八論情性第十九論治政第十五論律呂春秋元命苞云律之為言率也續漢書云律術也律書云呂序也序述四時之氣定十二月之位也陰陽各六合有十二陽六為律陰六為呂律六者黃鐘大蔟姑洗蕤賓夷則無射也呂六者林鐘南呂應鐘大呂夾鐘仲呂也史記云律曆者天所以運五行八正之氣成熟萬物也帝王世紀云黃帝使伶倫於大夏之西崑崙之陰取竹解谷其竅厚均者斷兩節間吹之以為黃鐘之管以象鳳鳴雌雄各六以定律呂以分星次伶洲鳩曰律所以立均出度也故云紀以三平以六成以十二天之道也此六中之元古之神瞽考中聲而量之以制度律均鐘故名黃鐘所以宣養六氣二曰大蔟所以金奏乃贊陽出滯三曰姑洗所以修潔百物考神納賓四曰蕤賓所以安靜神人獻酬交酢五曰夷則所以詠歌九則平民無二六曰無射所以宣布哲人之令德示民軌儀為之六間以揚沈伏而黜散越元間大呂助宣物也二間夾鐘出四隟之細三間中呂宣中氣也四間林鐘和展百事俾莫不任肅純恪也五間南呂贊陽秀也六間應鐘均利器用俾應復也律呂不易無姦物也三禮義宗云律者法也言陽氣施生各有其法呂者助也助暢成功一云律帥也帥導陽氣使之通逹也呂者侶也以對於陽與之為侶亦呂距也諧陰陽之氣有時相距明陽出則陰除陰升則陽損故有相距之意續漢書云陽以圜為形其性動陰以方為節其性靜動者數三靜者數二以陽生陰而陪之以陰生陽半之皆以三而一陽生陰曰下生陰生陽曰上生皆參天兩地圓蓋方覆六偶承奇之道也淮南子云數始於一一而不能生故分為陰陽陰陽合而生萬物故一生二二生三三生萬物故三月為一時所以祭有三飯喪有三踊兵有三令皆以三為節三三如九故黃鐘之律九寸而宮音調因而以九之九九八十一黃鐘之數立焉黃鐘之氣在子十一月建焉其辰在星紀下生林鐘林鐘之數五十四氣在未六月建焉其辰鶉火上生大蔟大蔟之數七十二氣在寅正月建焉其辰諏訾下生南呂南呂之數四十八氣在酉八月建焉其辰壽星上生姑洗姑洗之數六十四氣在辰三月建焉其辰大梁下生應鐘應鐘之數四十二氣在亥十月建焉其辰折木上生蕤賓蕤賓之數五十六氣在午五月建焉其辰鶉首上生太呂太呂之數七十六氣在丑十二月建焉其辰玄枵下生夷則夷則之數五十一氣在申七月建焉其辰鶉尾上生夾鐘夾鐘之數六十八氣在卯二月建焉其辰降婁下生無射無射之數四十五氣在戌九月建焉其辰大火上生中呂中呂之數六十氣在巳四月建焉其辰實沈辰之與建交錯為表裏即其合然相生以乾坤六體為之黃鐘初九下生林鐘初六又上生大蔟樂緯云黃鐘中宮數八十一以天一地二人三之數以增減律成五音中和之氣增治上生減治下生上生者三分益一下生者三分減一益者以四乘之以三除之減者以二乘之以三除之三禮義宗云凡黃鐘之管本長九寸所以九者陽數之極也數之所起起自於三三才天地人之道合成數故曰三才是以天地人各有三數陽得兼三故稱九陰但兼二故稱六以陽得氣兼三故因而三之三三如九故陽數九為極所以管用九寸以度陽氣陽氣應時而發此自然神驗者也又上生大蔟九二又下生南呂六二又上生姑洗九三又下生應鐘六三又上生蕤賓九四又下生大呂六四又上生夷則九五又下生夾鐘六五又上生無射上九又下生中呂上六所以同位象夫妻異位象母子所謂律娶妻而呂生子者也白虎通曰黃鐘何黃中和之氣鐘者動也言陽於黃泉之下動萬物也淮南子云黃土色鐘者氣之所動黃鐘為君冬至得之三禮義宗云鐘應也言陽氣潛動於黃泉之下應養萬物萌牙欲出大呂大者太也呂者距也言陽氣欲出陰距難也淮南子云呂者旅也旅而支也三禮義宗云呂助也十二月陽方生長陰氣助之生育之功其道廣大也故一云呂者侶也與陽為侶對生萬物大蔟言萬物始大湊地而出也淮南子云萬物蔟而未出也三禮義宗云蔟者湊之義也正月之時萬物始大蔟地而出夾鐘者言萬物孚甲種類而出也淮南子云種始夾也三禮義宗云夾者佐也二月之中物未盡出陰佐陽氣應物而出一云夾者俠也言萬物為孚甲所俠至此方解鐘應而出姑洗者姑者古也洗者鮮也萬物去故就新莫不鮮明也淮南子云姑洗陳去而新來也三禮義宗云姑者枯也洗濯之義三月物生新潔洗除其枯也中呂者萬物當中皆出也淮南子云中充也三禮義宗云呂者距難之義言陰欲出陽氣在於中距執之一云呂者四月之時陽氣盛長陰助功微故云爾蕤賓者蕤下也賓敬也言陽氣下降故敬之也淮南子云蕤賓安而服也三禮義宗云蕤者垂下之義賓者微也五月陽氣下降陰氣始起共相賓敬林鐘者林衆也萬物成熟種類衆多也淮南子云林鐘引而止之也三禮義宗云林茂盛也六月之中物皆盛茂聚積於野故為林也夷則者夷傷也則法也言萬物始傷被刑法也淮南子云夷則易其則也三禮義宗云夷平也則法也七月萬物將成平均結實皆有法則德吉也南呂者南任也言陽氣有任生孳長也淮南子云南呂者任苞大也三禮義宗云南任也八月之中物皆含秀有懷任之象助成功之義無射者射終也言萬物隨陽而終當復隨陰而起無終已也淮南子云無射者人之無厭也三禮義宗云射厭也厭惡之義九月物皆成實無可厭惡應鐘者言萬物應時而鐘下藏也淮南子云應其所鐘三禮義宗云十月之時歲功皆成陰氣之用應陽之功收而聚積故云鐘也亦云應者應和之義言此時將復應陽氣而動於下也樂緯云黃鐘為宮林鐘為徴大蔟為商南呂為羽姑洗為角應鐘為變宮蕤賓為變徴以次配之五音備矣黃鐘下生林鐘故林鐘為徴次黃鐘林鐘上生大蔟故大蔟為商次林鐘大蔟下生南呂故南呂為羽次大蔟南呂上生姑洗故姑洗為角次南呂姑洗下生應鐘故應鐘為變宮次姑洗應鐘上生蕤賓故蕤賓為變徴凡有七音圜相為宮七音者蓋以相生數七故也始黃鐘生林鐘自十二月至六月凡七月也服虔解云七律為七音外傳解云武王剋商歲在鶉火日在天駟鶉火去天駟凡七宿又地辰日在甲子從子至午又七天象地辰其數皆七聖人以律同其數以聲招之故以七音樂以七律配七始故以定三元四時故黃鐘以配天林鐘以配地大蔟以配人姑洗以配春蕤賓以配夏南呂以配秋應鐘以配冬凡三元者周以建子月為天正故黃鐘之管配之殷以建丑月為地正應以大呂之管配之但陰數偶未土王又為天社故取其衝應地之氣以林鐘之管配之夏以建寅月為人正故大蔟之管配之夫陽德自處故以即位為正陰德在他故取其衝漢書律曆志云三元者天施地化人事之紀也十一月乾之初九陽氣伏於地下始著為一萬物萌動鐘於太陰故黃鐘為天元律長九寸九者所以窮極中和為萬物之元也易曰立天之道曰陰與陽是也六月坤之初六陰氣受任於太陽繼養化軟萬物生長楙之未令種剛強大故林鐘為地元律長六寸六者所以陰承陽之施樹之於六合之內令剛柔有體也立地之道曰柔與剛是也乾知太始坤作成物正月乾之九三萬物捸通蔟出於寅人奉而成之仁以養之義以行之令事物各得其理寅木也為仁其聲商也為義故大蔟為人元律長八寸八象於卦庖義氏之所以順天地通神明類萬物之情也立人之道曰仁與義是也在天成象在地成形后以裁成天地人道是為三元律之始也感精符云十一月建子天始施之端謂之天統周正服色尚赤象物萌色赤也十二月建丑地始化之端謂之地統殷正服色尚白象物牙色白正月建寅人始化之端謂之人統夏正服色尚黑象物生色黑也此三正律者亦以五德相承以前三皇為正謂天皇地皇人皇皆以天地人為法周而復始其歲首所書乃因以為名欲體三材之道而君臨萬邦故受天命而王者必調六律而改正朔受五氣而易服色法三正之道也周以天統服色尚赤者陽道尚左故天左旋周以木德王火是其子火色赤左行用其赤色也殷以地統服色尚白者陰道尚右其行右轉殷以水德王金是其母金色白故右行用其白色夏以人統服色尚黑者人亦尚左夏以金德王水是其子水色黑故左行用其黑色又云帝王之興多從符瑞周感赤雀故尚赤殷致白狼故尚白夏錫玄圭故尚黑此皆先兆氣王之符子母相助之義如漢以火德鎮星之精降為黃石授子房以兵信助沛公而滅楚非五運之色相扶為用孔子云夏正得天此謂得天道四時之氣應八節生殺之期也故云行夏之時乘殷之輅服周之冕兼三代而為法蓋取其可久者也秦以建亥之月而為歲首漢初因秦正朔自魏已後自用夏正至今無改以其得天氣也又遁甲太一九宮元辰皆有三元並起甲子初為天元盡六甲次甲子為地元又次甲子為人元遁甲以冬夏二至後甲己之日夜半時為甲子元首三元各分為三故一百八十日為元卒陰陽兩道盡一歲之用太一以初元甲子六十年為一紀次甲子為第二紀滿六紀三百六十年為一周九宮別以己亥為元首分為五元初己亥六十年為天元次己亥六十年為地元次己亥六十年為人元次己亥六十年為河元次己亥六十年為海元九年一周四九三十六亦周六甲之大數也三元正朔並從律呂應歷定時皆配五行故同此釋第十六論七政夫七政者乃是玄象之端正天之度王者仰之以為治政故謂之政七者數有七也凡有三解一云日月五星合為七政二云北斗七星為七政三云二十八宿布在四方方別七宿共為七政此三種七政皆配五行並三辰之首也日月五星為七政者尚書考靈耀七政曰日月者時之主也五星者時之紀也故曰在璇璣玉衡以齊七政七政五政謂五行之政七政即日月五星也日者河圖汙光篇云日為陽精始日實也元命苞云陽以一起故日日行一度陽成於三故有三足烏烏者陽精其言僂呼俗人見僂呼似烏故以名之又云火精陽氣故外熱內陰象烏也日尊故滿滿故施施故仁仁故精精在外在外故大日外暑外暑故陽精外吐天有三百六十五度四分度之一布在四方日日一歷無差遲使四方合如一故其字四合一也白虎通云日徑千里圍三千里下於天七千里太玄經云日一南萬物死日一北萬物生物理論云夏則陽盛而陰衰故晝長而夜短冬則陰盛而陽衰故晝短而夜長行陽道長出入卯酉之北行陰道短出入卯酉之南春秋陰陽等故行中道晝夜等也考靈耀云春一日日出卯入酉昴星一度中而昏斗星十二度中而明仲夏一日日出寅入戌心星五度中而昏營室十度中而明秋一日日出卯入酉須女四度中而昏東井十一度中而明仲冬一日日出辰入申奎星一度中而昏氐星九度中而明卯酉陰陽交會日月至此為中道萬物盛衰出入之所故號二八之門以當二八月也故詩推度災云卯酉之際為改政漢書天文志云日者君之象君行急則日行疾君行緩則日行遲遲疾失其常則蝕蝕在交道也蝕者陰侵陽臣凌君之象也故日蝕修德以攘之月者春秋元命苞云月者陰精為言闕也中有蟾蜍與兔者陰陽兩居相附託抑詘合陽結治其內光炬中氣似文耳兔善走象陽動也兔之言僖呼僖呼溫暖名也月水之精故內明而氣冷陰生不滿者詘於君也至望而盈者氣事合也盈而缺者詘嚮尊也其氣卑卑故修表成緯陰受陽精故精在內所以金水內景內景故陰精沈執不動月為陰精體自無光籍日照之乃明猶如臣自無威假君之勢乃成其威月初未政對日故無光缺月半而與日相對故光滿十六日已後漸缺亦漸不對日也漢書天文志云月日行十三度四分度之一立春春分東從靑道立秋秋分西從白道立冬冬至北從黑道立夏夏至南從赤道季夏行中道赤靑出陽道白黑出陰道晦而見西方謂之朓朔而見東方謂之朒若君舒緩臣驕慢故日行遲而月行疾君肅急則臣恐懼故日行疾而月行遲不敢迫近君位也其行遲疾失度亦蝕蝕者當日之衝有暗虛暗虛當月則月蝕當星則星亡月蝕者陽侵陰也董仲舒云於人妃后大臣諸侯之象月為刑故月蝕修刑以攘之五星者説文云星者萬物之精或曰日分為星故其字日下生史記云星金之散精星隕為石此金是也春秋云隕石于宋隕星也又云星者陰精金亦陰也別而言之各配五行不獨主金歲星木之精其位東方主春蒼帝之子人主之象五星之長司農之官主福慶凡有六名一名攝提二名重華三名應星四名纆星五名紀星六名修人星其所主國曰吳齊超舍而前為盈退舍為縮行邪則主邪行正則主正政急則行疾政緩則行遲酷則行陰和則行陽行陽則旱行陰則水治則順度亂則逆行以其主歲故名歲星熒惑火之精其位南方主夏赤帝之子方伯之象五星之伯上承太一下司人君謂天子理也伺無道出入無常為天伺察所往主兵亂賊喪飢疾凡有二名一名罰星二名執法其所主國曰荊越是太白之雄出南為熒惑居西為天理在東為縣息以其出入無常故名熒惑鎮星土之精其位中央主四季女主之象主德為五星之王一名地候伺女主之邪正入陽則為外入陰則為內四星皆失鎮星乃為動以其鎮宿不移故名鎮星太白金之精其位西方主立秋白帝之子大將之象以司兵凶日南方太白居其南日北方太白居其北曰盈日南方太白居其北日北方太白居其南曰縮未可出東方而出東方名重華未可下東方而下東方名少歲未可出西方而出西方名太白未可下西方而下西方名白肖凡有六名一名天相二名天政三名大臣四名大皓五名明星六名大囂詩云東曰啓明西曰長更其所主國曰秦晉鄭太白是歲星之雄太白主兵兵西方金色白故曰太白辰星水之精其位北方主冬黑帝之子宰相之象主刑政酷則不入政和則不出凡有六名一名安調二名細極三名熊星四名鈎星五名伺農六名勉星其所主國曰趙代辰星主德是天之執正出入平時故日辰星星經云五車西北第一星曰太白次北一星曰辰星次東北一星曰歲星次東南一星曰鎮星次西南一星曰熒惑此當五星分氣也又云歲星變為彗星欃雲槍雲天狗熒惑變為彗星蚩尤旗格澤鎮星變為獄漢天沸旬始虹霓太白變為彗星即掃辰星變為狂矢天槍天棓並是五星氣亂見妖星也王者視之以知得失考靈耀云歲星為規熒惑為矩鎮星為繩太白為衡辰星為權權衡規矩繩並皆有所起周而復始故政失於春歲星滿偃不居其常政失於夏熒惑逆行政失於季夏鎮星失度政失於秋太白失行出入不當政失於冬辰星不效其鄉五政俱失五星不明春政不失五穀孳夏政不失甘雨時季夏政不失時無葘秋政不失人民昌冬政不失少疾喪五政不失日月光明此則日月五星共為七政之道亦名七耀以其是光耀運行也北斗為七政者北斗天樞也天有七紀斗有七星第一至第四為魁第五至第七為瓢合有七也尚書緯云璇璣斗魁四星玉衡拘橫三星合七齊四時五威五威者五行也五威在人為五命七星在人為七端北斗居天之中當昆崙之上運轉所指隨二十四氣正十二辰建十二月又州國分野年命莫不政之故為七政虞録云北斗七星據璇璣玉衡以齊七政政者天子所治天下故王者承天行法合誠圖云北斗有七星天子有七政斗者居陰布陽故稱北斗其七星各有四名合誠圖云斗第一星名樞二名璇三名璣四名權五名衡六名開陽七名標光黃帝斗圖云一名貪狼子生人所屬二名巨門丑亥生人所屬三名祿存寅戌生人所屬四名文曲卯酉生人所屬五名廉貞辰申生人所屬六名武曲巳未生人所屬七名破軍午生人所屬孔子元辰經云一名陽明星二名陰精星三名真人星四名玄冥星五名丹元星六名北極星七名天開星遁甲經云一名魁真星二名魁元星三名權九極星四名魁細星五名魓剛星六名𩳐紀星七名飄玄陽星第一水二水土三木土四金木五金土六火土七火所以子午各獨屬一星其餘並兩辰共屬者子午為天地之經斗第一及第七魁剛兩星亦是斗之經建所用指也自餘非所指者故並兩屬故六十甲子從第一起甲子以配之往還周旋盡其數矣北斗領二十八宿一星主四時魁起室剛起角以次分屬若人行年至室而五星行到此宿者隨星吉凶也合誠圖云樞星為雍州璇星為冀州璣星為靑兗州權星為徐楊州衡星為荆州開揚星為梁州標光星為豫州此為三材之道並為斗之所政也二十八宿為七政者以其分定國邦布官設位也運斗樞云天有將相之位佐列宿為衛皆據璇璣玉衡以齊七政四時布德三道正氣尚書考靈耀云二十八宿周天三百六十五度四分度之一故叶時月正日度星二十八宿配五行有二別一總配二別配總配者東方蒼龍七宿角亢氐房心尾箕木也合三十二星七十五度南方朱雀七宿東井輿鬼柳七星張翼軫火也合六十五星一百十二度西方白虎七宿奎婁胃昴畢觜參金也合五十一星八十度北方玄武七宿斗牽牛須女虛危營室東壁水也合三十五星九十八度其屬土者東則角亢南則井鬼西則奎婁北則斗牛皆居四季為土也曾子云春分鳥星昏主春者中可以種稷夏至心星昏主夏者中可以種黍菽秋分虛星昏主秋者中可以種麥冬至昴星昏主冬者中山人可以伐器械家人可以收萑葦蓄積田獵王者坐視四星之中而知民之緩急急則不賦力役故曰敬授民時也此為總配別配五行者角二星為天門三光之路十二度於時在辰鄭分木也亢四星為天庭尚書之曹九度於時在辰鄭分春夏為火秋冬為水也氐四星為宿宮路寢所止十五度於時在卯宋分春夏為金秋冬為水也房六星為明堂政教之道五度於時在卯宋分土也心三星為天王之位五度於時在卯宋分春夏為木秋冬為火也尾九星為后宮妃嬪之府十八度於時在寅燕分水也箕四星為王后所居進御之寢十一度於時在寅燕分木也春夏為金秋冬為土也斗六星為主爵祿褒賢進士二十六度於時在丑吳分木也牽牛六星為主橋梁七政之始八度於時在丑吳分木也須女四星為主布帛天之內藏十二度於時在子越分春夏為水秋冬為火也虛二星為厭堂主祭祀事十一度於時在子齊分春夏為水秋冬為金也危三星為墳墓以識先祖十七度於時在子齊分春夏為水秋冬為火也營室二星為主軍糧以稟士卒十六度於時在亥衛分春夏為木秋冬為土也東壁二星為文章圖書之府九度於時在亥衛分春夏為金秋冬為水也奎十六星為五兵之庫禁禦暴亂十六度於時在戌魯分春夏為金秋冬為火也婁三星為苑牧主給享祠十二度於時在戌魯分春夏為水秋冬為火也胃三星為倉廩五穀所聚十四度於時在酉趙分春夏為木秋冬為水也昴七星為主獄事典治決斷十一度於時在酉趙分春夏為火秋冬為金也畢八星為邊兵備夷狄十度於時在酉趙分春夏為金秋冬為水也觜觿三星為保藏收檢秋物二度於時在申晉分春夏為火秋冬為土也參伐十星為天大將斬刈收穫九度於時在申晉分春夏為火秋冬為土也東井八星為主水衡以法平時三十三度於時在未秦分春夏為火秋冬為水也輿鬼五星為視明主察姧謀四度於時在未秦分春夏為水秋冬為火也柳八星為上食主和滋味十五度於時在午周分春夏為水秋為火也星七星為衣裳主蓋身體七度於時在午周分春夏為火秋冬為水也張六星為主客賜與宴嬉十八度於時在午周分水也翼二十二星為天唱主以戲虞十八度於時在巳楚分春夏為木秋冬為金也軫四星為死喪以知災凶十七度於時在巳楚分春夏為木秋冬為土也漢書天文志云角亢氐韓鄭兗州之分房心宋豫州之分尾箕燕幽州之分井鬼秦雍州之分柳七星張三河之分翼軫楚荆州之分奎婁胃魯徐州之分昴畢趙冀州之分觜參魏梁州之分斗江湖之分牽牛須女吳楊州之分虛危齊靑州之分室壁衛并州之分此皆當分所主正其州國善惡故為政也石氏天官訓解云角二星是蒼龍之首上角兩角間天之道日月五星所行故名角亢為朝廷對揚于王夙夜謀咨四海之內故名亢氐是正寢冰解之室故名氐房是天子四時所居故名房心前一星為太子中為天子後一星為庶子如人心處中為身之主故名心尾是東方蒼龍宿之尾故名尾象形也箕近斗象播揚五穀故名箕斗量器也斟酌爵祿其形似斗故名斗牛亦象牛角七政之始故名牛女方正裁割之象婢妾之類故名女虛耗也其間空虛廟堂之象故名虛危似室屋亦如墳墓故名危營室有六星為離宮似宮室故名室壁直立似壁孔子藏書於壁效此義也故名壁奎為庫主兵形象庫周密故奎乖也兵以乖違故舉所以名奎婁如樓閣亦似鐘婁故養犧牲以為名胃在藏為五穀之府主廩倉故以為名昴悴聚如囚之在牢獄故主獄事昴星也聚則憂故名為昴畢邊夷毛頭之類如天子警畢毛頭唱之畢了唱以警衆心故以名之也觜聚也為白虎之鼻聚在虎觜鬚間故以為名參共也雜金土之氣共行殺罰故名參井精也盛水亭乎精微之至此星象法度如水之平故名井鬼歸也陽歸於陰所以其內一星暗而不明鬼之象也故以為名也柳留也春秋傳曰或食於任柳一名任也祭祀鬼神合和五味留神靈也故以名之七星數七如鳥之衣覆上故以名之張開張也為朱鳥之嗉有容納故主賓客也翼如六翮似鳥兩翅之飛故以名翼軫似小車四方車後橫曰軫凶事之用故以為名其伏見邪正闕陵歷蝕散為夭異彗勃飛流如此之徒並以占候飛開義釋故不委具三種七政既配五行略説如此第十七論八卦八風八卦者周易云古者庖羲氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情兼三才而兩之故六晝而成卦因八方之通八風成八節之氣故卦有八其配五行者乾兌為金坎為水震巽為木離為火坤艮為土各以方位言之易通卦驗云艮東北主立春震東方主春分巽東南主立夏離南方主夏至坤西南主立秋兌西方主秋分乾西北主立冬坎北方主冬至坎居北方者冬至之日陽氣動於黃泉之下子雖大陰之位以陽氣動其下故其卦外陰內陽象水內明中懷陽也故居子位以配水艮在東北者其卦一陽在上象立春之時陽氣已發在於地上下有重陰象陰氣猶厚陽氣尚微艮既為山以其重陰在下積土深故卦復在丑丑為未衝故以配土震居東方者震為長男能主幹任故居顯明之地東方春也萬物咸得生出明淨顯著震為雷雷動則萬物出春分之時天氣下降地氣上騰天地和同萬物萠動故震居卯卯木少陽之位故以配木巽居東南者其卦重陽在上象立夏之時陽氣已盛在上陰氣微弱在於下木之為物入地最少出土最多巽卦二陽在上象木出地之多一陰居下象木入地之少木體是陽亦宜明顯故在東南以配於木離居南方者夏至之時陰動於黃泉之下午是盛陽之位而陰氣動故其卦外陽內陰象火外明內暗懷陰氣也故在南方以配火坤居西南者坤卦純陰之象能養萬物莫過於地也陰體卑順不敢當首陰動於午至未始著故坤後午之位地體積陰坤既純陰象地禮以中央土在未地即土也故在西南以配土也兌在西方者兌卦一陰在上象秋分之時陽氣已深金為少陰故一陰居上酉是金位故在西方以配金乾居西北者乾卦純陽之象生萬物者莫過乎天乾為生物之首陽氣起子乾是陽氣之本故先子之位以純陽堅剛故在西北以配金易傳曰震主春分穀雨穀雨得天兌則萬物畢生兌者西方之卦是時日在昴昴西方之宿以日在西故曰天兌貌順木得則天兌為和貌失木逆則天兌為害而常雨為罰兌主秋分霜降霜降得天震之動氣則天下霜萬物死震東方之卦是時日在房房東方之宿以日之在東方故曰天震言順金得則天震為和言失金逆則天震為害而旱罰所以貌雨言旱者震陽兌陰陽旱陰雨也木之所以雨金之所以旱者其人事貌失則下怨陰盛故雨言失則失衆孤陽獨立羣陰不附故旱春秋二時震兌相臨天地氣和所以不極寒熱也坎主冬至大寒大寒得天坎之氣則天下大寒是時日在虛虛北方之宿故曰天坎聽順水得則天坎為和聽失水逆則天坎為罰故常寒離主夏至大熱大熱發長復得天離之氣則天下大熱萬事畢出是時日在七星七星南方七宿故曰天離視順火得則天離為和視失火逆則天離為罰故常燠冬夏二時天地氣並坎離各當其方所以極寒熱也今分八卦以配方位者坎離震兌各在當方之辰四維四卦則丑寅屬艮辰巳屬巽未申屬坤戌亥屬乾八卦既通八風八方以調八節之氣故坎生廣莫風四十五日至艮生條風四十五日至震生明庶風四十五日至巽生清明風四十五日至離生景風四十五日至坤生涼風四十五日至兌生閶闔風四十五日至乾生不周風四十五日又至坎陽氣生五極九五九四十五故左行四十五日而一變也廣莫風者廣大也莫沙漠也寒氣廣遠自沙漠而來也亦云此時陽氣在下陰莫之廣大也條風者條逹也此時達生萬物也明庶風者庶衆也此時陽以施惠之德衆物皆明出也清明風者天氣明淨情涼也此時清風吹萬物使盛大明淨可觀也景風者景高也萬物至此太高也亦言景竟也陽道至此終竟也涼風者秋風涼也此時陰氣凄涼收成萬物也閶闔風者昌盛也此時萬物盛而收藏之也不周風者周遍也萬物備成不周者閉不通也言此時純陰無陽閉塞不通也淮南子曰東北方曰蒼門生條風東方曰開明門生明庶風東南方曰陽門生清明風南方曰暑門生景風西南方曰白門生涼風西方曰閶闔門生閶闔風西北方曰幽都門生不周風北方曰寒門生廣莫風蒼門者東北木將用事春之始故曰蒼門開明門者明陽也日之所出故曰開明門陽門者月建在巳純陽用事故曰陽門景門者盛衰之時故曰暑門白門者月建在申金氣之始故曰白門閶闔門者八月建在酉萬物將收閶大闔閉收閉之時故曰閶闔門幽都門者幽暗也玄冥將始用事陰聚故幽也故曰幽都門寒門者積寒所在故曰寒門此八極之方是八風之所起也呂氏春秋云東方滔風東南動風南方巨風西南凄風西方飄風西北厲風北方寒風東北炎風此意亦同於前太公兵書云坎名大剛風乾名折風兌名小剛風艮名凶風坤名謀風巽名小弱風震名嬰兒風離名大弱風大剛風者大陰之氣好殺故剛折風者金強能摧折物也小剛風者亦金殺故也凶風者艮在鬼門凶害之所也謀風者坤為地大陰之本多陰謀也小弱風者巽為長女故稱弱也嬰兒風者震為長男愛之故曰兒大弱風者離為中女又弱於長女也大剛小剛客勝大弱小弱主人勝凶有凶害之事謀有謀逆之人折為將死嬰兒風主人強此並兵家觀客主盛衰候風所從來也陽泉云春氣臑其風溫以和喜風也夏氣盛其風陽以貞樂風也秋氣徑其風熛以清怒風也冬氣冷其風凝以厲哀風也又四維之風隨生成之氣方土異宜各隨所感然風者天之號令治政之象若君有德令則風不搖條清和調暢若政令失則氣怒凶暴飛沙折木此天地報應之理也此皆五行之氣故並釋焉第十八論情性左傳子産云則天之明天有三光故曰明也因地之性性生也生萬物故因其所生而用之生其六氣用其五行五行者為五性也六氣者通六情也翼奉云五行在人為性六律在人為情性者仁義禮智信也情者喜怒哀樂好惡也五性處內御陽喻收五藏六情處外御陰俞收六體故情勝性則亂性勝情則治性自內出情從外來情性之交間不容系説文曰情人之陰氣有欲嗜也性人之陽氣善者也孝經援神契云性者人之質人所稟受産情者陰之數內傳著流通於五藏故性為本情為末性主安靜恬然守常情則主動觸境而變動靜相交故間微密也河上公章句云五性之鬼曰魂為雄六情之鬼曰魄為雌此明性陽情陰也六情既通六氣今先依服注左傳云六氣者陰陽風雨晦明也陰作土陽與風作木雨作金晦作水明作火唯天陽不變陰為土者土是陰義故陰凝為地風作木者風動也木亦動觸地而出箕星東方之宿主風又巽為木為風也雨作金者雨水也水性銷釋金性亦可銷釋畢星西方之宿主雨故詩云月離于畢雨俾滂沱矣故雨作金也晦作水者晦暗也晦暗則水生暗黑為水之色也明作火者明照於物故為火也皆從其類以之鄭玄注禮記云木為雨金為陽火為燠土為風水為寒震主春分春分穀雨得天兌則萬物畢生兌西方之卦是時日在昴昴西方之宿也以日在西方故謂天兌貌順木德則天兌為和故木為雨詩云習習谷風以陰以雨也金為陽者秋時日行東方房星之宿得天震之氣言順金德則天震為和震為陽也秋時物成所以燥物是其和也逆金氣則為旱罰故金為陽也土為風者傳云思心有失厥罰常風言風者土之氣也莊子曰大塊噫氣其名曰風土者為君君立教令故為風土立四季故令失則風為災也鄭以木為雨服以木為風服以金為雨鄭以金為陽鄭以土為風服以土為陰兩説煩反各有其意今就五行而辨服近之矣所以然者水生於金金體非陽木為少陽不應為雨土為地地本是陰風自是陰陽之氣不獨生於土服以木為風者取巽木故為當也六氣通於六情者好為陽惡為陰怒為風喜為雨哀為晦樂為明好為陽者陽氣好生是以為好惡為陰者陰氣好殺是以為惡怒為風者陽泉云風者陰陽孔氣激發而起猶人之內氣因喜怒哀樂激發起也曾子曰陰陽怒而為風喜而為雨者曾子曰陰陽和而為雨和潤故為喜也哀為晦者晦暗也愁則閉塞故暗所以為晦樂為明者樂則情舒散故明也漢書禮樂志云人含天地陰陽之氣有喜怒哀樂之情論衡曰人五藏以心為主心發智慧而四藏從之肝為之喜肺為之怒腎為之哀脾為之樂故聖人節之恐傷性也翼奉云好則膀胱受之水好前故曰好怒則膽受之少陽始盛萬物前萠也惡則小腸受之夏長養萬物惡偽故曰惡喜則大腸受之金為珍物故皆喜樂則胃受之土生養萬物上下皆樂哀則三焦受之陰陽之府陽升陰終其宮室竭故曰三焦故哀悽也論衡以四時論藏翼奉以風通六情論府睥腎二種藏府是同肝肺二藏及府不同者藏以肺有殺罰之性故怒府以合肺金珍之用故喜肝則以春氣生故喜膽則以合火能焚燎故怒二理並通又云喜氣為暖當春怒氣為睛當秋樂氣為陽當夏哀氣為陰當冬此與論衡意合翼奉云東方性仁情怒怒行陰賊主之南方性禮情惡惡行廉貞主之下方性信情哀哀行公正主之西方性義情喜喜行寬大主之北方性智情好好行貪狼主之上方性惡情樂樂行姧邪主之貪狼主求索財物既云貪狼理然求須陰賊主之劫盜此亦不疑廉貞主上客遷召寅為陽始午為陽盛故稱上客既有廉貞之性理自召任高遷寬大主酒食慶善寬大多所容納故有善慶善慶必置酒食姧邪主疾病淫欺淫欺故因邪惡而生邪惡必生疾病公正主執仇諍諫正故能爭公故能執仇讎也情好者水生申盛子水性觸地而行觸物而潤多所好故為好多所好則貪無厭故為貪狼申子主之情怒者木生亥盛卯性受水氣而生貫地而出故為怒卯木生於子水與卯還自相刑亥又自刑是以陰氣相賊故為陰賊亥卯主之貪狼必得陰賊而後動陰賊必得貪狼而後用二陰並行是以王者忌於子卯相刑之日也情惡者火生寅盛午火性炎猛無所容受故為惡其氣清明精耀以禮自整故為廉貞寅午主之情喜者金生巳盛酉金為寶物見之者喜又喜以利刃加於萬物故喜利刃所加無不寬廣為器則多容受故為寬大巳酉主之二陽並行是以王者吉於午酉之日情樂者謂北與東陽氣所萠生故為上亦主中央辰為水窮也木落歸本水流歸末故木刑在未水刑在辰盛衰各得其所故樂水窮則無隟不入木上出窮則旁行為斜故為姧邪辰未主之情哀者謂南與西陰氣所萠生故為下戌窮火也丑為金窮也金剛火強各歸其鄉故火刑在午金刑在酉金火之盛而被自刑至窮無所歸故曰哀火性無私金性剛斷故曰公正戌丑主之故曰五性居本六情在末情因性有性而由情情性相因故以備釋第十九論治政治政者治者治也治立為名政者正也不邪為稱百姓不能自治樹君以治之萬民不能自正立長以正之正使不邪治令不亂不亂故安不邪故善善則盜賊不興安則各保其業所以能勝殘去殺道路鴈行蚖蛇可跖驎龍可駕如此名政治也孔子曰為政以德譬如北辰居其所而衆星共之大戴禮云君者治之本無君焉治能法五行謂之合道所以寬猛喻之水火仁義取于金木順四序以教民資五材而為用任人任力理歸一揆春秋繁露治順五行篇云木用事其氣燥濁而靑七十二日火用事其氣燥陽而赤七十二日土用事其氣溫濁而黃七十二日金用事其氣堅凝而白七十二日水用事其氣清寒而黑七十二日復木之用事則行柔惠進經術之士至于立春出輕繫去稽留除桎梏開閉闔通障塞存幼孤矜寡獨此並順春之施也無伐木恩及草木則朱草此詩人所歌恩及行葦者也不伐木者不可違天陽生長之氣也若夫人君馳騁無度沈酒縱恣重徭役奪民時厚稅斂則民疾疹瘮患足疾傷春氣故皆木病也木傷敗則龍深藏木禽懼而不見也鯨鯢出而為禍鱗甲之蟲有金氣所以傷木也火用事則正封疆修田疇至于立夏舉賢良封有德賞有功出使四方此順火之化長養萬物也無縱火則火順人用甘露降鳳凰來黃鵠見鳳凰即朱雀之類喜故出見甘露黃鵠並子慶其母也若人君用讒佞離骨肉踈忠臣棄法令婦人為政則民病血腫國因不明火為災冬鴈不來鳥為怪火不善故鳥有變怪憂懼故不來也土用事養長老矜寡獨賜孝悌施恩澤順土寬和含養之德也無興土功宮室制度有差親戚之恩有序則五穀成嘉禾出賢聖來土氣順故嘉禾其和熟德景大故聖賢悅之而來若人君淫樂無度侮親老困百姓則民病腹心之疾心腹主土氣不和故病賢人隱藏百穀不登裸蟲為災土性傷故稼穡不成賢人惡之所以不見裸蟲土氣也傷故為變金用事修城郭繕墻垣審辟禁餝甲兵警百官誅不法此並順金以威嚴肅殺之氣也無焚金石則白虎見虎是金獸喜故出也若人君貪賂好用兵則民人病咳嗽筋攣鼻塞鼻主肺肺病故咳嗽而鼻塞此并金為疾也毛蟲金石為怪金氣傷故為變怪也水用事閉閭門執當罪餝關梁此並順水閉藏之義無決池堰恐水氣泄溢也如此則醴泉出恩及禽蟲則靈龜見書云澤及昆蟲者也甲蟲屬水喜故見也若人君廢祭祀簡宗廟執法不順逆天氣則民病流腫水脹痿痺孔竅不通此並水氣擁結之義聖人以水居太陰之位陰暗虛空比之宗廟人死精氣散越立宗廟以收之堂宇虛寂陰暗無人喻之水也廢於祭祀則孝道故太陰之氣感而病人為此疾也水為災害靈龜深藏鬼哭介蟲為怪介蟲屬水氣傷故為覆藏而不見也宗廟不祀魂氣傷怨故鬼哭也孝經援神契云木氣生風火氣生蝗土氣生蟲金氣生霜水氣生雹失政於木則風來應失政於火則蝗來應失政於土則蟲來應失政於金則霜來應失政於水則雹來應作傷致風侵至致蝗貪殘致蟲刻毒致霜暴虐致雹此皆并隨類而致也桓子新論曰人抱天地之體懷純粹之精有生之最靈者也是以貌動於木言信於金視明於火聽聰於水思睿於土五行之用動靜還與神通貌恭則肅肅時雨若言從則乂乂時暘若視明則哲哲時燠若聽聰則謀謀時寒若心嚴則聖聖時風若金木水火皆載於土雨陽燠寒皆發於風貌言視聽皆生於心尸子云心者身之君天子以天下受令於心心不當則天下禍諸侯以國受令於心心不當則國亡匹夫以身受令於心心不當則身戮故人心者乃天地之精羣生之本故政之治亂由於君之心也是以聖人受命而王莫不承天地法五行修五事而御宇宙養蒼生者也其制度法式皆五行為本車服威儀朝廷俯仰農桑播殖施惠慶賜木也尊卑上下制度禮式封爵賞功居高視遠火也宮室臺榭夫婦親戚布德含養祿袟赦宥土也兵戎器械獀狩武備刑罰獄禁金也宗廟祭祀儲積封藏餝喪制慕卜筮決疑水也因五行而致百官因百官而理萬事萬事理而四海安是政治之所由也其居處服御器用所從莫不本乎五行乃通治道也禮記云春之月天子居靑陽左個乘鸞輅駕蒼龍載靑旗衣靑衣服蒼玉夏之月居明堂左個乘朱輅駕赤駠載赤旗衣朱衣服赤玉中央土居太廟太室乘太輅駕黃駠載黃旗衣黃衣服黃玉秋之月居惣章左個乘戎輅駕白輅載白旗衣白衣服白玉冬之月居玄堂左個乘玄輅駕鐵驪載玄旗衣玄衣服玄玉考靈耀云春發令於外行仁政從天常其時衣靑夏可以毀清銷銅使備火敬天之明其時衣赤中央土舉有道之人與之慮國可以殺罪不可起土功犯地之常其時衣黃秋無毀金銅犯陰之剛用其時持兵宜殺猛獸其時衣白冬無使物不藏毋害水道與氣相保其時衣黑家語云孟春正月東宮衣靑綵鼓琴瑟其兵矛其樹柳仲春二月東宮衣樂兵如前其樹杏季春三月東宮衣樂兵如前其樹李孟夏四月南宮衣赤綵吹笙竽其樹桃其兵戟仲夏五月南宮衣樂兵如前其樹榆季夏六月中宮衣黃綵打大鼓其樹梓其兵弓孟秋七月西宮衣白綵撞洪鐘其樹楝其兵劍仲秋八月衣樂兵如前其樹柘季秋九月衣樂兵如前其樹槐孟冬十月北宮衣黑綵擊磬其樹檀其兵楯仲冬十一月北宮衣樂兵如前其樹櫟論時令以待嗣藏之宜周官云春為杜陳弓為前行夏為方陳戟為前行六月為圓陳矛為前行秋為牝陳劍為前行冬為伏陳楯為前行此武備亦依五氣也録圖云君乘木而王為人靑色修頸美髮其民長身廣肩尚仁長皆象木也仁木性也善則時草豐茂嘉穀並生鳥不胎傷木氣盛也失則列星滅色亂禾稼不登民多壓死木生而上出遇土傷則靑而不得起故壓死乘火而王為人赤色大目離為目故大視明也其人尖頭長腰疾敏尚孝長腰取兌敏疾火性離為日日有烏烏者孝也善則賢人任用政頌平駮馬文狐至馬火畜善故來狐亦前失則夏霜日是火精失故變蝕雨土猝蔽光明之象承土而王表其首首大表土也其人廣肩大足好大笑戲儛廣大象土和故逸樂也善則甘露降醴泉並應其善失則蟲蝗生天雨而常風霧亂皆土氣傷故表異也承金而王為人白色差肩耳面方毛也其民白頸長大尚義皆金氣也善則大貝明珠出外國遠貢珠貝金之用氣剛能制遠人故來貢獻失則火飛天鳴地圻河溢山崩邪人進蟲獸為災火能剋金金有失故火伐之乃飛承水而王為人黑色大耳坎為耳主腎水氣故大其民聰耳坎水孔穴通故聰善則景雲至龜龍被文皆水氣為祥也失則蟾蜍去月民多溺死常雨為害皆水之憂也此並明治政之道不越五行故以備釋五行大義卷四終

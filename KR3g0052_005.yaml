body:
  text: 五行大義卷第五上儀同三司城陽郡開國公蕭吉撰第二十論諸神第二十一論五帝第二十二論諸官第二十三論諸人就此分為二段一者論人配五行二者論人遊年年立第二十四論禽蟲就此分為二段一者論五靈二者論三十六禽第二十論諸神諸神者靈智無方隱顯不測孔子曰陽之精氣為神又曰陰陽不測之謂神一解云神申也萬物皆有質礙屈而不申神是清虛之氣無所擁滯故曰申也語其神也名有萬徒三材之道百靈非一竝從五行難可周盡今且論所配五行辨吉凶者帝系譜曰天地初起即生天皇以木德王三五曆紀云天皇十三頭帝系譜曰地皇以火德王三五曆云有神人十一頭號地皇春秋命曆序曰人皇九頭宋均注云兄弟九人洞紀云人皇分治九州古語質故以頭數言之陶華陽云此三皇治紫微宮其精為天皇太帝世紀云天皇太帝曜魄寶地皇為天一人皇為太一甘公星經云天皇太帝本秉萬神圖一星在勾陳中名耀魄寶五帝之尊祖也天一太一主承神承猶侍也有兩星在紫微宮門外俱侍星天皇太帝天一主戰鬭知吉凶甲戊庚壬王治玉堂宮乙己辛王治明堂宮丙丁癸王治絳宮是為三宮太神太一主風雨水旱兵革飢疫災害復使十六神遊於九宮天一是含養萬物太一是察災殃是為天帝之臣鄭玄注乾鑿度云太一者北辰神名居其所曰太帝行八卦日辰之閒曰太一或曰天一出入所逝息紫宮之外其星因以為名天一之行猶天子巡狩方嶽人君亦從而巡省每卒則復太一行八卦之宮每四季乃入於中央天數大分以陽出以陰入陽起於子陰起於午是以太一下行九宮從坎始也九宮經云天一之行始於離宮太一之行始於坎宮天一主豐穰太一主水旱兵飢合十二神遊行九宮十二位從少之多六壬拭經云十二神將以天一為主甲戊庚日旦治大吉暮治小吉乙己日旦治神后暮治傳送丙丁日旦治微明暮治從魁六辛日旦治勝先暮治功曹壬癸日旦治太一暮治太衝此竝紫微宮門外天一太一非紫微之內北辰之名大帝也鄭玄謬矣太一十六神者地主在子陽氣動於黃泉萬物孳産於地子為陽氣之首故曰地主陽德在丑陽能生萬物至丑方生故曰陽德也和德在東北維此時陰陽氣合生於萬物故曰和德呂申在寅呂巨也申引長也萬物漸申而巨大也故曰呂申高藂在卯萬物藂而高大故曰高藂太陽在辰震動已後陽氣大盛故曰太陽大昊在東南維時陽已著昊然照明故曰大昊大神在巳萬物已熟其氣翼起故舊大神大威在午陽衰陰生形氣始動故曰大威天道在未百物皆成莫不資用故曰天道大武在西南維陰氣用事萬物皆傷故曰大武武德在申薺麥方生陰懷陽性故曰武德大族在酉陰氣大殺族類皆盡故曰大族陰主在戌陽氣下藏陰氣自在於上故曰陰主陰德在西北維乾為天也陰氣至此而極方能生陽故曰陰德大義在亥萬物於此懷任陰氣含陽故曰大義又九宮十二神者天一在離宮太一在坎宮天符在中宮攝提在坤宮軒轅在震宮招搖在巽宮靑龍在乾宮咸池在兌宮太陰在艮宮太一在已如前解餘七神皆是星宮之名與天一太一行於九宮一歲一移九年復位天一主豐穰太一主水寒天符主飢饉攝提主疾苦軒轅主雷雨招搖主風雲靑龍主霜雹咸池主兵賊太陰主陰謀又別有靑龍行十二辰即太歲之名也古者名歲曰靑龍此神主福慶太陰三歲一徙右行十二辰即太歲之陰神也后妃之象主水雨陰私害氣右行四孟一歲一移以其所至為害故言害氣合為十二神九宮之所用也又玄女拭經云六壬所使十二神者神后主子水神大吉主丑土神功曹主寅木神太衝主卯木神天剛主辰土神太一主巳火神勝先主午火神小吉主未土神傳送主申金神從魁主酉金神河魁主戌土神微明主亥水神子神后者子為黃鍾君道故稱后陽之始也陽動於內而未形故稱神也丑大吉者萬物至丑皆萠得陽生故大吉也寅功曹者萬物至寅其功已見曹衆也衆物功既見於寅也卯太衝者萬物至卯其皆太衝其心皮抽萼也辰天剛者當斗星之柄其神剛強也巳太一者純乾用事天德在焉故太一神后也午勝先者陽氣大威陰氣時動惟陽在先為勝也未小吉者萬物畢熟成故為小吉也申傳送者傳其成物送與冬藏也酉從魁者從斗之魁第二星也戌河魁者河當首也當斗魁首也亥微明者水體內明不見於外微其陽氣至子方明也神后主婦女大吉主田農功曹主遷邦太衝主對吏天剛主殺伐太一主金寶勝先主神祀小吉主婚會傳送主掩捕從魁主死喪河魁主疾病徴明主辟召又十二將者天一土將前一騰蛇火將前二朱雀火將前三六合木將前四勾陳土將前五靑龍木將後一天后水將後二太陰金將後三玄武水將後四太裳土將後五白虎金將後六天空土將天一已如前解騰蛇主驚恐朱雀主文書六合主慶賀勾陳主拘礙靑龍主福助天后猶是神后天一之妃太陰主陰私玄武主死病太裳主賜賞白虎主鬭訟天空主虛耗也遁甲九神者天逢在坎一名子經木神在斗居破軍星天內在坤一名子成水神在斗居破軍星天衝在震一名子翹金神在斗居破軍星天輔在巽一名子文土神在斗居武曲星天禽在坤一名子公火神在斗居廉貞星天心在乾一名子襄木神在斗居文曲星天柱在兌一名子違水神在斗居祿存星天任在艮一名子金金神在斗居巨門星天英在離一名子殺土神在斗居貪狼星天逢已下皆是星名子經者以子午為天地之經位既在坎故名經也天內子成者坤為地能成萬物也天衝子翹者翹動貌翹在震動之象也天輔子文者巽為號令有文章也天禽子公者居五土位寄在坤土為萬物之父故言公也天心子襄者襄善也乾為天慈施故善也天柱子違者兌主金金有殺伐違天之道故也天任子金者艮在丑丑金之本也天英子殺者離火也火有燃燒之義也遁甲經云天逢宜安邊保固天內宜宗道結友天衝宜出軍伏仇天輔宜修禮設教天禽宜請福除惡天心宜避病求藥天柱宜匿屯守固天任宜慶謁通財天英宜遠行作樂九神之名上竝云天下皆曰子者此神屬於北斗皆隸於天故也子者美稱以此神尊美故也孔子元辰云北斗第一神字希神子第二神字貞文子第三神字祿存子第四神字世惠子第五神字衛不鄰子第六神字微惠子第七神字大景子此亦竝稱子也春秋佐助期云第一星神名執陰姓頸梁第二星神名斗諒姓伊偊當第三星神名拒理姓英㔁領許第五星神名防仵姓雞尹堵第六星神名開寶姓蚩一名蒼兒部第七星神名招姓肥脫絡馮七星之名竝是人年命之所屬恆思誦之以求福也黃帝八神圖云乾神軒轅天承相使舍於辰星兌神時刑北斗之使舍於牛星主軒研坤神招搖天之上公使舍於角星主殺害離神昊時天之遊激使舍於翼星巽神天候天執法使舍於觜星震神雷公太陰之候使舍於七星艮神曲隆天候東明之使舍於奎星坎神咸池天雨師使舍於井星主雨此八使之神婦人産乳忌低向之此亦九宮之神神既清虛遊無定所故在宮閒牙時有不同既八卦配於五行故附此而録諸神占候之法各有別注不勞於此委碎名字之義故以略談至如日月星辰風雨雷電山川嶽瀆井竈衡門爰及人身諸神非一帝王之所崇祭百姓之所祈疇如此之例名數甚多其於五行更無別義故不備說又卜筮所用殺曆諸神正是左右歲月之閒逆順季孟之際亦無俟於具談寧勞曲解此前諸神占候之綱維三才之理要故以次述第二十一論五帝遂古已來所論五帝凡有三種河圖云東方靑帝靈威仰木帝也南方赤帝赤熛怒火帝也中央黃帝含樞紐土帝也西方白帝白招拒金帝也北方黑帝叶光紀水帝也陶華陽云有皇伯皇仲皇叔皇季皇少兄弟五人即靈威仰等此五帝竝天上神下治於世綜理神鬼次第相接治太微宮其精為五帝之座五星隨王受氣即明堂所祭者也故云宗祀文王於明堂以配上帝禮記曰春之月其帝大暭夏之月其帝炎帝中央土其帝黃帝秋之月其帝少暭冬之月其帝顓頊東方大昊庖羲氏主春蒼精之君南方炎帝神農氏主夏赤精之君中央黃帝軒轅氏主四季黃精之君西方白帝金天氏主秋白精之君北方黑帝顓頊氏主冬黑精之君易曰帝出於震此蓋人帝之始始於伏羲五行之次以木為先四時相易以春為首故庖羲為五帝之先也又諸史以少昊顓頊高辛唐虞謂之五帝此蓋自舜已前五行相承為帝也易經乃上取伏羲下至虞舜不言中閒三帝者以其因修無所造作何以得言之故不論也大昊帝庖羲者姓風也母華胥履大人跡而生於成紀蛇身人首以木德王天下為百王先易曰帝出于震震木東方主春象日之明故曰大昊因象龜文而畫八卦為罔罟以田漁古者人畜相食為害者多帝觀蜘蛛之網教民取犧牲以充庖廚故曰庖犧是謂羲皇後世音謬謂之伏犧或云宓羲一號雄皇氏孝經鈎命決云伏羲日角珠衡戴勝禮含文嘉云伏羲德洽上下天應以鳥獸文章地應以龜書伏羲則象作八卦炎帝神農氏姓姜母任姒名女登感神龍而生帝於常羊人身牛首以火承木位南方主夏故曰炎帝作耒耜始教民耕農嘗別草木令人食穀以代犧牲之命故號神農一號魁㠕氏是為農皇禮含文嘉云神農作田道就耒耜天應以嘉禾地出以醴泉黃帝軒轅氏姓姬母附寶見大電光繞北斗樞星明照郊野感而生帝於壽丘以土承火位在中央故曰黃帝治五氣設五星始垂衣裳作舟車造屋宇古者巢居穴處黃帝易之以上棟下宇以蔽風雨故號軒轅亦云居軒轅之丘因以為號一號帝鴻氏或歸藏氏或有熊氏春秋文耀鈎云黃帝龍顏得天庭法中宿取象文昌禮含文嘉云黃帝修兵革以德行則黃龍至鳳皇來儀少昊金天氏姬姓名摯字靑陽母女節有大星如虹下流華渚夢接意感生帝以金承土故曰金天即圖讖所謂白帝朱宣也位在西方主秋金有光明居小陰位故曰少昊文耀鈎云帝嚳載干是謂清明發節移度蓋象招搖顓頊高陽氏姓姬母景僕見搖光星貫月如虹感而生帝於若水以水承金位在北方主冬故號顓頊文耀鈎云顓頊並幹上法月參集威成紀以理陰陽此五帝既禮所配五方者也帝嚳高辛氏姬姓生而神異自言其名曰逡以木承水五行名官故號高辛帝王世紀云高辛𪘀齒有聖德能順三辰帝堯陶唐氏祁姓母慶都出洛渚遇赤龍感孕十四月而生帝於丹陵名放勛以火承木其兄帝摯封之於唐故是號陶唐氏文耀鈎云堯眉八彩是謂通明曆象日月陳剬考功禮含文嘉云堯廣被四表致于龜龍帝舜有虞氏姓姚母握登見大虹意感生帝於姚墟名重華字都君目重瞳子故名重華以土承火堯封之於虞故號有虞氏設五色之服文耀鈎云舜重瞳子是謂𬣐諒上應攝提以統三光禮文嘉云舜損己以安百姓致鳥獸鶬鶬鳳凰來儀此三帝并少昊顓頊共為五帝史記以伏羲女媧神農為三皇黃帝已下為五帝帝王世紀以羲皇神農黃帝為三皇少晧已下為五帝今案禮記郊配五德自伏羲至顓頊為五帝是其正位所以然者易稱帝出于震蓋五德之首也以次而行至顓頊則五德數終若以少昊為首則金非五德之先若以黃帝為首土居中央本非創始故從木為先伏羲為五德之首易言是也其帝嚳已下皆行次相承也上帝有五靈威仰等姓氏事伏羲年代久遠典籍遺漏不可具釋然五德相承謂受天明命必豫符瑞以明會昌若應命之主皆承太微五帝之精以誕於世必有先徴示其萌兆也木王則蒼帝之子火王則赤帝之子土王則黃帝之子金王則白帝之子水王則黑帝之子故録圖云東方蒼帝體為蒼龍其人長頭面大角骨起眉背豐博順金授火南方赤帝體為朱鳥其人尖頭圓面方頤張目小上廣下鬚髯偃胸順水授土中央黃帝體為軒轅其人面方廣顙兌頤緩脣背豐厚順木授金西方白帝體為白虎其人方顙直面兌口大鼻小角順火授水北方黑帝體為玄武其人夾面兌頭深目厚耳垂腹反羽順土授木此竝象五行之氣依其行次以相傳授也感精符云蒼帝望之廣視之博赤帝望之火煌煌然視之尖上黃帝望之小視之大廣厚正方白帝望之明視之茂黑帝望之巨視之稚元命苞云蒼精用事象歲星赤精用事象熒惑黃精用事象鎮星白精用事象太白黑精用事象辰星此皆五德之依五行子母相傳也非其次者必有剋伐而不終也秦以金德伐周二世而亡漢以火行繼周伐秦僞金故其祚長遠若是其行次者則有符瑞也春秋元命苞云堯火精故慶都感赤龍而生漢以孔子獲麟得圖書云姬周亡火曜劉起帝卯金故高祖斬白蛇而神母哭云赤帝子殺我白帝子光武感赤伏符而中興此皆火德之徴也四行所感例皆如此往代帝王符瑞非一不可具述今略論五帝配五行如此第二十二論諸官自三五已來紀官無定皆因符瑞名號不同或以鳥龍或以雲火莫不仰觀俯察因事而置事雖時世不一五行無爽至于顓頊以人事紀官南正重司天以屬神北正黎司地以屬民於是神民不離高辛氏立五行名官以勾芒為木正祝融為火正蓐收為金正玄冥為水正后土為土正分掌其職少皓氏有四子重該修煕重為勾芒木官之神該為蓐收金官之神修煕竝為玄冥水官之神顓頊氏子曰黎為祝融火官之神共工氏子曰勾龍為后土土官之神此五神生而為上公死為貴神別稱五祀已配五行周書云武王營洛邑未成四海之神皆會曰周王神聖當知我名若不知水旱敗之明年雨雪十餘旬深丈餘五大夫乘車從兩騎止王門太公曰車騎無跡謂人之變乃使人持粥進之曰不知客尊卑何從騎曰先進南海御次東海御次北海御次西海御次河伯次風伯次雨師武王問太公竝何名太公曰南海神名祝融東海神名勾芒北海神名玄冥西海神名蓐收禮記月令云春之月其神勾芒夏之月其神祝融中央土其神后土秋之月其神蓐收冬之月其神玄冥是也此五方之神以配五行又黃帝置三公之職以象三臺星風后配上臺天老配中臺五聖配下臺置左右二監此亦五行之謂也四司分掌四方即四時之法也堯以義和四子分掌四時方嶽之職謂之四嶽太公曰太師者心腹之臣所使是人之英故曰前疑常立於前決疑事也太史者耳目之臣所使視聽是人之後故曰後承常立於後承主之過取驗於天太傅者爪牙之臣所使守衛是人之傑故曰左輔輔人主缺事立於左拒君之難太保者羽翼之臣所使察伺是人之警故曰右弼常立於右弼人主之邪四輔既立王者安而無為百姓濟而無害若四補不具猶格虎無備濟河無舟若王者不知古今之務遠方之謀不謀於諸侯不逹言語動作不合於制太師爭之不知天變星曆之運天官動靜鐘律之音山川怪異不善灾害太史陳天文以爭之發號令不應先王法度與大臣無禮枉道於民處刑不平獨信自專臨政不莊又不恤臣僕太傅爭之升車不應和鸞揖讓不中磬珮淫宴馳騁沈冒酒色宗廟不敬輿服失度朝廷無節太保爭之此則四時之官四嶽之分職前疑主夏後承主冬左輔主春右弼主秋唐虞之時官名已百尚書云百僚師師夏殷定名為百二十以應天地陰陽之大數也故有三公九卿二十七大夫八十一元士三三相參合有百二十也帝王世紀云殷湯問伊摯曰古者立三公九卿大夫列士者何摯曰三公以與主參王事九卿以參三公大夫以參九卿元士以參大夫故參而又參是謂事宗事宗不失內外若一又曰相去幾何摯曰三公智通於天地應變而無窮辨於萬物之情其言足以調陰陽四時而節風雨如是者舉之以為三公故三公之事常在於道九卿者不出四時通溝渠修隄防樹種五穀通於地理能通利不利如此者舉以為九卿故九卿之事常在於德大夫者出入與民同象取去與民同解通於人事行內舉繩不傷於言言足法於世不害於身通關梁實府庫如是者舉以為大夫故大夫之事常在於仁元士者知義而不失期事功而不獨專中正強諫而無姧詐在私立公而可立法度如是者舉以為元士故元士之事常在於義道德仁義定而天下正矣又曰三公股肱之臣九卿手足之臣大夫筋脉之臣元士肌肉之臣孔子曰三公象五嶽九卿法河海二十七大夫法山陵八十一元士法谷阜三公在天為三能九卿為北斗少微之比為大夫郎位之類為元士合百二十大數存焉合誠圖云天不獨立陰陽俱動扶佐立緒合於二六以三為舉故三能六星兩兩而比以為三公三三而九陽精起故北斗九星以為九卿三九二十七故有攝提少微司空執法五諸侯其星二十七以為大夫九九八十一故內列倍衛閣道郎位扶匡天子之類八十一星以為元士凡有百二十官下應十二月數之經緯皆五精流氣以立官廷尚書曰立太師太傅太保茲惟三公論道經邦燮理陰陽官弗必備唯其人淮南子曰舉天下之高以為三公一國之高以為九卿一縣之高以為二十七大夫一鄉之高以為八十一元士感精符曰三公非其人則山崩三能移九卿非其人則江河潰輔星角大夫非其人則丘陵偃𡍩少微等有變元士非其人則谷阜毀扶匡失是以王者仰視象於天俯察法於地中擇賢能以任之任得其人則國昌民安任非其人則邦危民弊易曰鼎折足覆公餗此喻三公失人如鼎折足不堪容著也周官云天官冢宰地官司徒春官宗伯夏官司馬秋官司寇冬官司空冢宰主會計司徒主土地宗伯主禮樂司馬主兵戎司寇主刑罰司空主造作孔子曰冢宰之官以成道司徒之官以成德宗伯之官以成仁司馬之官以成聖司寇之官以成義司空之官以成禮以之道則國治以之德則國安以之仁則國和以之聖則國平以之禮則國定以之義則國成故屬不理分職不明法正不一百事失紀曰亂亂則餝冢宰地宜不殖財物不蕃萬民飢寒教化不行風俗漂亂人民流散曰危危則餝司徒父子不親長幼失序君臣上下乖離異志曰不和不和則餝宗伯賢能而失官爵功勞而失賞祿士卒疾怨兵弱不用曰不平不平則餝司馬刑罰暴亂姧邪不勝曰不義不義則餝司寇度量不審舉事失理都鄙不修財物失所曰貧貧則餝司空故古之王者常以季冬考德正法以觀治亂德盛者則修法德不盛者則餝政故法與政盛而不衰淮南子天文篇云東方為田官南方為司馬西方為大理北方為司空中央為都官春秋繁露云木司農火司馬土司空金司徒水司寇此竝配五行也周官以冢宰計會司徒土地竝中央之義與淮南繁露意同春官主禮樂者禮齊上下樂和人情皆是仁也故云宋伯之官以成仁仁屬木東方也淮南繁露竝主農者取春是農之本也夏官主兵戎者火氣猛烈兵之象也然刑罰歸于司寇司馬以禮節齊之主而不用刑也淮南繁露竝同秋官主刑罰者金之本性主殺伐也淮南大理亦主刑也繁露為司徒者名異事同故云因時之威以成大理司徒冬官主造作者冬時萬物收藏百工咸歸其所故造器用以供王事淮南說同繁露以為司寇者謂執法之官須平直之人如水能平均也故云執法阿黨不平則誅之故土勝水是其水取平直之意也雖五運遞興官名世革而五行用事其理齊同所以禹平洪水身任司空九土納賦伯夷秩宗必備三禮契為司徒敬敷五教咎繇士師明用刑典如此分職則周官臣是也自古已來官數起自於三極八十一者陽成於三極於九故三公而九卿九九八十一黃鍾律之極數也故尊官取其始數卑官者用其末數所以不云一者一是元氣屬於天子故號天子為元首以其一無二也尚書曰元首明哉臣非元一故自三而起周止六卿者以為通六合因六氣而設六府也此乃時代異故非越五行又三代命官皆止於九故士有三等下士一命中士二命上士三命大夫三等下大夫四命中大夫五命上大夫六命卿已上亦三少卿七命大卿八命公則九命三三而九亦以陽之正數也末代以命為品亦不過九但以一為尊官九為卑官取命是出自上命秩下官名故以多者為重品是品其次第一既居先故以一為貴此竝方位及數配五行今次為論支干為官者洪範五行傳云甲為倉曹共農賦乙為戶曹共口數丙為辭曹共訴訟丁為賦曹共獄捕戊為功曹共除吏己為田曹共羣畜庚為金曹共錢布辛為尉曹共本使壬為時曹共政教癸為集曹共納輸子為傳舍出入敬忌丑為司空守將班治寅為市官平準賣賈卯為鄉官親事五教辰為少府金銅錢布巳為郵亭行書驛置午為尉官馳逐追捕未為厨官百味悉具申為庫官兵戎器械酉為倉官五穀畜積戌為獄官禁訊具備亥為宰官閉藏完具支干配官皆從其五行本體意略可解不勞繁述翼奉云肝之官尉曹木性仁尉曹主士卒宜得仁心之官戶曹火性陽戶曹主婚道之禮肺之官金曹金性堅主銅鐵腎之官倉曹水性陰凝藏物倉曹冬收也先王以冬至閉關不通商旅愼陰氣也脾之官功曹土性信出稟四方功曹事君以信授教四方也尉曹以獄司空為府主士卒獄閉逋亡與之姧則螟蟲生木性靜與百姓通則魚食於民從類故蟲戶曹以傳舍為府主名籍傳舍主賓客與之姧則民去鄉里戶曹主民利戶口集民利故悉去之倉曹以厨為府主廩假厨主受付與之姧則賊盜起倉曹收以民租侵剋百姓窮故功曹以小府為府與四曹計義小府亦與四府則用故小府倉出納主餉種功曹有二府所以為五官六府游激亭長外部吏皆屬功曹與之姧則虎狼食人功曹職在刑罰內為姧故虎狼盜賊殺奪於民上姧下亂也金曹以兵賊嗇夫為府主討捕與之姧則城墎盜賊起兩偏施金曹主市租侵奪故上下相承故市賈不平此竝從五行以五藏配六府也既竝名官故於此釋第二十三論諸人就此分為二段第一者論人配五行禮記禮運篇云人者天地之德陰陽之交鬼神之會五行之秀氣也文子曰人者天地之心五行之端是以稟天地五行之氣而生為萬物之主配二儀以為三材然受氣者各有多小受木氣多者其性徑直而懷仁受火氣多者其性猛烈而尚禮受土氣多者其性寬和而有信受金氣多者其性剛斷而含義受水氣多者其性沈隱而多智五氣湊合共成其身氣若清睿則其人精俊爽如也昏濁則其人愚頑老子云陰陽精氣為人氣有厚薄得中和滋液則生賢智人得錯亂濁辱則生貪淫人祿命書云金人剛強自用木人多華而雅水人開通智惠火人自貴性急土人忠信而直周書云人感十而生天五行地五行合為十也天五行為五常地五行為五藏故易曰在天成象在地成形者也家語曰天一地二人三三三而九九九八十一一主日日數十故人十月而生文子云人受天地變化而生一月而膏二月而脉三月而胞四月而肌五月而筋六月而骨七月而成形八月而動九月而躁十月而生形骸已成五藏乃形外為表中為裏頭圓法天足方象地天有四時五行九星三百六十日人亦有四支五藏九竅三百六十節天有風雨寒暑人亦有喜怒哀樂淮南子及文子竝云膽為雲肺為氣脾為風腎為雨肝為電與天相類而心為主耳目者日月也氣血者風雨也素問云夫人法天地故聖人上配天以養頭下象地以養足中傍人事以養五藏天氣通於肺地氣通於咽風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水法天之紀用地之理則灾禍去矣左慈相決云人頭圓以法天足方以象地左目為日右目為月左眉為靑龍右眉為白虎鼻為勾陳伏犀為朱雀玉枕為玄武又云前為朱雀後為玄武左為靑龍右為白虎是曰四躰頭為勾陳是身之主又曰左耳後為太山右耳後為華山額為衡山頂後為恆山鼻為嵩高山相祕決云額為衡山頤為恆山鼻為嵩高山眉為岱山權為崑崙山二儀象天地三亭法三材四瀆主四時五官應五行六府從六律七門配七星八節取八風九候比九州十指應十日十二德象十二月二十八節應二十八宿家語云人生三月微眗然後目能見八月生齒然後能食期而臏然後能行三年囟合然後能言陰窮反陽故陰以陽變陽窮反陰故陽以陰化是以男子八月生齒八歲而齒夬十六精通然後能化女子七月生齒七歲而齒夬十四而化禮男子二十而冠有成人父之端女子十五而笄而許嫁有成人母之道此皆從天地五行之大數也文子曰昔者中黃子云天有五行地有五嶽聲有五音物有五味色有五章人有五位故天地之閒二十有五人上五有神人真人道人至人聖人次五有德人賢人善人中人辨人中五有仁人禮人信人義人智人次五有仕人庶人農人商人工人下五有衆人小人駑人愚人肉人上五之與下五猶人之與牛馬也聖人者以目視以耳聽以口言以足行真人者不視而明不聽而聰不言而云不行而從故聖人之所動天下者真人未嘗遇焉賢人之所矯世俗者聖人未嘗觀焉所謂道人者無前無後無左無右萬物玄同無非無是文子發言二十五人論止有四未為具釋今依諸經書略解上五謂神人者孔子曰陰陽不測之謂神曾子曰陽之精氣為神神以靈智為義謂靈智其照如神故曰神人也孔子曰堯之智如神真人者性合乎道有若無實若虛明白太素至極弊然無為故曰真人道人者孔子曰其德大乎天地其量總乎日月莫之能測者有此德量故曰道人至人者真直為素守一不移善惡不能迥其慮榮辱不能動其心故曰至人聖人者家語云德合天地變通無方窮萬事之終始協萬品之自然敷其大道遂成情性明竝日月化行若神民不知其德覩者不識其善此謂聖人也莊子曰以天為宗以德為本以道為門明於變謂之聖人次五德人者德被於物使百姓各得其所欲日用而不知兼利無擇與天地合易曰大人者與天地合其德與日月合其明與鬼神合其吉凶此謂德也賢人者智周萬物動靜合理孔子曰好惡與民同情取捨與民同統行中規矩言可法則為匹夫而不怨在諸侯而不憍道足化於百姓而不傷於身施財天下不貧此賢人也善人者見善如不及言滿天下無口過孔子曰躬行忠信而心不怨不置仁義志意廣博而色不伐思慮明逹而辭不爭篤行信道自強不息猶然如將可越而不可及此君子人也又謂善人中人者一心以事主進思盡忠退思補過順美匡惡犯而無隱先公後私不伐其勞此中人也辨人者智思無窮情鑒善惡問無礙滯巧言如流去邪從正無有可匿此辨人也中五仁人者為上不侈其功為下不羞其陋慈施惻隱終而不衰此仁人也禮人者分別尊卑廉讓謙謹為上恭敬為下思敬此禮人也信人者誠實不欺片言折獄逹不肆意窮不易操此信人也義人者決斷分了一度順理從善屛惡事無礙滯此義人也智人者識逹謀慮鑒察物情能知萠兆豫覩善惡此智人也次五仕人者孔子曰知不舉多必審其所由言不務多必審其所謂心有所定計有所守雖不能盡道術之本必有從行也雖不能遍百善之美必有所處也行既由之智既知之言既得之則性命形骸之不易也富貴不足以益貧賤不足以損此仕人也庶人者未人仕位猶居壟畝之閒或始解褐未沾品命周禮云庶人在官者始人秩也此謂庶人也農人者用天之道因地之利春耕秋收常在稼穡此曰農人也商人者負販市厘隨時鬻貨貴賤相易以資産業此商人也亦曰賈人也工人者雕斫伎巧備諸器用造新修故以力貨財此曰工人下五衆人者凡雜云衆人豫讓曰范中行氏以衆人遇我也小人者卑鄙行惡此曰小人孔子曰傑紂雖帝王其猶小人也文子曰中繩謂之君子不中繩謂之小人君子雖死其名不滅小人雖得勢其罪不除駑人者駑鈍也亦罪隸為名古者有罪為奴尚書曰豫則奴戮汝罪之也紂以箕子為奴亦戮辱也馬有駑者以其鈍也愚人者囂暗無知菽麥不辨謂之愚人孔子曰其智可及其愚不可及者以其稟昏濁之氣而生非學所得也亦曰庸人孔子曰心不存始終之規口不吐訓格之言又不擇賢以託身不力行以自定見小暗大而不知所傷從物如流而不知所執此庸人也肉人者狂癡無識痛癢莫分雖能動靜與宍不異是為肉人此二十五等人由稟五行之氣各有優劣故有多等善惡不同今且分為四品其神真道至聖德賢七者受王氣而生也善中辨仁禮信義智八者相氣而生也士庶農商工五者休氣而生也衆小駑愚肉五者囚氣而生也王氣當其盛時故最靈聖相氣微劣於王故自善忠已下伏王政休氣已衰故當仕庶之例囚氣最劣故當衆小之流文子以上匹下喻人比畜亦近之矣然此五氣有清有濁有正有邪有初有末若得正氣雖在卑劣方為大善若受邪氣雖居尊勝衆興大惡至如桀覆夏宗紂亡殷族周衰幽厲漢滅桓靈此則處尊與惡者也負鼎於殷廟垂釣於磻溪商賈南陽飼牛車下當此之時其善未見及登師輔仁聖竝彰此豈非卑下而能弘濟其賢德已上氣正無邪故居最上然氣之初也齡齒修長氣之末也命相短促此四氣又有四別若上清秀靈智愈高上而濁汙乃須修餝下而清秀劉磨方以為器加之昏濁朽木不可復雕兼貴賤富貧好醜善惡性情年命乃有萬途竝五行氣感所致今且就文子論其二十五等以為階差自外諸徒難以具辨知人則哲惟帝其難非明聖者孰能辨識祿命決云王氣中生者其人王相宜爵祿相氣中生者其人多官死氣中生者其人多疾病短品此竝論其生月當五行氣盛衰時也況其稟受氣者其人形質情性骨肉藏府皆象五行相書云木人細長直身火人小頭豐下短小土人員面大腹金人方面兌口水人面薄身偏蛇行木人靑色真有白是害氣火人赤色真有黑是害氣土人黃色真有靑是害氣金人白色真有赤是害氣水人黑色真有黃是害氣配日則甲乙為皮毛丙丁為爪筋戊己為肉庚辛為骨壬癸為血脉配卦則乾為頭離為目坎為耳兌為口坤為腹巽為手艮為股膝震為足其藏府性情各有別解然人居天地之內在山川之中各隨方位形性不等所以東夷之人其形細長修眉長目衣冠亦尚狹長東海勾麗之人其冠高狹加以鳥羽象於木枝長目者目主肝肝木也故細而長皆象木也南蠻之人短小輕壑高口少髮衣服亦尚短輕高口者口人中主心心火也火炎上故高炎上故少髮也西戎之人深目高鼻衣而無冠者鼻主肺肺金也故高目肝也肝為木金之所削故深金主裁斷故髮斷無冠北狄之人高權被髮衣長者權主腎腎水也故高權被髮者象水流漫也衣長亦象水行也中夏之人容貌平整者象土地和平也其衣冠車服備五色者象土德包含四行也孔子曰東僻之人曰夷精以僥南僻之人曰蠻信以朴西僻之人曰戎頑以剛北僻之人曰狄肥以戻中國之人安居和味帝王世紀云堯流共工于幽洲以竄北狄遷三苗于三危以竄西戎放歡兜于崇山以竄南蠻殛鯀于禹山以竄東夷春秋文耀鈎云氣隨人形故南方至溫其人大口象氣緩舒也北方至寒其人短頸象氣急縮也東方川谷所注其人小頭兌形象木小上也西方高土日月所入其人面多毛象山多草木也中央四通雨露所施其人面大象土平廣也家語云孔子曰堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜南方有不死之草北方有不釋之冰東方有君子之國西方有形殘之尸中土多聖人皆象其氣也故曰山氣多男澤氣多女水氣多瘖風氣多聾休氣多癃木氣多傴岸下濕氣多踵正氣多力險阻之氣多癭寒氣多壽熱氣多夭谷氣多痺丘氣多狂街氣多仁陵氣多貪輕土多利足重土多遲鈍急水人輕遲水人重此竝隨陰陽五行之氣故善惡斯別第二者論人遊年年立遊年凡有三名而為二別三名者一遊年二行年三年立遊年之名皆以運動不住為義以其隨歲行遊不定一所也年立即是行年立者是住立為義以其今年立於北辰也就人而論常行不息故謂曰行就歲而論今之一歲年住於此故謂之立二別者遊年從八卦而數年立從六甲而行六甲者男從丙寅左行女從壬申右轉竝至其年數而止即是行年所至立於其處也若欲笇知之者男以實年加二笇而左數女以實年加一笇而右數竝從甲子旬始盡其笇即是立處也所以男從丙寅數何者日生於寅日為陽精男從陽故取日丙為太陽故取丙以配寅女從壬申數何者月生於申月為陰精女從陰故取月壬為大陰故取壬以配申陽故左行陰故右轉孔子元辰經云若甲子旬男從丙寅女從壬申甲戌旬男從丙子女從壬午甲申旬男從丙戌女從壬辰甲午旬男從丙申女從壬寅甲辰旬男從丙午女從壬子甲寅旬男從丙辰女從壬戌皆曰行年此竝候病之法非通常用遊年者男一歲數從離起左行八卦則二在坤三則在兌四則在乾五則在坎六則在艮七則在震八則在巽巽不受八進而就離離則是八坤即九兌即十以次而數一若至坤坤不受一還退就離故至十數皆在正方也女年一從坎右行亦如離法艮不受八乾不受一皆歸於坎所以巽不受八坤不受一者坤巽依位竝夾離宮巽是陽位有進義而無終義八是卦之終數故不受之前以付離坤是陰位陰有退而無進退則須滅不敢當其陽始之數故退讓就離乾不受一艮不受八者乾是陽也又為天也自在其始始是一義重則數偶數偶則成陰故以付坎艮是陰也艮又為山山則是終遊年歷行八卦卦數於八終即止也自有其終理不重受故付坎或問云天一之行以坎為一宮離為九宮八卦遊年乃以離為一宮者何答曰天一於天下九州之事故從始一而行遊年於人年命之事故以終九而起今女遊年從坎男以德苞終始故九一竝數起太陽之位女以陰生陽故從其創始陰位而行坎位本一受數一起共為二陰數也遊年所至之卦因三變之一變為禍害再變為絶命三變為生氣生氣則吉禍害絶命則凶吉則可就其方凶則宜避其所禍害者以其相尅害也如乾初九甲子水變成巽巽初六辛丑土是飛辰來尅伏辰也坎初六戊寅木變成兌兌初九丁巳火是飛伏相害也絶命者以其卦躰被尅制也如震變為兌金尅木也艮變為巽木尅土也生氣者以其相生同躰也如乾變成兌躰同金也震變成離木生火也禍害絶命亦有厭行以其卦所至相制者攘之如衝火以避兵灾懸一柏木而攘震死此竝五行相制之驗也遊年年立即是人之年命皆配五行故於此而釋之第二十四論禽蟲就此分為二段第一者論五靈凡含生蠢動有知之數莫不籍五氣而成性資陰陽以立形故其陸處水居潛見道別遊翔飛走駑駿不同皆由氣之清濁稟性深淺考異郵云含牙戴角著距垂芒皆為陰也陰有殺氣故備有爪牙之毒螫蠆之類也飛翔羽翮柔善之獸皆為陽也陽有仁氣無殺性也家語云齕吞者八竅而卵生齟𪚅者九竅而胎生晝生似父夜生類母至陰者牝至陽者牡皆氣使然也凡是蠢動之物竝為蟲類今略分三種一曰禽二曰獸三曰蟲有羽飛者為禽有四足走者為獸無羽足者為蟲至如蜉蝣之羽蟭蟟之翼飛蟭百足蚊蚋六手此雖有羽足猶是蟲例其朝生暮死腐穢蠱濕此皆因變化隨類生者亦竝蟲也考異郵云蟲八日而化微故今促又鳥魚二名於此二者其號雖別鳥則飛翔即是禽也魚則潛游蟲之屬也家語云鳥魚生於陰而屬於陽故皆卵生魚遊於水鳥遊於雲所以立冬則燕雀入海化而為蛤本其類也禽名通於獸獸名不通於禽故知禽有趍地之能獸無飛空之用然此三等名例甚多不可具釋今且先論五靈次配卦及三十六禽家語云羽蟲三百六十鳳為之長毛蟲三百六十麟為之長甲蟲三百六十龜為之長鱗蟲三百六十龍為之長倮蟲三百六十人為之長又曰毛蟲之精曰麒麟羽蟲之精曰鳳介蟲之精曰龜鱗蟲之精曰龍倮蟲之精曰聖人毛蟲西方羽蟲南方甲蟲北方鱗蟲東方倮蟲中央此則皆稱蟲也五靈惣為諸蟲之首今止言其四以人處中央者謂有性情之物人最為主故也靈者神靈之義五禽於蟲獸之中最靈故曰五靈禮記月令云春其蟲鱗鄭玄注云龍蛇之屬夏其蟲羽飛鳥之屬中央其蟲倮虎豹淺毛之屬秋其蟲毛狐狢之屬冬其蟲介龜鱉之屬又云國君行前朱雀後玄武左蒼龍右白虎尚書刑德放言東方春蒼龍其智仁南方夏朱鳥好禮西方秋白虎執義北方冬玄龜主信會中央土之精禮運則不論五德止辨四靈而已鈎命決云失仁則龍驎不儛失禮則鸞鳳不翔失智則黃龍不見失義則白虎不出失信則玄龜不見禮記曰麟鳳龜龍謂之四靈左傳云麟鳳五靈王者之嘉瑞禮云麟鳳龜龍不見有虎於金行稱虎義則不足前朱雀後玄武是同其餘三蟲竝有差異元命苞云離為鳳又言鳳火精靈龜生水玄武至北方此同禮說唯龍麟虎三者不同左靑龍右白虎舊說不疑衍孔圖以麟為木精龍則非木大戴禮以麟為毛蟲麟復成金麟若為金虎則無用公羊高以麟為木精木生於火夫子修春秋至麟而止豈知為漢之瑞今所不執案蔡雍月令章句言天官五獸左蒼龍大辰之貌右白虎大梁之文前朱雀鶉火之體後玄武龜蛇之質中有大角軒轅麒麟之信亦龍生於水遊於木鳥生於木遊於火麟生於火遊於土虎生於土遊於金龜生於金遊於水修其母致其子五行之情也故貌恭躰仁則鳳凰來儀言從和義則神龜至視明禮修則麒鱗臻智聽政事則黃龍見思睿信立則白虎擾此言當矣禮斗威儀云乘金而王麒麟在郊保乾圖又言歲星為麟考異郵言麟者陰精此竝不同今解以木者觸也有觸冒之義麟有肉角無所抵觸龍角端無肉有抵觸義易象震為龍故木之義扶龍天官有軒轅黃龍麒麟之信信主於土修母子應此意亦同為漢出者漢是火德故子應也是土之義扶麟易通卦驗言立秋虎始嘯衍孔圖云虎金精大戴禮言虎七月而生應陽數考異郵亦云虎班文者陰陽之雜虎為毛蟲定是金獸考異郵云參伐虎之德義主斬刈所以學門謂之虎門乃畫虎於門者以兌居秋方兌是說言主講說故又金有殺伐之威虎有毒害之猛故金義扶虎問寅位在東何忽白虎居西答曰凡五行相雜無有獨在一方之義東方自是木行相次白虎居西是殺戮之威如震在東方正至於龍乾之六爻并是龍象震取其運動乾譬聖人自取龍有飛潛之德為象各異故無定凖也如考異郵云陰陽相雜不妨分在東方此竝靈通隱顯無定寧可一執史蘇龜經云木神蒼龍歲星之精火神朱雀熒惑之精灰土之神名曰騰蛇土神勾陳鎮星之精金神白虎太白之精水神玄武辰星之精蒼龍主頭朱雀主脣頸騰蛇主胸脅勾陳主腰腹白虎主股膝玄武主腳脛案此之六神朱雀玄武蒼龍白虎與經緯說同唯勾陳之神其語有異而天官有勾陳之星在紫微之內故為土神此即蔡雍所云騏驎之信也騰蛇居火之末在土之初而為灰神以蛇配龜共為玄武無有正方故為灰神其配頭足等以東為首故龍配頭也以次南轉故玄武配足禽獸屬八卦者易云乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兌為羊乾健也馬取其健也坤順也牛取其順震動也龍取其動巽風也雞主其號令以象風行坎陰也豕取其陰離陽也雉取其飛揚艮門也狗取其守禦兌悅也言也羊取其悅草又乾象六龍取其潛躍之義說卦云馬取其強健之德以健也故稱良馬以父故稱老馬以其乾乾不息故稱瘠馬以其有變化之用故稱駮馬然坤卦又稱牝馬之貞此止取順義馬之為義不獨乾坤震又為善鳴之馬以震有雷聲故震雷之象又為馵足馬亦曰白頭為的顙之馬取其顯曜之義坎為美脊之馬以有居中之閏故說卦龍馬以配者多以為行天莫若於龍行地莫過於馬故多所象也坤稱子母牛者重其蕃息艮既為狗亦為鼠狗有守備之能狗為能止鼠為所止竝屬於艮離為鱉蟹螺蚌龜皆取其有甲象外陽之義也此皆五行之所配合故於此而釋也第二者論三十六禽禽蟲之類名數甚多今解三十六者蓋取六甲之數式經所用也其十二屬配十二支支有三禽故三十有六禽所以支有三者分一日為三時旦及晝暮也若以意求正應十二屬竝居晝位不應或旦或暮今依式經法以氣而取孟則在暮仲則在中季則在旦是十二屬當十二辰也餘二十四既是配禽以不當支位所以孟在暮者孟是一時之首氣初則未盛向仲方盛故屬也取近盛氣所以在暮也仲則在晝者以其氣盛在中也季則在旦者以季為一時之末其氣已衰當初近仲尚有王勢故屬旦也於拭當位二俱不失王簡云子朝為䴏晝為鼠暮為猶翼丑朝為牛晝為蟹暮為鱉寅朝為狸晝為豹暮為虎本生經云旦為生木又云晝為虎暮為狸卯朝為猬晝為兔暮為狢一云朝為狐本生經云暮為鶴辰朝為龍晝為蛟暮為魚巳朝為蟺晝為蚯蚓暮為魚蛇一云暮為龜本生經言旦為赤土晝為蛇暮為蟬午朝為鹿晝為馬暮為獐本生經言旦為馬晝為鹿暮為麞未朝為羊晝為鷹暮為鴈本生經云暮為老木申朝為㹨晝為猿暮為猴一云旦為玉本生經言暮為死石酉朝為雉晝為雞暮為焉一云朝為雞暮為死石禽變云暮為死土本生經言暮為䳒戌朝為狗晝為狼暮為豺一云暮為死金禽變云暮為死火亥朝為豕晝為玃暮為猪一云旦為生木晝為豕暮為蟻蝓一云旦為㹠晝為𤠾一云暮為朽木雖本生經及禽變牙有不同晝暮之位理從前解子為鼠䴏犾翼者色皆玄也取水之色鼠之為性晝伏夜遊象陰氣也出於穴常見首者象陽氣萌動於子欲見之伏也䴏口下有赤者象陰之懷陽其尾分者陰數二也春分而至隨陽見也秋分而蟄隨陰伏也禮記月令云仲春之月玄鳥至至日以太牢祀于高禖以祈子孫也秋分玄鳥歸也是見二月者子刑卯也易通卦驗云玄鳥陰鳥也犾翼者鼠老為之謂之仙鼠方言云自關已東謂之犾翼三者皆是陰蟲故竝居子也丑為牛蟹鱉者丑為艮立春之節農事既興牛之力也又上當牛宿說題辭曰牛為陰事牽耦耜耕也故在丑蟹者立春之時桑木生根如其足也艮為山巨靈贔屓首頂靈山負蓬萊山即巨蟹也鱉者土之精氣而生中軟外堅象土含陰陽也其藏黃者土之色也牛亦有黃蟹中亦黃皆土精也丑在北方水位故兼主水土寅為虎豹狸者三獸形類皆相似寅為木位木主藂林寅又屬艮艮為山虎之所處集靈經云寅為少陽五色玄黃寅又有生火火主文章三獸俱班竝有文也上有箕宿箕主風虎嘯風起易云風從虎家語云三九二十七七主星星主虎虎七月生申衝寅故虎在寅狸豹以同類相從也本生經云主木者以寅有相木正月方生也卯為兔猬狢者兔陽蟲也居月中者陰懷陽也元命苞云兔居月坎之氣坎在子位子刑在卯故也屬卯老兔為猬狢亦兔類故竝居卯一云狢者狐也狐狢相類也本生經言鶴者此音同字誤也辰為龍鮫魚者申為水之源子為中流辰為水之末如百川東注皆歸于海龍能興雲致雨為水禽之長非海不能包容故其神而大鮫魚亦是水蟲之長者故竝在辰巳為蛇蟺蚯蚓者式經云巳有騰蛇之將因而配之蛇陽也本在南龜陰也本在北以蛇配龜為玄武二蟲共為一神以陰偶故從數在北方蟺及蚯蚓皆形同也禮記云小滿之節蚯蚓出見愼子云騰蛇遊霧與蚯蚓同黃帝有大螟如蚯以應土德巳有寄生之土故竝配之本生經言土者以火相合生土也撿衆書蟺或為鼉鼉字復作蟬本生經解蟬云常水藏畏羅納悲吟不言且欲歌言其悲吟與蟬相類論其水藏與鼉相類案其形狀及土氣巳為蛇蟺蚯蚓相類鼉與蟬竝此非也又射覆經云遇蟬者水蟲也當知是蛆也午為鹿馬麞者午為大陽馬有員蹄象於陽也午為天路馬有駿足涉遠之日牝牡有時故家語云八九七十二偶以承奇奇主辰辰為月月主馬馬十二月生丑衝未未與午合故在午鹿蹄圻者是以象陰也而居陽位者象懷陰也禮記月令云仲夏之月鹿角解易緯通卦驗云鹿者獸中陽也夏至解角家語云四九三十六六主律律主鹿故鹿六月生未與午合故亦在午獐鹿同類因而配之問曰八卦配禽離不言馬禽變乃以午為馬者何答曰坤為牝馬之貞坤既在未未與午合故馬居午問曰乾亦稱馬震亦稱馬何不竝取其合答曰行地莫過於馬坤既是地取其正用乾天震木非是地體故不取合問曰若如所解乾之六爻皆稱為龍行天不過於龍龍德應乾何忽居辰答云未若為馬誠如來難馬既在午正取其合乾位居戌戌衝在辰所以龍配於辰問云坤既取合乾忽用衝此義難解答曰坤為陰也取其柔順從陽之義故用合乾為陽也陽體剛強故取其衝未為羊鷹鴈者式經云未為小吉主婚姻禮娉禮娉有羊鴈之用鄭玄婚禮謁文云鴈候陰陽待時乃舉易以為坤為羊坤在未也禮記月令云季夏之月鷹初學習此因候以配之本生經云老木者以未為木墓木至六月衰老也申為猴猿㹨者秋為殺氣萬物衰老猴猿之貌竝似老人七月山果皆熟猴猿以其儲糧之時為王式經云金氣盛時能老萬物猴猿貌也家語云五九四十五五為音音主猿猿五月生午中有沐浴金殺氣未壯至申金王殺氣始強又言在火中未有音聲出火其音方成故竝在申本生經言旦為玉者玉者有溫潤鏗鏘之音故取其旦暮為死石者石是玉類亦有音聲言其氣衰故在暮曰死玉石皆金之本故皆配金位㹨亦是同類故以配焉酉為雞雉烏者酉為金威武之用雞有五德以武為先見敵必鬭是其本性說題辭云雞為積陽南方之象火陽精物炎上故陽出則雞鳴以類感也考異郵云雞火畜丑近寅寅陽有生火喜故鳴武事必有號令故在西方巽為雞亦為號令辰巳竝與酉合故在酉雉是火鳥為武之威方伎傳云太白揚光則雞鳴熒惑流耀則雉驚易通卦驗云雉者是陽雄鳴則雌應陽唱陰和之義當時則雊亦號令之義烏者陰之禽而居日中元命苞云烏在日中象陽懷陰也以其在日中得陽氣故仁而能反哺在酉者春時日臨兌酉是二八之門日所入處取其終也故竝配酉又云暮為死右者取其金氣衰也禽變曰暮為死土者土至金末氣衰敗也本生經云暮為䳒者䳒亦迅擊有武用也無五德故在暮戌為狗狼豺者戌為黃昏乾為天門戌既屬乾昏暗之時以警備也京氏別對曰狗為主行以防姧也易曰艮為狗艮既是門闕狗以守防也家語云七九六十三三主斗斗主狗狗三月生辰衝戌寅戌合故在戌禮記月令云九月之時豺乃祭獸因候配之狼形相似說文云豺狼屬也故竝居戌一云暮死金者金至戌衰敗故也禽變云暮為死火者戌為火墓也亥為猪豕猚者式經言亥為雜水穢濁廁溷之象猪之所居猪色玄象水色也其蹄分者陰象也五更必起不失其常如水有潮不違期也家語云六九五十四四主時時主豕豕四月生也衝巳故在亥豕猪之小者猚亦取其類而好夜行以陰性也故竝在亥一云旦為生木者木生於亥也暮為蛦蝓者㺄應是𤠾恐字誤也又云旦為㹠㹠豕同也一云暮為朽木者木始生軟得水淹沒故腐朽也問曰禽蟲之例數多何故不取麟鳳為屬乃取蚯蚓蛇鼠小蟲答曰取十二屬者皆以其知時候氣或色或形竝應陰陽故也麟鳳已配五靈非是虛而不用又問曰驎鳳已配五靈更不取者龍虎亦配何為復用答曰龍動雲興虎嘯風起此是應陰陽之氣所以須取驎鳳雖靈無所作動故不重用其十二屬竝是斗星之氣散而為人之命係於北斗是故用以為屬春秋運斗樞曰樞星散為龍馬旋星散為虎機星散為狗權星散為蛇玉衡散為雞兔鼠闔陽散為羊牛搖光散為猴猿此等皆上應天星下屬年命也三十六禽各作方位為禽蟲之長領三百六十十而倍之至三千六百竝配五行皆相貫領既非占候之用不復具釋五行大義卷五終

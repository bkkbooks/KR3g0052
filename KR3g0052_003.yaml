body:
  text: 五行大義卷第三上儀同三司城陽郡開國公蕭吉撰第十四論雜配就此分爲六段一者論配五色二者論配聲音三者論配氣味四者論配藏府五者論五常六者論五事第一論配五色左氏傳子產曰發爲五色蔡伯喈云通眼者爲五色黃帝素問曰草性有五章爲五色者東方木爲蒼色萬物發生夷柔之色也南方火爲赤色以象盛陽炎焰之狀也中央土黃色黃者地之色也故曰天玄而地黃西方金色白秋爲殺氣白露爲霜白者喪之象也北方水色黑遠望黯然陰闇之象也溟海淼邈玄闇無窮水爲太陰之物故陰闇也孝經援神契言土之精黃木之精靑火之精赤金之精白水之精黑春秋考異郵云北狄之氣生幽都色黑如群畜穹閭南夷之氣生交趾色赤聚隅如旛旗鳥頭東夷之氣生菜柱色蒼搔撽布散如林木西夷之氣生沙丘色白鋒積如刀刄之浮中央土會色黃如城墎之形黃氣四塞土精舒此五者爲正色其變色亦五頴子嚴春秋釋例曰經有赤狄白狄然則東靑北黑中黃皆正色也土戊畏於木故以妹己妻甲以黃入於靑故東方閒色綠也詩云綠兮衣兮刺閒色亂正色也金庚畏於火故以妹辛妻於丙以白入於赤故南方閒色紅論語鄕黨曰紅紫不以爲褻服木甲畏於金故以妹乙妻庚以靑入於白故西方閒色縹也火丙畏於水故以妹丁妻壬以赤入於黑故北方閒色紫也孔子曰惡紫之奪朱也水壬畏於土故以妹癸妻戊以黑入於黃故中央閒色驪黃五行書云甲爲靑己爲綠丙爲赤辛爲紅庚爲白乙爲縹壬爲黑丁爲紫戊爲黃癸爲驪黃此皆夫爲本色妻爲雜色也柳世隆云八卦各有其色震爲靑離爲赤兌爲白坎爲黑此皆當方正色乾爲紫艮爲紅巽爲綠坤爲黃此竝閒色也坤取未土之正色甲乙經云靑如翠羽黑如烏羽赤如雞冠黃如蟹腹白如豕膏此五色爲生氣見靑如草滋黑如水苔黃如枳實赤如衃血白如枯骨此五色爲死氣見相經曰靑氣初來如麥生盛王之時如樹葉靑欲去之時如水上苔赤氣初來如赭柱盛王之時如朱丹欲去之時如乾血黃氣初來如蠶吐絲盛王之時如博基欲去之時如枯葉白氣初來之時如璽璧盛王之時如粉上光欲去之時如鮮錢黑氣初來之時如死馬肝盛王之時如漆光欲去之時如苔垢禮記曰君子縗絰則有哀色端冕則有敬色甲冑則有不可犯之色大戴禮云孔子曰君子有三色焉顯然怡樂鐘鼓之色意氣沈靜憂喪之色忿然競動兵革之色大戴禮觀人篇云人有五性喜怒欲懼憂喜氣內畜雖欲隱陽喜必見四氣皆然五氣在誠乎中發形於外人情不可隱也喜色猶然以出怒色怫然以侮欲色𭞺然以愉懼色薄然以下憂悲之色瞿然以靜誠智必有難盡之色誠仁必有可尊之色誠勇必有難攝之色誠忠必有可親之色誠潔必有難汙之色誠眞必有可信之色其質色皓然因以安僞色蔓然亂以煩夫喜色則黃怒色則赤憂色則靑喪色則白哀色則黑此皆五常之色動于五藏而見于外隨其善惡盛衰之應也君子所觀故於此釋第二論配聲音子產曰章爲五聲蔡伯喈云通於耳者爲聲靑作角聲白作商聲黑作羽聲赤作徴聲黃作宮聲律曆志云角者觸也陽氣蠢動萬物觸地而生也徴者祉也萬物大盛蕃祉也宮者中也居中央暢四方唱始施生爲四聲之經商者章也物成章明也羽者宇也物藏聚萃宇覆之也樂緯云春氣和則角聲調夏氣和則徴聲調季夏氣和則宮聲調秋氣和則商聲調冬氣和則羽聲調樂記曰宮爲君故宮亂則荒其君驕商爲臣商亂則陂其臣壞徴爲事徴亂則哀其事勤羽爲物羽亂則危其財匱角爲民角亂則憂其民怨五者不亂則天下和平無弊敗之音素問云木音角在聲爲呼火音徴在聲爲咲土音宮在聲爲歌金音商在聲爲哭水一音羽在聲爲呻樂記曰樂者音之所由生其本在人心之感於物是故哀心感者其聲噍以殺樂心感者其聲嘽以緩喜心感者其聲發以散怒心感者其聲粗以勵貞心感者其聲直以廉愛心感者其聲和以婉六者非性也感於物而後動審聲以知音審音以知樂審樂以知政而治道備矣故詩序曰聲成文謂之音治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困大戴禮觀人篇云誠在其中必見諸外以其見占其隱以其細占其大聲象其實氣初生物物生有聲聲有剛柔清濁好惡咸發于聲故心氣嘩誕者其聲流散心氣順信者其聲順節心氣鄙戻者其聲腥醜心氣寬柔者其聲溫和故聖人聽其聲觀其色知其善惡夫獨發者謂之聲合和者謂之音毛詩序云聲成文謂之音故因五聲而有八音樂緯云物以三成以五立三與五如八故音以八八音金石絲竹土木匏革以發宮商角徴羽也金爲鍾石爲磬絲爲絃竹爲管土爲塤木爲柷圄匏爲笙革爲鼓鼓主震笙主巽柷圄主乾塤主艮管主坎絃主離磬主坤鍾主兌樂緯汁圖徴篇云坎主冬至宮者君之象人有君然後萬物成氣有黃鍾之宮然後萬物調所以始正天下也能與天地同儀神明合德者則七始八終各得其宜而天子穆穆四方取始故樂用管艮主立春陽氣始出言雷動百里聖人授民田亦不過百畝此天地之分黃鍾之度九而調八音故聖人以九頃成八家上農夫食九口中者七口下者五口是爲富者不足以奢貧者無飢餒之憂三年餘一年之蓄九年餘三年之蓄此黃鍾之所成以消息之和故樂用塤震主春分天地陰陽分均故聖王法承天以立五均五均者亦律調五聲之均也音至眾也聲不過五物至蕃也均不過五爲富者慮貧強者不侵弱智者不詐愚市無二價萬物同均四時常得公家有餘恩及天下與天地同德故樂用鼓巽主立夏言萬物長短各有差故聖王法承天以法授事焉尊卑各有等於士則義讓有禮君臣有差上下皆次治道行故樂用笙離主夏至陽始下陰又成物故聖王法承天以法授衣服制度所以明禮義顯貴賤明燭其德率之以度則女功有差男行有禮故樂用絃坤主立秋陽氣方入陰氣用事昆蟲首穴欲蟄故聖王法之授宮室度量又章制有宜大小有法貴賎有差上下有順故樂用磬兌主秋分天地萬物人功皆以定故聖王法承天以定爵祿爵祿者不過其能宮爲君商爲臣商章也言臣章明君之功德尊卑有位位有物物有宜功成者爵賞功敗者刑罰故樂用鍾乾主立冬陰陽終而復始萬物死而復蘇故聖王法承天以制刑法誅一動千殺一感萬使死者不恨生者不怨故樂用柷梧國語曰瓦絲琴瑟尚宮鍾金尚羽石尚角匏竹尚徴革木尚商呂以和樂律以平聲金石以動之絲竹以行之歌以詠之匏以宣之瓦以贊之革木以節之物得其常曰樂所奪曰擊相保曰和細大不踰曰平瓦絲皆火也故尚宮子母相應之道鍾金尚羽亦然石尚角者石金也與角爲牝牡相和之義匏土也竹木也尚徴亦子母相應也革木俱角尚商亦以牝牡相和也宮聲和以舒其和博以柔動脾商聲散以明其和溫以虛動肺角聲防以約其和靜以清動肝徴聲敗以疾其和平以均動心羽聲疾以虛其和短以散動腎黃帝兵決云兩敵相當使人去敵營一百二十步以管注耳聽之聞隆隆如車如雷如鼓聲者宮也其將寬和有信聞金石相和轟轟擊攻如鍾磬霹靂聲者商也其將威怒好殺宜數忿之聞如奔馬炎炮掣裂聲者徴也其將猛烈勇敢難與爭鋒聞肅肅習習如動樹木如人呼愁愁聲者角也其將仁庶不可欺聞滔滔如流水揚波激氣相笑聲者羽也其將貪冒多姧謀審此五音以知敵性候風之聲亦皆如之此竝論音聲之狀故以備說第三論配氣味子產云氣爲五味鄭玄云通口者爲五味通鼻者爲五臭禮記月令云春之日其味酸其臭羶木之臭味也說文云羶者羊臭春物氣與羊相類木所以酸者象東方萬物之生酸者鑽也言萬物鑚地而出生五味得酸乃逹也元命苞云酸之言端也氣始生專心自端也禮記云夏之日其味苦其臭焦火所以苦者南方主長養也苦者所以長養之五味須苦乃以養之元命苞云苦者勤苦乃能養也方言苦快也臭焦者陽氣蒸動燎火之氣也許愼云焦者火燒物有焦燃之氣夏氣同也禮記云季夏之日其味甘其臭香土味所以甘者也中央中和也甘美也元命苞云甘者食常言安其味也甘味爲五味之主猶土之和成於四行也臭香者土之鄕氣香爲主也許愼云土得其中和之氣故香禮記云秋之日其臭腥其味辛西方殺氣腥也許愼云未熟之氣腥也西方金之氣象此味辛者物得辛乃萎殺也亦云故新之辛也故物皆盡新物已成故云新元命苞云陰害故辛殺義故辛刺陰氣使其然也禮記云冬之日其味醎其臭朽朽者水之氣也若有若無言氣微也亦云水者受垢濁故其臭腐朽也許愼云朽爛之氣北方氣同此味醎者北方物醎所以堅之也猶五味得醎乃堅也許愼云醎者銜也元命苞云醎者鎌鎌清也至寒之氣故使其清而醎鄭玄云五味醯酸酒苦蜜甘薑辛鹽醎黃帝甲乙經言穀則米甘麻酸大豆醎麥苦黍辛一云稻米辛菓則棗甘李酸栗醎杏苦桃辛菜則葵甘韭酸藿醎薤苦蔥辛畜則牛甘犬酸彘醎羊苦雞辛本草云石則玉甘金辛雄黃苦曾靑酸赤石脂醎草則茯苓甘桂心辛天門冬苦五味子酸玄參醎蟲則蜚零甘蚿𧋕辛蚦蛇苦伊威酸蜥蜴醎藥食之物例多且擧大略配五味如此皆是五行氣所生氣有偏故其味則別總而言之五穀則芒以配木散以配火房以配金莢以配水萃以配土芒大小麥之屬散𪎭黍之屬房胡麻之屬莢大小豆之屬萃稷粟之屬芒者取其鋒芒纖長象木生出地如鋒芒也舒散也象火氣溫煖物舒散也房方也象金裁割體方正也莢狹也象水流長而狹也萃聚也象萬物皆聚於土乃爲用也五菓則子以配木核以配火皮以配金殼以配水房以配土子梨㮏之屬核桃李之屬皮柑橘之屬殼胡桃栗之屬房蒲陶之屬子取其含潤如木生光潤子實茂盛核取其在肉內不堪食如火陰在內無所堪容皮取其厚急如金氣衰老物至西方而急縮也殼取其肉在內堪食如水陽在內堪能容納也房取其結聚如土物皆聚此此則總論穀菓以配五味則略如前釋月令云春食麥與羊麥有孚甲故屬木羊火畜春氣猶寒以此安性夏食菽與鷄菽有孚甲而堅合於水鷄屬木畜故爲熱時所食中央食稷與牛稷是穀之長牛是土畜以其甘和故象於時秋食麻與犬麻屬金犬亦金畜故從秋也冬食黍與豕黍舒散屬火豕水畜兼其水火以爲冬食此之五食義有不同春猶寒食溫夏方熱食寒此意可解苦甘味和故隨時適用此亦可解秋冬兩食此應宜熱所以不熱其故何也若依蔡邕解直云食味相宜則無復疑若依鄭解則誠未盡今廣鄭言少陽大陽其氣舒散少陰大陰其氣斂閉故河上公解老子言躁氣在上陽氣伏於下所以故寒靜氣在上陰氣伏於下所以故熱人體陰陽義亦如是春夏舒散陽氣開發宜以溫食用和陰氣秋冬閉斂陽氣在內宜用寒食以調陽氣冬兼水火又異於秋正以藏閉之時事甚於秋故均以水火也今又取甲乙以竝鄭義微有乖張甲乙以羊麥俱苦皆是火味鄭玄云羊火畜同以麥屬木此是取其孚甲之形用溫還同甲乙以菽醎鷄辛鄭玄云菽合水同雞屬木異此取其將旦而鳴近寅木故又振羽翼有陽性也則是酉鳥屬金爲實甲乙以麻犬俱酸鄭以麻犬俱金酸是木味用調金氣以少陽之氣味調少陰之氣理則可通金還調金恐乖和適甲乙以黍辛彘醎鄭玄云彘合水同黍屬火異此言黍色赤性熱故以爲火若依鄭意以如前解若以甲乙明堂月令之意夏食合冷者欲令調災暑鬱毒之氣冬食亦寒者去藏中伏熱春寒用溫二意不殊秋以少陽和於少陰爲有殺氣故以生味相補鄭全乖越周禮天官云凡和春多酸夏多苦秋多辛冬多醎調以滑甘解有兩家一云宜從時氣春食須多酸夏食須多苦一云多者過也春食過酸宜減其醎味夏食過苦宜減其酸味是以後句云調以滑甘今依前解四時之味各隨時所當故逐時醎苦養體之宜土既居中總戴四財是以四時味兼須甘味以調之又云會膳食之所宜牛宜稌稌稻也羊宜黍豕宜稷犬宜梁鳥宜麥魚宜菰菰彫胡也凡君子之食恆放焉凡藥酸養骨苦養氣甘養肉辛養筋醎養脈此竝相扶之義河圖云人食無極醎使腎氣盛心氣衰令人發狂喜衂吐血心神不定無極辛使肺氣盛肝氣衰令人懦怯悲愁目盲髮白無極甘令脾氣盛腎氣衰使人癡淫泄精腰背痛利膿血無極苦使心氣盛肺氣衰令人果敢輕死欬逆胸滿無極酸使肝氣盛脾氣衰令人穀不消化暗聾癥固此五藏相制剋之義黃帝養生經云酸入肝辛入肺苦入心甘入脾醎入腎病在筋無食酸病在氣無食辛病在骨無食醎病在血無食苦病在宍無食甘口嗜而飮食之不可多也必自賊也故名五賊又云肝病禁辛心病禁醎脾病禁酸肺病禁苦腎病禁甘此皆所惡之味故禁又云肺病宜食糯米飯牛肉棗葵心病宜食麥羊肉杏薤腎病宜食大豆黃黍彘肉藿肝病宜食麻犬肉李韮脾病宜食鷄肉桃黍蔥此五宜食者肝心腎三藏實故各以其本味補之脾肺虛故以其子母相養者也春秋潛潭巴云五味生五藏者醎生肝酸生心苦生脾甘生肺辛生腎養生經云肝色靑宜食醎稻米牛肉棗心色赤宜食酢犬肉李肺色白宜食甘麥羊肉杏脾色黃宜食苦大豆豕肉粟腎色黑宜食辛黍鷄宍此五食皆以所生能養其子也又云五味之入口也各有所走各有所病酸走筋多食之令人癃醎走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變甘走皮多食之令人惡心辛散酸收甘緩苦堅醎濡五穀爲養五菓爲助五畜爲益氣味合而服之隨四時五藏所宜也又云人黃色宜甘靑色宜酸黑色宜醎赤色宜苦白色宜辛此皆依本體所宜家語曰食水者善游能寒食土者無心不息食木者多力不治食草者善走而愚食桑者有緖爲蛾食宍者勇敢食氣者神明而壽食穀者惠巧不食者不死而神此皆氣味之類故附而述之五味所解例多不擧語經所明可解者如此第四論配藏府藏府者由五行六氣而成也藏則有五稟自五行爲五性府則有六因乎六氣是曰六情情性及氣別於後解今論藏府所配合義五藏者肝心脾肺腎也六府者大腸小腸膽胃三焦膀胱也肝以配木心以配火脾以配土肺以配金腎以配水膀胱爲陽小腸爲陰膽爲風大腸爲雨三焦爲晦胃爲明故杜子春秋醫和云陰淫寒疾陽淫熱疾風淫末疾末四支也雨淫腹疾晦淫惑疾明淫心疾藏者以其藏於形體之內故稱爲藏亦能藏受五氣故名爲藏府者以其傳流受納謂之曰府白虎通云肝之爲言扞也肺之爲言費也情動得序也心之爲言任也任於思也腎之爲言賓也以竅寫脾之爲言辨也所以精稟氣也元命苞云脾者辨也心得之而貴肝得之而興肺得之而大腎得之以化肝仁肺義心禮腎智脾信肝所以仁者何肝木之精仁者好生東方者陽也萬物始生故肝象木色靑而有柔肺所以義者何肺金之精義者能斷西方殺成萬物故肺象金色白而有剛心所以禮者何心者火之精南方尊陽在上卑陰在下禮有尊卑故心象火色赤而光腎所以智者何腎水之精智者進而不正無所疑惑水亦進而不惑故腎象水色黑水陰故腎雙脾所以信者何脾土之精土主信任養萬物爲之象生物無所私信之至也故脾象土色黃翼奉云肝性靜甲己主之心性躁丙辛主之睥性力戊癸主之肺性堅乙庚主之腎性敬丁壬主之許愼五經異義尚書夏侯歐陽說云肝木心火脾土肺金腎水此與前同古文尚書說云脾木肺火心土肝金此四藏不同案禮記月令云春祭以脾夏祭以肺季夏祭以心秋祭以肝冬祭以腎皆五時自相得則古尚書是也鄭玄駁曰此文異事乖未察其本意月令五祭皆言先無言後者凡言先有後之辭春祀戶其祭也先脾後腎夏祀竈其祭也先肺後心肝季夏祀中霤其祭也先心後肺秋祀門其祭也先肝後心肺冬祀行其祭也先腎後脾凡此之義以四時之位五藏之上下次之耳冬位在後而腎在下夏位在前而肺在上春位小前故祭先脾秋位小却故祭先肝肝腎脾俱在鬲下肺心俱在鬲上祭者必三故有先後焉此義不與行氣同也八十一問云五藏俱等心肺獨在鬲上何對曰心主氣肺主血血行脈中氣行脉外相隨上下故曰榮衞故令心肺在鬲上也甲乙經云黃帝問岐伯曰人有五藏藏有五變肝爲牡藏其色靑其時春其日甲乙心爲牡藏其色赤其時夏其日丙丁脾爲牝藏其色黃其時季夏其日戊己肺爲牝藏其色白其時秋其日庚辛腎爲牝藏其色黑其時冬其日壬癸素問曰肝者魂之所居陰中之小陽故通春氣心者生之本神之所處爲陽中之大陽故通夏氣脾者倉廩之本名曰興化能化糟粕轉味出入至陰之類故通土氣肺者氣之本魄之所處陽中之少陰故通秋氣腎者主蟄封藏之本精之所處陰中之太陰故通冬氣又云春無食肝夏無食心季夏無食脾秋無食肺冬無食腎周禮疾醫掌養萬人之疾病者以肝爲木心爲火脾爲土肺爲金腎爲水則疾多瘳反其術則死月令中霤之禮以陰陽進退爲次白虎通及素問醫治之書用行實爲驗故其所配是也白虎通又云木所以浮金所以沈者何子生於母義肝以沈肺以浮何有知者尊其母也一說云甲木畏金以乙妻庚受庚之化木法其本直甲故浮肝法其化直乙故沈庚金畏火以辛妻丙受丙之化金法其本直庚故沈肺法其化直辛故浮河上公注老子云肝藏魂肺藏魄心藏神腎藏精脾藏志五藏盡傷則五神去矣道經義云魂居肝魄在肺神處心精藏腎志託脾此與素問同魂爲木氣神爲火氣志爲土氣魄爲金氣精爲水氣魂通於目神通於舌志通於口魄通於鼻精通於耳甲乙經云鼻爲肺之官目爲肝之官口脣爲脾之官舌爲心之官耳爲腎之官故肺病喘息鼻張肝病目閉眥靑脾病口脣黃乾心病舌卷短顏赤腎病權與顏黑黃耳聾此名五官相書亦名五候以鼻人中爲一官主心餘竝同候者以五藏善惡色出五官可占候吉凶也鼻人中猶是口之分也孝經援神契云肝仁故目視肺義故鼻候心禮故耳司腎信故竅寫脾智故口誨元命苞曰目肝使肝氣仁而外照管子曰脾發爲鼻肝發爲目腎發爲耳肺發爲口心發爲下竅道家太平經云肝神不在目無光明心神不在脣靑白肺神不在鼻不通腎神不在耳聾脾神不在舌不知甘味又一說云目主肝耳主腎鼻主心舌主脾口主肺肝腎二藏諸經竝同肝主目者肝木藏也木是陽東方顯明之地眼目亦光顯照了故通乎目道家大式經云天曰洞視主目目主肝天陽也肝亦陽目精明亦陽目光顯見兼有常法如日陽精無缺而明也腎主耳者腎水藏水陰也北方陰暗之地耳能聽聲聲是陰微之象故通乎耳大式經曰地曰洞聽主耳耳主腎地陰也耳法虛則納聲水主虛陰主虛陰主幽陰聲又非恆如月盈虛也脾心肺三藏及候各有異說甲乙以鼻應肺道家以鼻應心管子以具應脾甲乙應肺者鼻以空虛納氣肺亦虛而受氣故也道家鼻主心者陽也老子經云天以五行氣從鼻入藏於心鼻以空通出入息高象天故與天通而氣藏於心也管子以脾是土鼻在面之中故爲其候甲乙以脾應口道家以肺應口與管子同甲乙以脾應口者口是出納之門脾爲受盛之所口能論說脾能消化故以相通道家以肺應口者肺金也金能斷割口有牙齒亦能決斷是金象也管子之意恐亦然也甲乙以舌應心道家以舌應脾管子以心應下竅甲乙以舌應心者凡資身養命莫過五味辨了識知莫過乎心五味之入猶舌知之萬事是非猶心鑒之心欲有陳舌必言之故心應舌道家以舌應脾者脾者陰也老子經云地飴人以五味從口入藏於胃舌之所納則有津實地體既是質實品味皆地所產故舌與地通也管子心應下竅者以心能分別善惡故通下竅除滓穢也五藏候在五官口舌二官共在一處餘不共者口是脾候脾土也舌是心候心火也共處者土寄治於火鄕也舌在口內者火於五行不常見也須之則有不用則隱如舌在口內開口即見閉口則藏又心爲身之主貴故在內也土王四季故曰四合也甲乙素問是診候之書故從行實而辨道經管子各以一家之趣六府者河圖云肺合大膓大膓爲傳道之府心合小膓小膓爲受盛之府肝合膽膽爲中精之府脾合胃胃爲五穀之府腎合膀胱膀胱爲津液之府三焦孤立爲內瀆之府甲乙素問說同大膓爲傳道之府者肺通於鼻鼻出入氣大膓傳道五穀氣之道故爲其府小膓爲受盛之府者心通於舌舌進五味小膓納之故爲受盛之府也膽爲中精府者肝通於目目是精明之物又精神之主故曰爲中精府也胃爲五穀府者脾通於口口入五穀而胃受之故爲其府膀胱爲津液之府者腎是水藏膀胱空虛受水水清氣則爲津液濁氣則爲涕唾故以爲其府三焦爲中瀆府者五藏各合一府三焦獨無所合故曰孤立處五藏之中通上下行氣故爲中瀆府也五藏而有六府亦如六氣因五行生也又如五性生六情也素問云皮應大膓其榮毛主心脈應小膓其榮色主腎筋應膽其榮爪主肺宍應胃其榮脣主肝腠理毫毛應三焦膀胱其榮髮主脾皮應大膓其榮毛主心者心是身之君皮是身之城墎毛是身之羽衞大膓是氣之道路也故竝相通心是火藏大膓是金府故以配焉丙辛之所主也脈應小傷其榮色主腎者腎水也脈是血之溝渠通流水氣色是人之光采血氣若盛則榮色壯悅血氣若衰則容顏枯悴腎爲水藏小膓既能受盛容著水氣又是火府故以配之丁壬所主也筋應膽其榮爪主肺者筋是皮內之剛強爪是皮外之剛利肺是金藏膽有剛精之性又是木府故以相配乙庚所主也宍應胃其榮脣主肝者胃能消化五穀精氣爲肉五穀從口而入故榮潤在唇肝是木之藏仁而能生胃是土府故以相配甲己所主也腠理毫毛應三焦膀胱其榮髮主脾者毫毛因籍津潤腠理本自開通脾受資味之所因資味而得津潤開通因津潤開通而生毛髮書云髮是血之餘脾是土之藏三焦膀胱竝爲水之府故以相配戊癸所主也脾配二府餘四藏各配一府者脾是土藏土爲君道君即陽也陽數一故藏不二也三焦膀胱竝是水府水爲臣道臣即陰也陰數偶故府有二也管子曰脾生骨腎生筋肺生革心生肉肝生爪髮元命苞云肝生筋脾生骨者脾土也土能生木骨是身之本如木立於地上能成屋室故脾生之腎生筋者筋是骨之經絡脉以流注筋以相連節竝通血氣腎水故生之肺生革者肺金也金能裁斷革亦限斷故肺生之心生肉者心火也肉是身之土地故心生之肝生爪髮者肝木也爪是骨之餘髮是血之餘皆水木之氣故肝生之元命苞云以肝生筋亦木氣之義筋有枝條象於木也河圖云仁慈惠施者肝之精悲哀過度則傷肝肝傷則令目視芒芒禮操列眞心之精喜怒激切傷心心傷則疾衂吐逆和厚篤信者脾之精縱逸貪嗜則傷脾脾傷則畜積不化致否結之疾義惠剛斷肺之精患憂憤勃則傷肺肺傷則致欬逆失音智辨謀略腎之精勞欲憤滿則傷腎腎傷則喪精損命此豈直違五常而損年命亦破六情以亡家國也至如桀紂兩帝竝貪縱而喪厥邦梁竇二臣亦皆奢逸而傾其家雖彭子以色延命齊王因怒袪病如此異轍皆有調節之宜節之則四大獲安縱之則五藏成患素問云肝者爲將軍之官謀慮出焉心者爲主守之官神明出焉脾者倉廩之官五味出焉肺者相傅之官治節出焉腎者作強之官伎巧出焉肝者爲將軍之官謀慮出者木性仁仁者必能深思遠慮恆欲利安萬物將軍爲行兵之主必以謀慮爲先故兵書曰兵以仁擧則無不從得之以仁分則無不從悅又曰將無謀則士卒憂將無慮則士卒去故肝爲將軍出謀慮也心爲主守之官神明出者火南方陽光暉人君之象神爲身之君如君南向以治易以離爲火居大陽之位人君之象人之運動情性之作莫不由心故爲主守之官神明所出也脾爲倉廩之官五味出者萬物生則出土死亦歸之五穀之入脾以受之故五味之出亦由於此也肺爲相傅之官治節出者金能裁斷相傅之任明於治道上下順敎皆有禮節肺於五藏亦治節所生樂緯云商者章也臣章明君德以齊上下相傅腎所由也腎爲作強之官伎巧出者水性是智智必多能故有伎巧巧則自強不息也八十一問曰藏各有一腎獨兩者何也左者腎右者命門命門者精神之所會也河圖云肝心出左脾肺出右腎與命門竝出尺部此脉候也問曰前解云腎陰故雙今言左腎右命門此豈不自乖張乎答曰命門與腎名異形同水藏則體質不殊故雙主陰數爲名則左右兩別故各有所主猶如三焦膀胱俱是水府不妨兩號老子經及素問云心藏神者神以神明照了爲義言心能明了萬事神是身之君象火已如前解腎藏精者精以精靈叡智爲稱亦是精智氣腎水智巧故精藏焉脾藏志者志土土總四行多所趣向志以心願趣向爲目故藏於脾肝藏魂者魂以運動爲名肝是少陽陽性運動木性仁故魂亦主善故藏於肝焉肺藏魄者魄以相著爲名肺爲少陰陰性恬靜金主殺魄又主惡故以藏之五藏所主乃以神精志魂魄五種就陰陽論唯有二別陽曰魂陰曰魄河上公章句云五氣清微爲精神聰明音聲五性其鬼曰魂魂者雄也主出入於鼻與天通五味濁溽爲形骸骨宍血脉六情其鬼曰魄魄者雌也出入於口與地通家語曰宰我問孔子曰聞鬼神之名而不知其所謂孔子曰人生有氣魂氣者神之盛也魄氣者鬼之盛也人生有死死必歸土此謂之鬼魂氣歸乎天此謂之神合鬼與神而享之敎之至也骨肉斃乎下化爲野土其氣發揚乎上此神之著也聖人因人物之情而明命鬼神以爲民則燔燎羶薌所以報氣也薦黍稷修肺肝加以鬱暢所以報魄也漢書五行志云人命終而形藏精神散越聖人爲之宗廟以收魂氣春秋祭祀以修孝道尸子曰鬼歸也古者謂死人爲歸人淮南子曰人精神者天之有也骸骨者地之有也精氣入其門而骸骨反其根又云天氣爲魂地氣爲魄禮記郊特牲云凡祭愼諸此魂氣歸乎天形魄歸乎地故祭求諸陰陽之義故氣之清者曰神即陽魂也氣之濁者曰鬼即陰魄也延陵季子葬其子於贏博之閒云骨肉歸乎土命也魂氣無不之越記云王問范子曰寡人聞失其魂魄者死得其魂魄者生也物皆有之將人乎范蠡對曰魄者囊也魂者生氣之源又云魂者生氣之精魄者死氣之舍韓詩云湊洧有二水三月上巳鄭國常於此水上招魂續魄左傳昭二十五年宋公讌飮使昭子叔右坐語相泣樂孔子曰今君與子叔皆死乎心之精爽是謂魂魄魂魄去之何以能久此竝明人身有魂魄二別老子經云魂藏肝魄藏肺者魂既屬天天氣爲陽陽主善尚左居肝在東方木位魄既屬地地氣爲陰陰主惡尚右故居肺在西方金位老子云吉事尚左凶事尚右亦云五氣藏於心五味藏於胃者此論氣則是陽以藏受之心爲火藏陽氣所處味則是陰以府受之胃爲五穀之府味之所處心主精神胃主受納不乖魂魄陰陽之理又云魂有三魄有七者陽數奇陰數偶奇數始於一一則元氣魂雖是陽非曰元始一後次三故魂數三又云因天地二氣合而生人人又一氣三材各一氣故魂有三陰數二二亦陰之始魄雖是陰又非元始次二後四陰不孤立必資於陽就魂之三合而成七又一解云魂在東方取震數三魄居西方取兌數七三魂七魄合而爲十是應天五行地五行兩五合爲十共成人也五是天五氣地五味也春秋緯云人感十而生故十月方生也又云有六魄者此乃道家三皇經以五藏神爲五魂六府神爲六魄此亦五行六氣之義也魂魄人之本既配府藏故釋之甲乙云魂屬精魄屬神第五論五常五常者仁義禮智信也行之終久恆不可闕故名爲常亦云五德以此常行能成其德故云五德而此五德配於五行鄭玄注禮記中庸篇云木神則仁金神則義火神則禮水神則信土神則智詩緯等說亦同毛公傳說及京房等說皆以土爲信水爲智漢書天文志云歲星於人五常仁也五事貌也仁虧貌失逆春令傷木氣罰見歲星熒惑於人五常禮也五事視也禮虧視失逆夏令傷火氣罰見熒惑太白於人五常義也五事言也義虧言失逆秋令傷金氣罰見太白辰星於人五常智也五事聽也智虧聽失逆冬令傷水氣罰見辰星鎭星於人五常信也五事思也仁義禮智以信爲主貌言視聽以思爲正四事皆失鎭星乃爲之動按毛公及京房漢史皆以土爲信可謂其當所以然者夫五常之義仁者以惻隱爲體博施以爲用禮者以分別爲體踐法以爲用智者以了智爲體明叡以爲用義者以合義爲體裁斷以爲用信者以不欺爲體附實以爲用其於五行則木有覆冐滋繁是其惻隱博施也火有滅暗昭明是其分別踐法也水有含潤流通是其了智明叡也金有堅剛利刄是其合宜裁斷也土有持戴含容以時生萬物是其附實不欺也鄭玄及詩緯以土爲智者以能了萬事莫過於智能生萬物莫過於土故以爲智水爲信者水之有潮依期而至故以水爲信此理寡證狹於羲乖也其於五經則仁以配易其位東方禮以配火其位南方義以配傳其位西方智以配詩其位北方信以配尚書其位中央易配東方仁者易是創制之書苞括萬有有變易之義東方四時之始仁化能生易故就新又帝出震始作八卦故以配仁禮配南方者禮能齊上下之法別貴賤之差君臣父子莫不以禮節之如火能成就五味明照萬物故以南方配禮傳配西方義者春秋是魯史褒貶得失是時王道既衰諸侯力爭戰伐之事靡不書之合義者褒失德者貶如金以義斷裁制萬物故以配義詩配北方智者詩言其志以爲風刺有陰微之辭和潤人情動鬼神感天地以善惡之事吟咏於聲樂使聞者有益於行作者無咎於身如水潛流無所不潤故以智配尚書配中央信者此是上古之書傳述帝王之言信誓之事靡不存焉可宗尚故如土有信以時生物四時所宗故以信配經即常也亦云由也亦云法也述經由事故云由也理可法則故云法也常爲訓典故即常也然經體既爲常法其當體各備五常事有所專但以一方爲主未論文義故不備說五常之行由經而明故以配釋第六論配五事五事者尚書洪範云敬用五事蓋以人事配五行也一曰貌以配木二曰言以配金三曰視以配火四曰聽以配水五曰思以配土尚書洪範曰貌曰恭言曰從視曰明聽曰聰思曰叡恭作肅從作乂明作哲聰作謀叡作聖貌曰恭者天子之恭曰穆穆上恭肅則下敬矣孔子曰其行己也恭其事上也敬又曰在體曰恭加於人施於事曰敬貌之不恭是謂不肅肅敬也夫洪範所陳五事貌爲首者於易貌爲震震爲木木可觀也故經列三德而服爲其上詩云敬愼威儀惟人之則有威而可畏謂之威有儀而可象謂之儀君有威儀其臣畏而愛之則而象之故能長有其國臣有威儀故能長守其職君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之威儀孔子曰正其衣冠尊其瞻視儼然人望而畏之不亦威而不猛又曰不嚴以蒞之則人不敬故失威儀之節怠慢驕恣謂之狂狂則下不肅矣下不敬則上無威夫不敬其君不從其政則陰氣勝陰氣勝則水象至故曰厥罰常雨雨則飢寒至飢寒至則上下不相信大臣姧軌民爲寇盜民多被刑則其服妖服妖者輕𡬽漂泆暴慢之服以象風氣之化也言者於易之道曰兌兌曰口言之象人君言出令行則從故易曰悅以使民民忘其勞悅以犯難民忘其死是以明君薄斂而厚祿賞疑從重罰疑從輕則順民心故其敎不肅而成其政不嚴而治此得民心民心得則眾歸之眾歸之則民死沒且不忘之況乎從其令也若君失眾心政令不從亢陽自消羣陰不附而下畏君之重刑則陽氣勝陽氣勝則旱故曰厥罰常陽常陽則飢貧飢貧不足不足不敢正言則先發於歌謠之口也氣逆則惡言至蟲蝗生皆口事也視者南方目之象視曰明明以知人爲本於易爲離離爲火爲目夫視不明微弱不知所信必長伺黨仇親同類如此賢者不進賢者不進則不肖者不退不肖者不退則犯上者不誅無罪者橫罰百職廢壞庶事滯塞敎政舒緩故曰厥罰常燠燠則冬泄冬氣泄則不寒春夏氣錯疾疫起矣犯上者不誅則草犯霜而不死貪取百姓之財則蝗螟亦食人之食矣此皆視之所象也聽者在耳耳者於易坎也古者聖王有進善之旌欲諫之鼓謀於芻蕘所以博延而廣聽也人君不好謀則下莫敢言下莫敢言則上無所聞上無所聞則不聽不聽者由不謀政事故曰不聽無所聞知庶事擁屈怨在心口喜怒不節故曰急也夫寒者急物冬物皆枯急枯急故曰厥罰常寒常寒則不生百穀不生百穀則民貧窮矣故妖生於耳以類相動則有鼓妖聲音之類坎爲彘耳氣傷有彘禍水色黑有黑灾此皆聽也思者心爲五事之主猶土體爲五行主也於易爲坤八正之氣亦起於八風風者四時之主思心得謂之容容者能容畜臣子故謂之聖也思心不得四者皆失則不能容畜臣子故曰思心不容是謂不聖過在霧亂失紀故風者於易巽在三月四月純陽而治於陽則爲陰於陰則爲陽大臣之象君既霧亂則大臣專恣大臣專恣而陰氣盛陰氣盛則應故厥罰常風陰氣多者陰而不雨其甚也常陰暗者苞承於心心氣傷則爲暗妖易曰坤爲牛坤土也土氣傷則牛多死又曰土爲內事內事亂則有華孽此皆思之事也五事所感其例甚多略擧如此五行大義巻第三終

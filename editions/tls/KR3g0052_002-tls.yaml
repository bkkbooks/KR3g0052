body:
  text: 五行大義卷第二上儀同三司城陽郡開國公蕭吉撰第四論相生就此分爲三段一者論相生二者論生死所三者論四時休王第五論配支干第六論五行相雜就此分爲三段一者論五行體雜二者論支干雜三者論方位雜第七論德第八論合第九論扶抑第十論相剋第十一論刑第十二論害第十三論衝破第一論相生經云天生一始於北方水地生二始於南方火人生三始於東方木時生四始於西方金五行生五始於中央土又曰天始生一者因一而生天非天生一也故云一生二二生三三生萬物地生二者亦因二而生地因三生人因四生時五行皆由一而生數至於五土最在後得五而生五行也五行同出而異時者出離其親有所配偶譬如人生亦同元氣而生各出一家配爲夫妻化生子息故五行皆相須而成也五行同胎而異居有先後耳夫五行皆資陰陽氣而生故云濡氣生水溫氣生火強氣生木剛氣生金和氣生土故知五行同時而起託義相生傳曰五行竝起各以名別然五行既以名別而更互用事輪轉休王故相生也頴容云凡五行相生謂異類相化如男女異姓能至繁殖若以水濟水不生嘉味河閒獻王問溫城薰君曰孝者天之經地之義也何謂也對曰天有五行木火土金水是也木生火火生土土生金金生水水生木木爲春春主生夏主長養秋主收冬主藏藏者冬之所成也是故父之所生其子長之父之所長其子養之父之所養其子成之不敢不致如父之意盡爲人之道也故五行者五常也白虎通云木生火者木性溫暖火伏其中鑽灼而出故木生火火生土者火熱故能焚木木焚而成灰灰即土也故火生土土生金者金居石依山津潤而生聚土成山山必生石故土生金金生水者少陰之氣潤澤流津銷金亦爲水所以山雲而從潤故金生水水生木者因水潤而能生故水生木也元命苞云陽吐陰化故水生木也春秋繁露云東方木木農之本司農五穀畜績司馬食之故木生火火本朝司馬當知天時形兆未萌照然獨見天下既寧以安君臣故火生土也土君當信因時之威武強御以成大理司徒故土生金金尚書義邊境安寧寇賊不發邑無獄訟則安執法司寇故金生水水執法司寇尚禮君臣有位長幼有序百工維時以成歲用器械既成以給司農田官故水生木兩說事義雖別而相生是同五行各定形唯火鑽灼方出者火是大陽之氣溫故乃生鑽木出者還寄託萬物耳如聖人無名能理萬物還以萬物爲名陽氣至神故有隱顯第二論生死所五行體別生死之處不同遍有十二月十二辰而出沒木受氣於申胎於酉養於戌生於亥沐浴於子冠帶於丑臨官於寅王於卯衰於辰病於巳死於午葬於未火受氣於亥胎於子養於丑生於寅沐浴於卯冠帶於辰臨官於巳王於午衰於未病於申死於酉葬於戌金受氣於寅胎於卯養於辰生於巳沐浴於午冠帶於未臨官於申王於酉衰於戌病於亥死於子葬於丑水受氣於巳胎於午養於未生於申沐浴於酉冠帶於戌臨官於亥王於子衰於丑病於寅死於卯葬於辰土受氣於亥胎於子養於丑寄行於寅生於卯沐浴於辰冠帶於巳臨官於午王於未衰病於申死於酉葬於戌戌是火墓火是其母母子不同葬進行於丑丑是金墓金是其子義又不合欲還於未未是木墓木爲土鬼畏不敢入進休就辰辰是水墓水爲其妻於義爲合遂葬於辰昔舜葬蒼梧二妃不從故知合葬非古然季武子云自周公已來未之有改詩云穀則異室死則同穴葢以敦其義合骨肉同歸水土共墓正取此也又以四季釋所理歸於斯高唐隆以土生於未盛於戌壯於丑終於辰辰爲水土墓故辰日不哭以辰日重喪故也袒踊之哀豈待移日高唐所說葢爲浮淺其生王意別又是一家五行書云土雖有寄王於火鄕生於巳葬於辰然土分王四季各有生死之所辰土受氣於申酉胎於戌養於亥生於子沐浴於丑冠帶於寅臨官於卯王於辰衰病於巳死於午葬於未未土受氣於亥子胎於丑養於寅生於卯沐浴於辰冠帶於巳臨官於午王於未衰病於申死於酉葬於戌戌土受氣於寅卯胎於辰養於巳生於午沐浴於未冠帶於申臨官於酉王於戌衰病於亥死於子葬於丑丑土受氣於巳午胎於未養於申生於酉沐浴於戌冠帶於亥臨官於子王於丑衰病於寅死於卯葬於辰孝經援神契云五行土出利以給天下龜經云土木動爲辰土火動爲未土金動爲戌土水動爲丑土又云甲乙寅卯爲辰土丙丁巳午爲未土庚辛申酉爲戌土壬癸亥子爲丑土凡五行之王各七十二日土居四季季十八日并七十二日以明土有四方生死不同此蓋卜筮所用若論定位王相及生死之處皆以季夏六月爲土王之時禮記云中央土在季夏之後此則歲之半處四時之中央天社地神人鬼又竝在未坤亦在未卦主於土故云土德於未終於丑易曰西南得朋東北喪朋此則明土王定在於未墓定在辰也五行皆以父母臨官中生者取其盛壯能生養義唯金在火中生者巳中有方壯之土能生金也金非火不革其形故金在火位中生又云金生鬼中者金父土戊己寄治丙丁父不能獨養要須母也金在南方值巳火金得火方化金化而水生戊己土有化生之水則金不畏火己含水氣則金之繼母也五行皆以葬後之月而受氣者以其死還復生神氣不絕故也第三論四時休王休王之義凡有三種第一辨五行體休王第二論支干休王第三論八卦休王五行體休王者春則木王火相水休金囚土死夏則火王土相木休水囚金死六月則土王金相火休木囚水死秋則金王水相土休火囚木死冬則水王木相金休土囚火死支干休王者春則甲乙寅卯王丙丁巳午相壬癸亥子休庚辛申酉囚戊己辰戌丑未死夏則丙丁巳午王戊己辰戌丑未相甲乙寅卯休壬癸亥子囚庚辛申酉死六月則戊己辰戌丑未王庚辛申酉相丙丁巳午休甲乙寅卯囚壬癸亥子死秋則庚辛申酉王壬癸亥子相戊己辰戌丑未休丙丁巳午囚甲乙寅卯死冬則壬癸亥子王甲乙寅卯相庚辛申酉休戊己辰戌丑未囚丙丁巳午死八卦休王者立春艮王震相巽胎離沒坤死兌囚乾廢坎休春分震王巽相離胎坤沒兌死乾囚坎廢艮休立夏巽王離相坤胎兌沒乾死坎囚艮廢震休夏至離王坤相兌胎乾沒坎死艮囚震廢巽休立秋坤王兌相乾胎坎沒艮死震囚巽廢離休秋分兌王乾相坎胎艮沒震死巽囚離廢坤休立冬乾王坎相艮胎震沒巽死離囚坤廢兌休冬至坎王艮相震胎巽沒離死坤囚兌廢乾休其卦從八節之氣各四十五日凡當王之時皆以子爲相者以其子方壯能助治事也父母爲休者以其子當王氣正盛父母衰老不能治事如堯老委舜以國政也所畏爲死者以其身王能制殺之所刻者爲囚者以其子爲相能囚讎敵也柳世隆云木王時爲林園竹樹相時爲葦荻草萊休時爲椽柱船車囚時爲薪樵榛梗死時爲棺槨朽株火王時爲陶冶炎光相時爲燈燭休時爲煙氣囚時爲炭燼死時爲灰土王時爲國邑山嶽相時爲城社丘陵休時爲田宅囚時爲墻垣死時爲糞壤金王時爲金玉寶器相時爲銀銅利刄休時爲鉛錫犂鋤囚時爲焦器釜钁死時爲沙礫碎鐵水王時爲海瀆相時爲湖澤陂泉休時爲溝渠囚時爲酒漿死時爲枯池涸井此竝王時氣盛故爲洪大之物相時氣劣其比漸小休時氣衰故復轉微之囚時彌惡所以最下死時弃不用故是枯朽之類也趙怡云五行之位得其方爲盛得其所畏爲終故木畏金甲以女弟乙妻庚庚得木氣故木胎於金鄕而生於水中盛於其方衰於火鄕火中有生金故終於未至西方而木終以金王也丙以女弟丁妻壬壬得火氣故火胎於水鄕生於木中盛於其方衰於金位至北方而終以水王也戊以女弟己妻甲甲得土氣故土胎於木鄕而生於火中盛於其位衰於水鄕至東方而終以木王也庚以女弟辛妻丙丙得金氣故金胎木鄕生火位盛於其方衰於水鄕至東方而終有生火也壬以女弟癸妻戊戊得水氣故水胎於土鄕生於金中盛於其方衰於木鄕至南方而終有強土也更互相生相畏終始不絕之義也第五論配支幹支干之義多所配合今略論方位及配所幹不獨立支不虛設要須配合以定歲月日時而用如君臣夫婦必配合以相成總而言之從甲至癸爲陽爲干爲日從寅至丑爲陰爲支爲辰別而言之干則甲丙戊庚壬爲陽乙丁己辛癸爲陰支則寅辰午申戌子爲陽卯巳未酉亥丑爲陰陽則爲剛爲君爲夫爲上爲外爲表爲動爲進爲起爲仰爲前爲左爲德爲施爲開陰則爲柔爲臣爲妻爲妾爲財爲下爲內爲裏爲止爲退爲伏爲位爲後爲右爲刑爲藏爲閉陰陽所擬例多且略大綱如此甲乙寅卯木也位在東方丙丁巳午火也位在南方戊己辰戌丑未土也位在中央分王四季寄治丙丁庚辛申酉金也位在西方壬癸亥子水也位在北方甲爲干首子爲支初相配者太陽之氣動於黃泉之下在建子之月黃鍾之律爲氣之源在子故以子爲先萬物湊出於建寅之月皆以見形甲屬此月故以甲爲先而配子見者爲陽故從干未見者爲陰故從支所以用甲子相配爲六旬之始干既有十支有十二輪轉相配終於癸亥故有六十日十日一旬故有六旬一旬盡一甲癸便以甲配子盡干至癸酉便盡干餘支有戌亥又起甲配戌盡干至癸未餘支有申酉又起甲配申盡干至癸巳餘支有午未又起甲配午盡干至癸卯餘支有辰巳又起甲配辰盡干至癸丑餘支有寅卯又起甲配寅盡干至癸亥十干有十二支相配周畢還從甲子起故六甲輪轉止六十日十日一旬一旬之內二支無配偶者爲之孤所對衝者爲之虛卜筮所云空亡以支孤無干故名爲空亡亡者无也无干故亡所對者全虛故云空也筭法橫下十二支位於四方縱下八干位於四方下戊己位於中央若甲子旬取甲干以配子支如此次第相配至戊辰位在中央土爲四行主不可移故取辰支巳支入中央配戊己餘悉以干就支至戌亥无干配之單故爲孤辰巳之位支干竝无故名爲虛其空亡之辰從五行言之如甲子旬无戌亥水土半空亡以戌是土亥是水也不全無亥子故云半也甲戌旬無申酉爲金全空亡以金二支竝无也甲申旬無午未爲火土半空亡以巳午不全无也甲午旬無辰巳亦然甲辰旬無寅卯亦云木全空亡甲寅旬無子丑亦水土半空亡竝以二支不俱無也兵書云陽生甲子不足戌亥仍爲天門陰生甲午不足辰巳仍爲地戶陽界甲寅不足子丑仍爲鬼門陰界甲申不足午未仍爲人門陽盛甲辰卯爲之隔陰興甲戌酉爲之隔此竝是六甲之空支也春秋元命苞云地不足東南右動終而入虛門此明甲子孤在戌亥虛在辰巳也一干一支爲一日者以周天三百六十五度四分度之一日日行一度故正用一干一支以主一日也三旬爲一月者月日行十三度四分度之一三旬而周天也十二月爲一歲者四時時有三月生殺之功備遍十二支也一歲合三百六十日者六六三十六六甲之數也六甲閒兩月之日者以陰陽奇偶備也陽者爲奇陰者爲偶萬物庶類吉凶之理以此彰矣其支干相配歲月日時竝然立歲之元起於上元甲子立月之元起甲己之歲十一月甲子立日之元六旬起自甲子立時之元冬夏二至後得甲己之日夜半起甲子四事皆以甲子爲首也其上配九星下配九州者黃帝兵決云甲子從北斗魁第一星起順數至庚午在第七剛星至辛未還從第六星逆數至丙子又從第一星順數盡六甲其下配九州者史書云甲齊乙東夷丙楚丁南夷戊魏己韓庚秦辛西夷壬燕癸北夷漢晝五行志云甲乙海外日月不治丙丁江淮海岱戊己中州河濟庚辛華山以西壬癸常山以北子周丑翟寅楚卯鄭辰邯鄲巳衞午秦未中山宋申齊酉魯戌越亥燕龍首經曰子齊靑州丑吳越楊州寅燕幽州卯宋豫州辰晉兗州巳楚荆州午周三河未秦雍州申蜀益州酉梁州戌徐州亥衞并州若地辰之位史漢近之星次而論龍首爲當其配人身甲乙爲頭丙丁爲胸脇戊己爲心腹庚辛爲股壬癸爲手足則子爲頭丑亥爲胸臂寅戌爲手卯酉爲腰脇辰申爲尻肱巳未爲脛午爲足此皆初爲首末爲足配五藏也干以甲乙爲肝丙丁爲心戊己爲脾庚辛爲肺壬癸爲腎也支以寅卯爲肝巳午爲心辰戌丑未爲脾申酉爲肺亥子爲腎此皆從五行配之又干以甲乙爲皮毛丙丁爲爪筋戊己爲肉庚辛爲骨壬癸爲血脈也支以寅卯爲皮毛巳午爲爪筋辰戌丑未爲肉申酉爲骨亥子爲血脈也木生在地上故爲皮毛火有猛毅故爲筋爪土有持載故以爲肉金性堅剛故爲骨水本流潤故是爲血脈竝支干所配故以備釋第六論五行相雜就此分爲三段一者論五行體雜二者論支干雜三者論方位雜第一論五行體雜凡五行均布遍在萬有不可定守一途今先論五行體雜但其氣周流隨事而用若言不雜水只應一何故謂五而爲六火金木土竝爾當知生數爲本成數爲雜既有雜故一行當體即有五義如木有曲直此是木也木中有火則是火也木堪爲兵仗有擊觸之能即是金也木中有潤即是水也木吐華葉子實即是土也火外陽即是火也內陰即是水也能殺即是金也能熟即是木也能生即是土也土能生即是土也能容即是水也能成即是木也能防故是金也含陽即是火也金能斷即是金也從革即是木也含火即是火也有汙即是水也能生即是土也水外陰即是水也內陽即是火也含養即是木也潤生即是土也能殺即是金也此皆以義釋一行通有五氣就事而論義則不爾或有或無質弱者則體相容質堅者則體不相容金中無木木中無金金木以正相害故水中無火火中無水兩法正相害故亦水中無金金中有水木中亦有水木中亦有火石中亦有火而水能生木則木中有水水生於金金中有水火生於木木中有火水復從金生金中有水水能生木木中有火火刻於金那得石復有火此是火性弱故弱能入堅而火中無金是堅不能入弱木生於水木中含水金能生水金中含水所以水中無金木者金木在水中不得言水體有金木濕潤在木石中木石便得有水義此亦是弱能入堅堅不能入弱炎州有樹生於火中此非火能生樹是火不能燒樹亦非火在樹中乃是樹在火中而體不相雜無異金在水中而不能雜水體亦如海中陰火潛燃此水中有火但非水體雜火此稍涉靈奇亦非五行常凖又木中有火火還燒木此是生火方盛故能燒木石中有火火不燒石是火至金鄕氣已衰故不能燒石其以火消金者亦取其盛故能爍金是不取衰火猶如金能剋木鈆錫不能斷此是不堅之金也土性包含無所不受故土中皆備有水金木火火非直陽氣猶如范陽地燃是陰也土火非相害雖不恆爾不得言無等是四行何故獨爾土既居地地即是陰火即是太陽之氣故不得恆有也第二論支干雜支干雜者五行書云甲以女弟乙嫁庚爲妻故乙中有雜金立春木王甲召乙還乙懷金氣來故仲春殺榆莢白也丙以女弟丁嫁壬爲妻丁中有雜水立夏火王丙召丁還丁懷水氣來故仲夏桑椹熟黑也戊以女弟己嫁甲爲妻己中有雜木季夏土王戊召己還己懷木氣來故季夏有菓實靑也庚以女弟辛嫁丙爲妻辛中有雜火立秋金王庚召辛還辛懷火氣來故仲秋棗熟朱也壬以女弟癸嫁戊爲妻癸中有雜土立冬水王壬召癸還癸懷土氣來故仲冬草木皆黃也甲丙戊庚壬爲男剛強故自有德不雜乙丁己辛癸爲女柔弱不自專從夫故有雜猶出嫁之女即稱夫氏歸寧之日攜子而來氏族便雜五行十雜云甲爲木乙爲材丙爲火丁爲灰戊爲土己爲泥庚爲金辛爲鑪銻壬爲水癸爲濁汙此皆雜義也寅卯爲木春懷火故卯爲純木寅爲雜木巳午爲火夏懷土故午爲純火巳爲雜火申酉爲金秋懷水故酉爲純金申爲雜金亥子爲水冬懷木故子爲純水亥爲雜水土居中央分主四氣故辰中有餘木未中有餘火戌中有餘金丑中有餘水各十二日故四孟爲懷任生氣之所由四仲盛壯之所立四季葬送之所在懷任及葬皆有雜義第三論方位雜五行非直性相雜當方亦有雜義東方甲乙寅卯辰甲木也乙中有雜金寅中有生火辰土也卯中有死水南方丙丁巳午未丙火也丁中有雜水巳中有生金未土也午中有死木西方庚辛申酉戌庚金也辛中有雜火申中有生水戌土也又酉中有胎木北方壬癸亥子丑壬水也癸中有雜土亥中有生木子中有胎火丑中有死金此竝方別有五行也寅午戌火之位也寅中有生火在東方午中有王火在南方戌中有死火在西方亥卯未木之位也亥中有生木在北方卯中有王木在東方未中有死木在南方申子辰水之位也申中有生水在西方子中有王水在北方辰中有死水在東方巳酉丑金之位也巳中有生金在南方酉中有王金在西方丑中有死金在北方此一行之體雜在三方也未辰丑戌土之位也未中有王土辰中有死土丑中有衰土戌中有壯土此土體雜在四方也趙怡言五行相雜如錦綺焉斯言當矣第七論德德者得也有益於物各隨所欲無悔恡故謂之爲德也五行書云若有一德能攘百災凡陰陽用事遇德爲善謂之福德爲有救助萬事皆吉災害消亡德有四德三者從支干論之一者從月氣論之支干三種者一曰干德二曰支德三曰支干合德干德者甲德自在乙德在庚丙德自在丁德在壬戊德自在己德在甲庚德自在辛德在丙壬德自在癸德在戊此十干者甲丙戊庚壬爲陽尊故德自處乙丁己辛癸爲陰卑故配德於陽有從夫之義所以不自爲德揚子云配日之道正有五日甲己爲木丙辛爲火戊癸爲土乙庚爲金丁壬爲水陰陽之理必相配偶以則君臣夫婦之義甲爲君爲夫己爲臣爲妻君位自在臣位由君故己德在甲乙德在庚也餘四皆然陰從陽之道支德者子德在巳丑德在午寅德在未卯德在申辰德在酉巳德在戌午德在亥未德在子申德在丑酉德在寅戌德在卯亥德在辰此皆以其夫生助之所也子以巳爲德者子水也以土爲夫巳中有生土丑以午爲德者丑土也以木爲夫午中有死木寅以未爲德者寅木也以金爲夫未中有冠帶金卯以申爲德者卯木也以金爲夫申中有相金辰以酉爲德者辰土也以木爲夫酉中有胎木巳以戌爲德者巳火也以水爲夫戌中有冠帶水午以亥爲德者午火也以水爲夫亥中有相水未以子爲德者未土也以木爲夫子中有沐浴木申以丑爲德者申金也以火爲夫丑中有養火酉以寅爲德者酉金也以火爲夫寅中有生火戌以卯爲德者戌土也以木爲夫卯中有王木亥以辰爲德者亥水也以土爲夫辰中有死土或問云從夫之義生者有德能相和養故從死者離背不能和從何以死猶爲德答曰婦無再醮一降適人便稱夫氏雖死猶從其族豈得生而稱之死便捨弃故陰之從陽生死常存支干合德者子德在甲丑德在辛寅德在丙卯德在丁辰德在庚巳德在己午德在戊未德在辛申德在壬酉德在癸戌德在庚亥德在乙此皆從子爲德也謂子能扶助其母有孝養之性以爲德也凡干爲陽支爲陰陽體剛強自在陰體柔順從陽婦人有三從之禮每無自專之義夫死從子故以子爲德若有支干各自爲德皆從其夫既今支干共爲德故離其夫位故便從子也子德在甲者水爲木母故也例皆如之一從月氣爲德者德不孤立對之以刑德爲陽以從乾刑爲陰以從坤亦如人之治政刑德兩施德有慶賜爵賞所以配陽刑有殺罰削奪所以配陰故王者日蝕則脩德月蝕則脩刑董仲舒春秋繁露云天道之常一陽一陰陽者天之德陰者天之刑陰陽以終歲之行以觀天之所親任可以見德刑之用矣然天之任陽不任陰好德不好刑故陽出而積於夏任德以歲事陰出而積於冬錯刑以空處也太公云人主擧事善則天應之以德惡則天應之以刑此竝陰陽相對德不獨治須偶之以刑也從乾坤二卦之氣者十月坤卦用事自十一月而陽氣動陰爻變四月乾卦用事自五月而陰氣動陽爻變故黃鍾蕤賓陰陽之氣始也德刑在焉建子之月坤初六爻變爲陽復卦用事陽氣動於黃泉之下陰氣布在蒼天之上爲德在室而刑在野建丑之月坤六二爻變爲陽臨卦用事陽氣稍出萬物萌牙陰氣將降威怒巳衰爲德在堂而刑在街建寅之月坤六三爻變爲陽泰卦用事陽氣已逹陰氣降入陰陽交泰萬物抽其牙葉爲德在庭而刑在巷建卯之月坤六四爻變爲陽大壯卦用事陽氣上騰乎天陰氣下入乎地陰陽氣交萬物成出德刑俱會於門建辰之月坤六五爻變爲陽夬卦用事陽氣上逹陰氣衰微爲德在巷而刑在庭建巳之月坤上六爻變爲陽純陽用事陽氣大盛陰氣消除萬物悅壯無復刑殺爲德在街而刑在堂建午之月乾初九爻變爲陰遘卦用事陰氣動於黃泉之下陽氣布于蒼天之上爲德在野而刑在室建未之月乾九二爻變爲陰遁卦用事陰氣稍昇陽氣將損萬物壯極皆以衰老爲德在街而刑在堂建申之月乾九三爻變爲陰否卦用事陽氣沈退陰氣進昇陰陽否隔殺威方盛爲德在巷而刑在庭建酉之月乾九四爻變爲陰觀卦用事陽氣內入陰氣外施陰陽合爭萬物變衰爲德在門刑復會於門建戌之月乾九五爻變爲陰剝卦用事陽氣將盡陰氣上逹萬物枯悴殺害盛行爲德在庭而刑在巷建亥之月乾上九爻變爲陰純坤復位陽氣消除陰氣大盛萬物收藏未見刑犯爲德在堂而刑在街此刑德二事出入向趣皆以用之彌忘把鑿遇德則吉逢刑則凶故於此釋第八論合孔子曰乾陽也坤陰也陰陽合德五行之本受生於天則受成於地稟氣於陽定形於陰體無偏立故各有合總而言之干爲陽屬天支爲陰屬地別而言之干自有陰陽甲陽乙陰丙陽丁陰戊陽己陰庚陽辛陰壬陽癸陰支亦自有陰陽子陽丑陰寅陽卯陰辰陽巳陰午陽未陰申陽酉陰戌陽亥陰各象天地而自相配合有夫婦之道干合者己爲甲妻故甲與己合辛爲丙妻故丙與辛合癸爲戊妻故癸與戊合乙爲庚妻故乙與庚合丁爲壬妻故壬與丁合季氏陰陽說曰木八畏庚九故以妹乙妻庚庚氣在秋和以木氣是以薺麥當秋而生所謂妻來之義火七畏壬六故以妹丁妻壬壬得火熱氣故款冬當冬而華金九畏丙七故以妹辛妻丙丙得金氣故首夏靡草薺麥死故夏至之後三庚爲伏以畏火也土五畏甲八故以妹己妻甲土帶陰陽合以雌嫁木故能生物也水六畏土五故以妹癸妻戊五行相和是其合也支合者日月行次之所合也正月日月會於諏訾之次諏訾亥也一名豕韋斗建在寅故寅與亥合二月日月會於降婁之次降婁戌也斗建在卯故卯與戌合三月日月會於大梁之次大梁酉也斗建在辰故辰與酉合四月日月會於實沈之次實沈申也斗建在巳故巳與申合五月日月會於鶉首之次鶉首未也斗建在午故午與未合六月日月會於鶉火之次鶉火午也斗建在未故未與午合七月日月會於鶉尾之次鶉尾巳也斗建在申故申與巳合八月日月會於壽星之次壽星辰也斗建在酉故酉與辰合九月日月會於大火之次大火卯也斗建在戌故戌與卯合十月日月會於折木之次折木寅也斗建在亥故亥與寅合十一月日月會於星紀之次星紀丑也斗建在子故子與丑合十二月日月會於玄枵之次玄枵子也一名天黿斗建在丑故丑與子合玄枵者玄黑也枵耗也陰氣盛故萬物始動猶未出生天下空虛謂之曰耗星紀者紀統也領萬物所終始也折木者萬物始萌分別水木也大火者東方木也心宿在卯火出木心也壽星者萬物始逹各任其命也鶉尾者南方朱雀之宿以軫尾也鶉火者陽氣盛大火星昏中在七星朱鳥之處也鶉首者南方之宿形其象鳥以井爲冠以柳爲口也實沈者陰氣沈重降實於物也大梁者強也白露已降萬物堅強也降婁者降下也婁曲也陰氣上侵萬物萎曲也諏訾者陰盛陽伏萬物愁哀也凡陰陽相配善惡理均凶不全凶吉不獨吉吉終則凶凶終則吉故合不專合復有離義就支干配日辰乃有五合五離五合者河圖云甲寅乙卯天地合丙寅丁卯日月合戊寅己卯人民合庚寅辛卯金石合壬寅癸卯江河合五離者甲申乙酉天地離丙申丁酉日月離戊申己酉人民離庚申辛酉金石離壬申癸酉江河離寅卯陽之所昇能生萬物日常出之月滿又出東方少陽生長之處物所欣會故以爲合申酉陰之所湊肅殺之方日月皆沒於其所西方少陰衰老之處物之所惡故以爲離甲乙曰干之首卦屬乾坤故比天地丙丁陽光之盛故方日月戊己居中能成萬物故類人民庚辛體自金石壬癸居然江河凡爲萬事吉則從合凶則從離遇合則休值離則否選日定時卜筮之用彌所用也第九論扶抑扶者以輔助爲義抑者以止退立名五行既成盛衰有時尊卑代易故有相扶抑者義其相遇也母得子爲扶子遇母爲抑子有孝養順助之理所以爲扶母有尊嚴訓制之道所以爲抑相扶者木扶水水扶金金扶土土扶火火扶木此皆母得子相抑者木抑火火抑土土抑金金抑水水抑木此皆子遇母也柳世隆龜經云扶者壽抑者否扶者起抑者止扶者仰抑者俛扶者進抑者退扶者行抑者停扶者吉抑者凶就此又須消息凡父母有氣爲眞父母無氣爲宗廟鬼神有氣爲兒子福助無氣爲財帛功德所以扶者必善抑者爲惡生王之時則爲有氣死沒之時則是無氣有氣無氣復有二種若遇合德雖抑非害若逢刑剋爲凶更重之問曰母之於子訓制之道謂之爲凶此未可解尊嚴訓制敎以義方欲其成人何爲反惡答曰前解已有二種若遇一德合雖抑非害有氣爲眞父母此是欲其成人雖然當訓之時於子交不遂心亦是留礙況逢刑剋舜之至孝尚大杖則迯王祥扣冰孟宗泣笋此豈是義方之敎無氣爲鬼神者鬼神之來多欲爲祟擣請祈求乃可致福此否抑者何問曰解云有氣爲父母無氣爲鬼神者此亦有疑夫鬼神雖居幽微猶是有物精靈感通禍福斯應若云無者宗廟饗祀何所依憑答曰所言有無者正論生死生則形存爲有死則氣散爲無不語幽微何足疑也問曰若如此解死則爲無無何所慮而能爲抑答曰鬼神雖無形質可見而有善惡可求故能爲抑問曰若能爲抑便是有義答曰就抑則有語形則無今解無也就氣而論非是全無但無王相之氣而有死沒之氣王相氣來則吉死沒氣來則凶所言無氣者無王相氣耳第十論相剋五行雖爲君臣父子生王不同逐忌相剋剋者制罰爲義以其力強能制弱故木剋土土剋水水剋火火剋金金剋木白虎通云木剋土者專勝散土剋水者實勝虛水剋火者眾勝寡火剋金者精勝堅金剋木者剛勝柔春秋繁露云木者農也農人不順如叛司徒誅其率正矣故金勝木火者本朝有讒邪熒惑其君法則誅之故水勝火土者君大奢侈過度失禮民叛之窮故木勝土金者司徒弱不能使眾則司馬誅之故火勝金水者執法阿黨不平則司寇誅之故土勝水勝者爲君爲夫爲官爲吏爲鬼負者爲臣爲妻爲財君以威嚴尊高夫以德義隆重官以能有賞伐吏以刑法裁斷鬼以剋殺病喪竝爲勝者也臣以畏伏其上妻以敬從其夫財以休彼制用竝爲負者凡上剋下爲順下剋上爲剝喻如君有刑臣之法臣無犯君之義父有訓子之道子之無敎父之方所以上之剋下順理而行下之剋上乖理而剋故白虎通云陽爲君陰爲臣水以太陰之氣制太陽之火金以少陰之氣制少陽之木喻如失道之君若殷湯放桀周武伐紂此皆誅有罪也凡卜筮得其所剋者凶得所受制者吉五行之道子能拯父之難故金往剋木火復其讎火既消金水雪其恥然當衰氣者反爲王者所制如鼎鑊中水爲火所煎白虎通云火熱水冷有溫水無寒火何明臣可爲君君不可爲臣火煎水爲湯者不改其形但變其名也水滅火爲炭者形名俱盡也亦如君被廢而不存臣有罪而退職也五行相剋木穿土不毀火燒金不毀者皆陽氣仁好生故也金伐木犯水滅火犯者陰氣貪好殺故也至如山崩川竭木石爲災天火下流人火上燎水旱鬲并風霜爲害此竝失政於人天地作譴爲五行相沴者乖沴不和之義以其氣衝相沴不名剋也沴亦廢也於木則南宮極震於水則三川竭於火則宮室災於金則九鼎震於土則齊楚山崩木金水火俱沴土者地動分折是也故五行氣衝而有六沴大概如斯第十一論刑夫刑者殺罰爲名自是刑於不義非故相刑也五行各在一方寒暑推移應時而動不失其節各不犯各無應獨受刑者但須用之不嚴而治不可弃而不用故皆還相刑如以金治金則成其器以人治人則成國政呂氏春秋云刑罰不可偃於國笞怒不可廢於家故五刑之屬三千莫不本乎五行周書曰因五行相剋而作五刑墨劓剕宮大辟是也火能變金色故墨以變其肉金能剋木故剕以去其骨節木能剋土故劓以去鼻土能塞水故宮以斷其淫泆水能滅火故大辟以絕其生命至于漢文去其肉刑代之以鞭笞其後梟斬流絞徒竝不越其五數尚書云流宥五刑又五流相去各五百里鞭笞之數起自於十積而至百亦依十干之數尚書刑德攷云大辟象天刑罰贖之數三千應天地人日辰支干之刑亦有三種故天地人之刑其揆一也三種者一支自相刑二支刑在干三干刑在支支自相刑者子刑在卯卯刑在子丑刑在戌戌刑在未未刑在丑寅刑在巳巳刑在申申刑在寅辰午酉亥各自刑漢書翼奉奏事云木落歸本故亥卯未木之位刑在北方亥自刑卯刑在子未刑在丑水流向末故申子辰水之位刑在東方申刑在寅子刑在卯辰自刑金剛火強各還其鄕故巳酉丑金之位刑在西方巳刑在申酉自刑丑刑在戌寅午戌火之位刑在南方寅刑在巳午自刑戌刑在未干刑支者寅刑在庚卯刑在辛辰刑在甲巳刑在癸午刑在壬未刑在乙申刑在丙酉刑在丁戌刑在甲亥刑在己子刑在戊丑刑在乙支刑干者甲刑在申乙刑在酉丙刑在子丁刑在亥戊刑在寅己刑在卯庚刑在午辛刑在巳壬刑在辰戌癸刑在丑未此竝以所勝爲刑也凡卜筮所用遇刑非善然所求之事非刑不獲史蘓龜經云當成不成視兆相刑又問云六合是吉而已申相剋者何答曰金帶水生火中火爲金鬼水爲火鬼金共水生火中則是鬼母子身申是金位兼復懷水巳是火位復有生金還相讎故以爲刑也然刑有上下寅刑在巳者巳爲刑上寅爲刑下餘例悉爾故兵晝云刑上風來坐者急起行者急住即此謂也云三刑者如寅刑在巳巳刑在申寅日申時巳上起風或巳上見妖謂之三刑也他亦效此別有從氣爲刑與德相對者已從前解故不重釋第十二論害相害者逆行相逢於十二辰兩兩相害名爲六害戌與酉亥與申子與未丑與午寅與巳卯與辰是六害也是殺傷之義今此六害或是君臣父子或是夫妻理不應害孝經云不愛其親而愛他人者謂之悖德既違其慈愛之性故有怒戮之理五行所惡其在破衝今之相害以與破衝合故父失其慈子違其孝妻不敬順夫弃和同竝合讎忿理成相害至如命待熊蹯飢探雀鷇重耳外奔申生賜書河內則夫婦相殘塞外則君臣殺奪此豈非害乎辰卯爲害者卯與戌合戌破於辰辰土爲卯木妻戌辰同讎卯與戌合便是棄辰與酉合酉衝破卯辰爲卯妻酉爲卯讎辰與酉合酉能剋卯婦姧外夫殺本夫之象也巳與申合申衝於寅巳爲寅子申能剋寅巳與申合子有逆行丑午相害者丑與子合子衝破午午與未合未破於丑亦是父子相害義也未子相害者未與午合午衝破子未土爲君子水爲臣午火爲子水之財君以財害臣之象也子與丑合丑破於未丑又是土子與丑合欲引外君共害其主此則臣有迯亡之象也申亥相害者亥與寅合寅衝於申申與巳合巳衝於亥亦是父子相害義也夫相生不必相生相害不必相害猶如火能燒物遂有炎洲之火而不能燒物水能潤長洪潦暴至亦使草樹藝黃此是相生反相害相害反相生者鑽木得火而雲雨掣電相因而有此是相害反相生也水本害火膏油漬炷燈火益明亦是相害反相生也陰陽五行萬物所存吉凶之應各以其類言之或吉中有凶凶中有吉凶則視其所救吉則觀其所害凶而有救不至於禍吉而有害不及於慶純凶則禍大純吉則福深如丑午相害以子衝破午子有王水此爲純凶未破於丑丑有欲相之木能制未土爲有救也未子相害未衝破於子子是王水水制午火爲凶中有吉子與丑合丑土反制子水即是吉中有凶生害之義例皆如斯第十三論衝破衝破者以其氣相格對也衝氣爲輕破氣爲重支干各自相對故各有衝破也干衝破者甲庚衝破乙辛衝破丙壬衝破丁癸衝破戊壬甲戊乙己亦衝破此皆對衝破亦本體相剋彌爲重也支衝破者子午衝破丑未衝破寅申衝破卯酉衝破辰戌衝破巳亥衝破此亦取相對其輕重皆以死生言之四孟有生而無死直衝而不破四季有死而無生直破而無衝四仲死生俱興故竝有衝破四孟有生無死直有衝無破者寅有生火巳有生金申有生水亥有生木也四仲死生俱有者卯有王木死水午有王火死木酉有王金死火子有王水死金四季有死而無生者辰有死水未有死木戌有死火丑有死金死氣則重故能破生氣則輕故相衝又復甲往向庚爲衝庚往向甲爲破以強者制弱也其衝破皆以對位抗衝最爲不善又互向對衝之地我當在庚令敵居甲以強制弱故也問曰沴氣是相衝而爲今解衝破而不喚爲沴此未可解答曰五行相沴因事變重非是常然有伐則見無災則止今之所解直是支干之位常自格對剛柔相衝非問變異寧得稱爾矣五行大義卷第二終
